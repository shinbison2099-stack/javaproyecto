spring.application.name=proyectorastberry
server.port=8081
spring.datasource.url=jdbc:mysql://localhost:3306/baseproyecto?serverTimezone=America/Mexico_City
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.generate-ddl=true
logging.level.org.hibernate.SQL=debug
# ==============================
# MULTIPART (subida de archivos)
# ==============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
# ==============================
# TOMCAT
# ==============================
server.tomcat.max-http-form-post-size=20MB
server.tomcat.max-swallow-size=20MB
server.tomcat.max-http-header-size=2MB
# ==============================
# THYMELEAF
# ==============================
spring.thymeleaf.cache=false
#===============================
#RUTA DE LAS FOTOS
#==============================
ruta.fotos=uploads/trabajadores/
#