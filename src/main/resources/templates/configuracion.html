<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Configuración</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Iconos -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <style>

        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            overflow: hidden;
        }

        .content {
            margin-left: 120px;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* GRID */
        .tiles {
            display: grid;
            grid-template-columns: repeat(3, 170px);
            gap: 20px;
        }

        /* TILE */
        .tile {
            width: 170px;
            height: 170px;

            border-radius: 15px;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            color: white;
            text-decoration: none;

            transform: scale(0.8);
            opacity: 0;

            animation: aparecer 0.6s ease forwards;
        }
        
        /* ===================================== */
/* 🔥 AREAS */
/* ===================================== */

.areas{

    background:
    linear-gradient(
        135deg,
        #10b981,
        #06b6d4
    );

    color:white;
}

.areas:hover{

    transform:
    translateY(-8px)
    scale(1.05);

    box-shadow:
    0 15px 35px
    rgba(16,185,129,.45);
}

.areas i{

    color:white;
}

        /* 🔥 ANIMACIÓN ESCALONADA */
        .tile:nth-child(1) { animation-delay: 0.1s; }
        .tile:nth-child(2) { animation-delay: 0.2s; }
        .tile:nth-child(3) { animation-delay: 0.3s; }
        .tile:nth-child(4) { animation-delay: 0.4s; }
        .tile:nth-child(5) { animation-delay: 0.5s; }
        .tile:nth-child(6) { animation-delay: 0.6s; }

        @keyframes aparecer {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ICONO */
        .tile i {
            font-size: 50px;
            margin-bottom: 10px;
        }

        /* TEXTO */
        .tile span {
            font-size: 16px;
            font-weight: 500;
        }

        /* 🔥 HOVER PRO */
        .tile:hover {
            transform: scale(1.1) rotate(1deg);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            filter: brightness(1.15);
        }

        /* COLORES */
        .instructores { background: #0984e3; }
        .cursos { background: #00b894; }
        .trabajadores { background: #fdcb6e; color: black; }
        .capacitaciones { background: #6c5ce7; }
        .puestos { background: #2d3436; }

    </style>

</head>

<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

    <div class="tiles">

        <a href="/instructores" class="tile instructores">
            <i class="bi bi-person-video3"></i>
            <span>Instructores</span>
        </a>

        <a href="/cursos" class="tile cursos">
            <i class="bi bi-journal-bookmark"></i>
            <span>Cursos</span>
        </a>

        <a href="/trabajadores" class="tile trabajadores">
            <i class="bi bi-people-fill"></i>
            <span>Trabajadores</span>
        </a>

        <a href="/capacitaciones" class="tile capacitaciones">
            <i class="bi bi-mortarboard-fill"></i>
            <span>Capacitaciones</span>
        </a>

        <a href="/puestos" class="tile puestos">
            <i class="bi bi-briefcase-fill"></i>
            <span>Puestos</span>
        </a>
        
         <a href="/area" class="tile areas">

    <i class="bi bi-diagram-3-fill"></i>

    <span>Áreas</span>

</a>

    </div>

</div>

</body>
</html>
