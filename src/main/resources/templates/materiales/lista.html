<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Materiales del Curso</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
		<!-- 🔥 ICONOS (TE FALTABA O ESTÁ MAL UBICADO) -->
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

		<!-- CSS -->
		<link rel="stylesheet" th:href="@{/css/menu.css}">
		<link rel="stylesheet" th:href="@{/css/sidebar.css}">
</head>
<body>
	
	<div th:replace="~{fragments/menu :: menu}"></div>
	<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="container mt-4">

    <h2 th:text="'Materiales del curso: ' + ${curso.nombre}"></h2>

    <a href="/cursos" class="btn btn-secondary mb-3">
        Volver
    </a>

    <table class="table table-bordered">

        <thead>
        <tr>
            <th>Archivo</th>
            <th>Tipo</th>
            <th>Fecha</th>
            <th>Descargar</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="material : ${materiales}">

            <td th:text="${material.nombreArchivo}"></td>

            <td th:text="${material.tipo}"></td>

            <td th:text="${material.fechaSubida}"></td>

            <td>
                <a th:href="@{'/' + ${material.url}}"
                   class="btn btn-success btn-sm">
                    Descargar
                </a>
            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
