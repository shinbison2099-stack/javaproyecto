<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Inicio</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Iconos -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Sidebar -->
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <style>

        body {
            margin: 0;
            height: 100vh;
            font-family: Arial;
            overflow: hidden;
        }

        /* 🔥 CONTENIDO */
        .content {
            margin-left: 120px;
            height: 100vh;
            position: relative;
        }

        /* 🔥 FONDO ANIMADO */
        .bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #334155);
            background-size: 400% 400%;
            animation: fondo 12s ease infinite;
        }

        @keyframes fondo {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 🔥 CONTENEDOR CENTRAL */
        .center-box {
            position: relative;
            z-index: 2;
            height: 100%;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            text-align: center;
            color: white;
        }

        /* 🔥 CAJA GLASS */
        .glass {
            background: rgba(255,255,255,0.08);
            padding: 40px 60px;
            border-radius: 20px;

            backdrop-filter: blur(10px);

            box-shadow: 0 10px 40px rgba(0,0,0,0.3);

            animation: aparecer 1s ease;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ICONO */
        .icon-main {
            font-size: 60px;
            margin-bottom: 15px;
            animation: flotar 3s ease-in-out infinite;
        }

        @keyframes flotar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* TITULO */
        .glass h1 {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* TEXTO */
        .glass p {
            font-size: 18px;
            opacity: 0.8;
        }

        /* 🔥 RELOJ DEBAJO */
        .clock-container {
            margin-top: 30px;
            animation: fadeIn 1.5s ease;
        }

        .clock {
            font-size: 65px;
            font-weight: bold;
            letter-spacing: 3px;

            color: #00f7ff;
            text-shadow: 0 0 10px #00f7ff, 0 0 25px #00f7ff;
        }

        .date {
            font-size: 18px;
            opacity: 0.8;
            margin-top: 5px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>

</head>

<body>

<!-- 🔥 SIDEBAR -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<!-- 🔥 CONTENIDO -->
<div class="content">

    <!-- FONDO -->
    <div class="bg"></div>

    <!-- CONTENIDO CENTRAL -->
    <div class="center-box">

        <!-- CAJA -->
        <div class="glass">

            <div class="icon-main">
                <i class="bi bi-grid-1x2-fill"></i>
            </div>

            <h1>Bienvenido al Sistema</h1>
            <p>Selecciona una opción del menú lateral</p>

        </div>

        <!-- ⏰ RELOJ -->
        <div class="clock-container">
            <div id="clock" class="clock"></div>
            <div id="date" class="date"></div>
        </div>

    </div>

</div>

<!-- 🔥 SCRIPT RELOJ -->
<script>
function actualizarReloj() {
    const now = new Date();

    let horas = now.getHours().toString().padStart(2, '0');
    let minutos = now.getMinutes().toString().padStart(2, '0');
    let segundos = now.getSeconds().toString().padStart(2, '0');

    document.getElementById("clock").innerText =
        `${horas}:${minutos}:${segundos}`;

    const opciones = {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    };

    document.getElementById("date").innerText =
        now.toLocaleDateString('es-MX', opciones);
}

setInterval(actualizarReloj, 1000);
actualizarReloj();
</script>

</body>
</html>
