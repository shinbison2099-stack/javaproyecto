<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Editar Subárea</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body{
            background:linear-gradient(135deg,#0f172a,#1e293b);
            min-height:100vh;
            color:white;
            font-family:'Segoe UI';
        }

        .card-edit{

            max-width:700px;

            margin:80px auto;

            background:
            rgba(255,255,255,.08);

            backdrop-filter:
            blur(15px);

            border-radius:25px;

            padding:35px;

            box-shadow:
            0 15px 40px rgba(0,0,0,.35);
        }

        .form-control{

            background:
            rgba(255,255,255,.12);

            border:none;

            color:white;
        }

        .form-control:focus{

            background:
            rgba(255,255,255,.18);

            color:white;
        }

    </style>

</head>

<body>

<div class="card-edit">

    <h2 class="mb-4">

        <i class="bi bi-pencil-square"></i>

        Editar Subárea

    </h2>

    <form th:action="@{/subarea/actualizar}"
          method="post">

        <input type="hidden"
               name="id"
               th:value="${subArea.id}">

        <div class="mb-4">

            <label class="form-label">

                Nombre de la Subárea

            </label>

            <input type="text"
                   name="nombreSubArea"
                   class="form-control"
                   th:value="${subArea.nombreSubArea}"
                   required>

        </div>

        <div class="d-flex
                    justify-content-between">

            <a th:href="@{/subarea/area/{id}(id=${subArea.area.id})}"
               class="btn btn-secondary">

                <i class="bi bi-arrow-left"></i>

                Volver

            </a>

            <button type="submit"
                    class="btn btn-success">

                <i class="bi bi-floppy"></i>

                Guardar

            </button>

        </div>

    </form>

</div>

</body>

</html>
