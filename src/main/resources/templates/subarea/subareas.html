```html
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Administrar Subáreas</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body{
            background:linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
            min-height:100vh;
            font-family:'Segoe UI';
        }

        .container-box{
            max-width:1200px;
            margin:40px auto;
        }

        .glass-card{

            background:
            rgba(255,255,255,.08);

            backdrop-filter:
            blur(15px);

            border-radius:25px;

            padding:30px;

            box-shadow:
            0 15px 40px rgba(0,0,0,.35);
        }

        .area-title{

            font-size:30px;

            font-weight:600;

            margin-bottom:25px;
        }

        .subareas-grid{

            display:flex;

            flex-wrap:wrap;

            gap:15px;

            margin-top:25px;
        }

        .subarea-card{

            width:180px;

            min-height:180px;

            background:
            rgba(255,255,255,.08);

            border:
            1px solid rgba(255,255,255,.15);

            border-radius:20px;

            display:flex;

            flex-direction:column;

            justify-content:center;

            align-items:center;

            transition:.3s;
        }

        .subarea-card:hover{

            transform:
            translateY(-5px);

            background:
            rgba(255,255,255,.12);
        }

        .icon-box{

            width:60px;

            height:60px;

            border-radius:15px;

            background:
            linear-gradient(
                135deg,
                #3b82f6,
                #2563eb
            );

            display:flex;

            align-items:center;

            justify-content:center;

            font-size:28px;

            margin-bottom:15px;
        }

        .subarea-name{

            font-weight:600;

            text-align:center;

            padding:0 10px;

            min-height:45px;
        }

        .actions{

            margin-top:15px;

            display:flex;

            gap:8px;
        }

        .btn-action{

            border:none;

            border-radius:10px;
        }

        .btn-add{

            background:
            linear-gradient(
                135deg,
                #22c55e,
                #16a34a
            );

            border:none;
        }

    </style>

</head>

<body>

<div class="container-box">

    <div class="glass-card">

        <div class="d-flex
                    justify-content-between
                    align-items-center
                    mb-4">

            <h2 class="area-title">

                <i class="bi bi-building"></i>

                Área:

                <span th:text="${area.nombreArea}">
                </span>

            </h2>

            <a th:href="@{/area}"
               class="btn btn-secondary">

                <i class="bi bi-arrow-left"></i>

                Volver

            </a>

        </div>

        <!-- NUEVA SUBAREA -->

        <form th:action="@{/subarea/guardar}"
              method="post">

            <input type="hidden"
                   name="areaId"
                   th:value="${area.id}">

            <div class="row">

                <div class="col-md-10">

                    <input type="text"
                           name="nombreSubArea"
                           class="form-control"
                           placeholder="Nombre de la subárea"
                           required>

                </div>

                <div class="col-md-2">

                    <button class="btn btn-success btn-add w-100">

                        <i class="bi bi-plus-circle"></i>

                        Agregar

                    </button>

                </div>

            </div>

        </form>

        <!-- SUBAREAS -->

        <div class="subareas-grid">

           <div th:each="sub : ${subareas}"
     class="subarea-card">

                <div class="icon-box">

                    <i class="bi bi-grid-1x2-fill"></i>

                </div>

                <div class="subarea-name"
                     th:text="${sub.nombreSubArea}">
                </div>

                <div class="actions">

                    <a th:href="@{/subarea/editar/{id}(id=${sub.id})}"
                       class="btn btn-warning btn-sm btn-action">

                        <i class="bi bi-pencil"></i>

                    </a>

                    <a th:href="@{/subarea/eliminar/{id}(id=${sub.id})}"
                       class="btn btn-danger btn-sm btn-action">

                        <i class="bi bi-trash"></i>

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
```
