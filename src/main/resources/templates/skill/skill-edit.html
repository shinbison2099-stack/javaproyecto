<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Actualizar Skill Matrix</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body{

            background:
            linear-gradient(
                135deg,
                #0f172a,
                #1e293b
            );

            color:white;
            font-family:'Segoe UI', sans-serif;
        }

        .container{

            margin-top:40px;
            max-width:900px;
        }

        .card-box{

            background:
            rgba(255,255,255,0.08);

            padding:30px;

            border-radius:20px;

            backdrop-filter:blur(10px);

            box-shadow:
            0 10px 30px rgba(0,0,0,0.4);
        }

        .form-control,
        .form-select{

            border-radius:12px;
        }

        .nivel-card{

            padding:15px;

            border-radius:15px;

            border:2px solid rgba(255,255,255,0.1);

            margin-bottom:15px;

            transition:0.3s;
        }

        .nivel-card:hover{

            transform:translateY(-3px);

            background:
            rgba(255,255,255,0.05);
        }

        .nivel-title{

            font-weight:bold;
            font-size:18px;
        }

        .btn-save{

            border-radius:15px;

            padding:12px;

            font-weight:bold;
        }

        .info-box{

            background:
            rgba(255,255,255,0.05);

            padding:15px;

            border-radius:15px;

            margin-bottom:25px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card-box">

        <!-- ===================================== -->
        <!-- 🔥 HEADER -->
        <!-- ===================================== -->

        <h2 class="mb-4">

            <i class="bi bi-grid-3x3-gap-fill"></i>

            Actualizar Skill Matrix

        </h2>

        <!-- ===================================== -->
        <!-- 🔥 INFO -->
        <!-- ===================================== -->

        <div class="info-box">

            <h5>

                <i class="bi bi-person-circle"></i>

                <span th:text="
                ${skill.trabajador.nombre}
                +
                ' '
                +
                ${skill.trabajador.primerApellido}">
                </span>

            </h5>

            <div>

                <strong>Capacitación:</strong>

                <span th:text="
                ${skill.capacitacion.nombreCapacitacion}">
                </span>

            </div>

            <div>

                <strong>Puesto:</strong>

                <span th:text="
                ${skill.trabajador.puesto.nombrePuesto}">
                </span>

            </div>

        </div>

        <!-- ===================================== -->
        <!-- 🔥 FORM -->
        <!-- ===================================== -->

        <form th:action="@{/evaluaciones/skill/update}"
              method="post"
              enctype="multipart/form-data">

            <!-- ID -->
            <input type="hidden"
                   name="id"
                   th:value="${skill.id}">

            <!-- ===================================== -->
            <!-- 🔥 NIVEL -->
            <!-- ===================================== -->

            <label class="form-label">

                Nivel Actual

            </label>

            <select name="nivel"
                    class="form-select mb-4">

                <option value="VACIO"
                        th:selected="${skill.nivel.name() == 'VACIO'}">

                    ⚪ VACIO

                </option>

                <option value="PROGRAMADO"
                        th:selected="${skill.nivel.name() == 'PROGRAMADO'}">

                    🔵 PROGRAMADO

                </option>

                <option value="CAPACITADO"
                        th:selected="${skill.nivel.name() == 'CAPACITADO'}">

                    🟡 CAPACITADO

                </option>

                <option value="EXPERIENCIA_40H"
                        th:selected="${skill.nivel.name() == 'EXPERIENCIA_40H'}">

                    🟠 EXPERIENCIA 40H

                </option>

                <option value="ACREDITADO"
                        th:selected="${skill.nivel.name() == 'ACREDITADO'}">

                    🟢 ACREDITADO

                </option>

            </select>

            <!-- ===================================== -->
            <!-- 🔥 FECHA PROGRAMADA -->
            <!-- ===================================== -->

            <div class="nivel-card">

                <div class="nivel-title">

                    🔵 Programado

                </div>

                <input type="date"
                       name="fechaProgramada"
                       class="form-control mt-2"
                       th:value="${skill.fechaProgramada}">

            </div>

            <!-- ===================================== -->
            <!-- 🔥 FECHA CAPACITADO -->
            <!-- ===================================== -->

            <div class="nivel-card">

                <div class="nivel-title">

                    🟡 Capacitado

                </div>

                <input type="date"
                       name="fechaCapacitado"
                       class="form-control mt-2"
                       th:value="${skill.fechaCapacitado}">

            </div>

            <!-- ===================================== -->
            <!-- 🔥 FECHA EXPERIENCIA -->
            <!-- ===================================== -->

            <div class="nivel-card">

                <div class="nivel-title">

                    🟠 Experiencia 40H

                </div>

                <input type="date"
                       name="fechaExperiencia"
                       class="form-control mt-2"
                       th:value="${skill.fechaExperiencia}">

            </div>

            <!-- ===================================== -->
            <!-- 🔥 FECHA ACREDITADO -->
            <!-- ===================================== -->

            <div class="nivel-card">

                <div class="nivel-title">

                    🟢 Acreditado

                </div>

                <input type="date"
                       name="fechaCertificado"
                       class="form-control mt-2"
                       th:value="${skill.fechaCertificado}">

            </div>

            <!-- ===================================== -->
            <!-- 🔥 HORAS -->
            <!-- ===================================== -->

            <label class="form-label mt-3">

                Horas de Experiencia

            </label>

            <input type="number"
                   name="horasExperiencia"
                   class="form-control mb-4"
                   th:value="${skill.horasExperiencia}">

            <!-- ===================================== -->
            <!-- 🔥 EVIDENCIA -->
            <!-- ===================================== -->

            <label class="form-label">

                Evidencia PDF

            </label>

            <input type="file"
                   name="archivo"
                   class="form-control mb-4">

            <!-- ===================================== -->
            <!-- 🔥 OBSERVACIONES -->
            <!-- ===================================== -->

            <label class="form-label">

                Observaciones

            </label>

            <textarea name="observaciones"
                      rows="4"
                      class="form-control mb-4"
                      th:text="${skill.observaciones}">
            </textarea>

            <!-- ===================================== -->
            <!-- 🔥 BOTONES -->
            <!-- ===================================== -->

            <div class="d-flex gap-3">

                <button class="btn btn-success w-100 btn-save">

                    <i class="bi bi-check-circle"></i>

                    Guardar Cambios

                </button>

                <a href="javascript:history.back()"
                   class="btn btn-outline-light w-100 btn-save">

                    <i class="bi bi-arrow-left"></i>

                    Regresar

                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
