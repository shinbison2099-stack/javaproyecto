<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Actualizar Skill Matrix</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body{

            background:
            linear-gradient(
                135deg,
                #0f172a,
                #1e293b
            );

            color:white;
            font-family:'Segoe UI', sans-serif;
        }

        .container{

            margin-top:40px;
            max-width:900px;
        }

        .card-box{

            background:
            rgba(255,255,255,0.08);

            padding:30px;

            border-radius:20px;

            backdrop-filter:blur(10px);

            box-shadow:
            0 10px 30px rgba(0,0,0,0.4);
        }

        .form-control,
        .form-select{

            border-radius:12px;
        }

        .nivel-card{

            padding:15px;

            border-radius:15px;

            border:2px solid rgba(255,255,255,0.1);

            margin-bottom:15px;

            transition:0.3s;
        }

        .nivel-card:hover{

            transform:translateY(-3px);

            background:
            rgba(255,255,255,0.05);
        }

        .nivel-title{

            font-weight:bold;
            font-size:18px;
        }

        .btn-save{

            border-radius:15px;

            padding:12px;

            font-weight:bold;
        }

        .info-box{

            background:
            rgba(255,255,255,0.05);

            padding:15px;

            border-radius:15px;

            margin-bottom:25px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card-box">

        <!-- ===================================== -->
        <!-- 🔥 HEADER -->
        <!-- ===================================== -->

        <h2 class="mb-4">

            <i class="bi bi-grid-3x3-gap-fill"></i>

            Actualizar Skill Matrix

        </h2>

        <!-- ===================================== -->
        <!-- 🔥 INFO -->
        <!-- ===================================== -->

        <div class="info-box">

            <h5>

                <i class="bi bi-person-circle"></i>

                <span th:text="
                ${skill.trabajador.nombre}
                +
                ' '
                +
                ${skill.trabajador.primerApellido}">
                </span>

            </h5>

            <div>

                <strong>Capacitación:</strong>

                <span th:text="
                ${skill.capacitacion.nombreCapacitacion}">
                </span>

            </div>

			<div>

			    <strong>Puesto:</strong>

			    <span th:if="${skill.trabajador.puesto != null}"
			          th:text="${skill.trabajador.puesto.nombrePuesto}">
			    </span>

			    <span th:if="${skill.trabajador.puesto == null}">
			        SIN PUESTO ASIGNADO
			    </span>

			</div>

        </div>
        
        <!-- ===================================== -->
		<!-- 🔥 NIVEL ACTUAL -->
		<!-- ===================================== -->

		<div class="alert alert-info mb-4">

    	<strong>Nivel Actual:</strong>

    	<span th:text="${skill.nivel}">
    	</span>

		</div>

        <!-- ===================================== -->
        <!-- 🔥 FORM -->
        <!-- ===================================== -->

        <form th:action="@{/evaluaciones/skill/update}"
              method="post"
              enctype="multipart/form-data">

            <!-- ID -->
            <input type="hidden"
                   name="id"
                   th:value="${skill.id}">

           
<!-- ===================================== -->
<!-- 🔥 PROGRAMADO -->
<!-- ===================================== -->

<div class="nivel-card">

    <div class="nivel-title mb-3">

        🔵 Programado

    </div>

    <div class="row g-3">

        <!-- FECHA -->
        <div class="col-md-6">

            <label class="form-label">

                Fecha Programada

            </label>

           <input type="date"
       name="fechaProgramada"
       class="form-control"
       th:value="${skill.fechaProgramada != null ? #temporals.format(skill.fechaProgramada,'yyyy-MM-dd') : ''}">

        </div>

        <!-- PDF -->
        <div class="col-md-6">

            <label class="form-label">

                PDF Programado

            </label>

            <input type="file"
                   name="pdfProgramado"
                   class="form-control">

            <a th:if="${skill.evidenciaProgramado != null}"

               th:href="@{'/uploads/skills/' + ${skill.evidenciaProgramado}}"

               target="_blank"

               class="btn btn-outline-primary btn-sm mt-2">

                <i class="bi bi-file-earmark-pdf"></i>

                Ver PDF

            </a>

        </div>

    </div>

</div>

<!-- ===================================== -->
<!-- 🔥 CAPACITADO -->
<!-- ===================================== -->

<div class="nivel-card">

    <div class="nivel-title mb-3">

        🟡 Capacitado

    </div>

    <div class="row g-3">

        <!-- FECHA -->
        <div class="col-md-6">

            <label class="form-label">

                Fecha Capacitado

            </label>

            <input type="date"
       name="fechaCapacitado"
       class="form-control"
       th:value="${skill.fechaCapacitado != null ? #temporals.format(skill.fechaCapacitado,'yyyy-MM-dd') : ''}">

        </div>

        <!-- PDF -->
        <div class="col-md-6">

            <label class="form-label">

                PDF Capacitado

            </label>

            <input type="file"
                   name="pdfCapacitado"
                   class="form-control">

            <a th:if="${skill.evidenciaCapacitado != null}"

               th:href="@{'/uploads/skills/' + ${skill.evidenciaCapacitado}}"

               target="_blank"

               class="btn btn-outline-warning btn-sm mt-2">

                <i class="bi bi-file-earmark-pdf"></i>

                Ver PDF

            </a>

        </div>

    </div>

</div>

<!-- ===================================== -->
<!-- 🔥 EXPERIENCIA -->
<!-- ===================================== -->

<div class="nivel-card">

    <div class="nivel-title mb-3">

        🟠 Experiencia 40H

    </div>

    <div class="row g-3">

        <!-- FECHA -->
        <div class="col-md-4">

            <label class="form-label">

                Fecha

            </label>

            <input type="date"
       name="fechaExperiencia"
       class="form-control"
       th:value="${skill.fechaExperiencia != null ? #temporals.format(skill.fechaExperiencia,'yyyy-MM-dd') : ''}">
        </div>

        <!-- HORAS -->
        <div class="col-md-4">

            <label class="form-label">

                Horas

            </label>

            <input type="number"
                   name="horasExperiencia"
                   class="form-control"
                   th:value="${skill.horasExperiencia}">

        </div>

        <!-- PDF -->
        <div class="col-md-4">

            <label class="form-label">

                PDF Experiencia

            </label>

            <input type="file"
                   name="pdfExperiencia"
                   class="form-control">

            <a th:if="${skill.evidenciaExperiencia != null}"

               th:href="@{'/uploads/skills/' + ${skill.evidenciaExperiencia}}"

               target="_blank"

               class="btn btn-outline-info btn-sm mt-2">

                <i class="bi bi-file-earmark-pdf"></i>

                Ver PDF

            </a>

        </div>

    </div>

</div>

<!-- ===================================== -->
<!-- 🔥 ACREDITADO -->
<!-- ===================================== -->

<div class="nivel-card">

    <div class="nivel-title mb-3">

        🟢 Acreditado

    </div>

    <div class="row g-3">

        <!-- FECHA -->
        <div class="col-md-6">

            <label class="form-label">

                Fecha Acreditado

            </label>

           <input type="date"
       name="fechaCertificado"
       class="form-control"
       th:value="${skill.fechaCertificado != null ? #temporals.format(skill.fechaCertificado,'yyyy-MM-dd') : ''}">

        </div>

        <!-- PDF -->
        <div class="col-md-6">

            <label class="form-label">

                PDF Acreditado

            </label>

            <input type="file"
                   name="pdfAcreditado"
                   class="form-control">

            <a th:if="${skill.evidenciaAcreditado != null}"

               th:href="@{'/uploads/skills/' + ${skill.evidenciaAcreditado}}"

               target="_blank"

               class="btn btn-outline-success btn-sm mt-2">

                <i class="bi bi-file-earmark-pdf"></i>

                Ver PDF

            </a>

        </div>

    </div>

</div>

            <!-- ===================================== -->
            <!-- 🔥 OBSERVACIONES -->
            <!-- ===================================== -->

            <label class="form-label">

                Observaciones

            </label>

            <textarea name="observaciones"
                      rows="4"
                      class="form-control mb-4"
                      th:text="${skill.observaciones}">
            </textarea>

            <!-- ===================================== -->
            <!-- 🔥 BOTONES -->
            <!-- ===================================== -->

            <div class="d-flex gap-3">

                <button class="btn btn-success w-100 btn-save">

                    <i class="bi bi-check-circle"></i>

                    Guardar Cambios

                </button>

                <a href="javascript:history.back()"
                   class="btn btn-outline-light w-100 btn-save">

                    <i class="bi bi-arrow-left"></i>

                    Regresar

                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
