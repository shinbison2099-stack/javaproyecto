<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Matriz interactiva</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .container { margin-top: 30px; }

        .card-box {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .item-card {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 8px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #334155;
            padding: 8px;
            text-align: center;
        }

        th { background: #1e293b; }

        .circulo {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin: auto;
            cursor: pointer;
        }

        .completo { background: #0ea5e9; }

        .medio {
            background: linear-gradient(to right, #0ea5e9 50%, transparent 50%);
            border: 2px solid #0ea5e9;
        }

        .vacio { border: 2px solid #94a3b8; }
    </style>
</head>

<body>

<div class="container">

    <div class="card-box">

        <h3><i class="bi bi-grid"></i> Matriz de habilidades</h3>

        <!-- 🔥 FORM -->
        <form action="/matriz/guardar" method="post">

            <!-- NOMBRE -->
            <input type="text" name="nombre"
                   placeholder="Nombre de la matriz"
                   class="form-control mb-3"
                   required>

            <!-- CURSOS -->
            <h5>Cursos</h5>
            <div class="grid">
                <div class="item-card" th:each="c : ${cursos}">
                    <input type="checkbox" name="cursoIds"
                           th:value="${c.id}"
                           onchange="cargarTodo()">
                    <span th:text="${c.nombreCurso}"></span>
                </div>
            </div>

            <!-- MATRIZ -->
            <div id="matrizContainer"></div>

            <!-- 🔥 BOTÓN GUARDAR -->
            <button class="btn btn-success mt-3">
                Guardar matriz
            </button>

        </form>

    </div>

</div>

<script>

function cargarTodo(){

    let checks = document.querySelectorAll("input[name='cursoIds']:checked");
    let ids = Array.from(checks).map(c => c.value);

    if(ids.length === 0){
        document.getElementById("matrizContainer").innerHTML = "";
        return;
    }

    fetch("/matriz/matriz-data?cursoIds=" + ids.join(","))
        .then(res => res.json())
        .then(data => pintarMatriz(data));
}

function pintarMatriz(data){

    let caps = data.capacitaciones || [];
    let trabajadores = data.trabajadores || [];

    // 🔥 VALIDACIÓN IMPORTANTE
    if(caps.length === 0){
        document.getElementById("matrizContainer").innerHTML = `
            <div style="
                padding:20px;
                text-align:center;
                background:#1e293b;
                border-radius:10px;
                margin-top:20px;
                color:#facc15;
                font-weight:bold;
            ">
                ⚠️ Este curso no tiene capacitaciones
            </div>
        `;
        return;
    }

    let html = `<table><thead>
    <tr>
        <th rowspan="2">ID</th>
        <th rowspan="2">Nombre</th>`;

    let cursosMap = {};

    // AGRUPAR CURSOS
    caps.forEach(c => {
        let curso = c.curso?.nombreCurso || "Curso";
        cursosMap[curso] = (cursosMap[curso] || 0) + 1;
    });

    // HEADER CURSOS
    for(let curso in cursosMap){
        html += `<th colspan="${cursosMap[curso]}">${curso}</th>`;
    }

    html += `</tr><tr>`;

    // HEADER CAPACITACIONES
    caps.forEach(c => {
        html += `<th>
            ${c.nombreCapacitacion}
            <input type="hidden" name="capacitacionesIds" value="${c.id}">
        </th>`;
    });

    html += `</tr></thead><tbody>`;

    // SI NO HAY TRABAJADORES
    if(trabajadores.length === 0){
        html += `<tr>
            <td colspan="${caps.length + 2}" style="color:#94a3b8;">
                No hay trabajadores inscritos
            </td>
        </tr>`;
    }

    // FILAS
    trabajadores.forEach(t => {

        html += `<tr>
            <td>${t.id}</td>
            <td>
                ${t.nombre}
                <input type="hidden" name="trabajadoresIds" value="${t.id}">
            </td>`;

        caps.forEach(c => {

            let estado = "vacio";

            if(c.capacitacionTrabajadores){
                let rel = c.capacitacionTrabajadores.find(ct => ct.trabajador.id === t.id);
                if(rel){
                    if(rel.aprobado) estado = "completo";
                    else if(rel.nivel != null) estado = "medio";
                }
            }

            html += `<td>
                <div class="circulo ${estado}"
                     onclick="cambiarEstado(${t.id}, ${c.id}, this)">
                </div>
            </td>`;
        });

        html += `</tr>`;
    });

    html += `</tbody></table>`;

    document.getElementById("matrizContainer").innerHTML = html;
}

function cambiarEstado(trabajadorId, capacitacionId, el){

    fetch("/matriz/actualizar-estado", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `trabajadorId=${trabajadorId}&capacitacionId=${capacitacionId}`
    });

    // CAMBIO VISUAL
    if(el.classList.contains("completo")){
        el.className = "circulo vacio";
    } 
    else if(el.classList.contains("medio")){
        el.className = "circulo completo";
    } 
    else {
        el.className = "circulo medio";
    }
}

</script>

</body>
</html>
