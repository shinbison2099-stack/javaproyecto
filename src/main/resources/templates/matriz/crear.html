<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Matriz interactiva</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .container { margin-top: 30px; }

        .card-box {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .item-card {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 8px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            display: block;
            overflow-x: auto;
        }

        th, td {
            border: 1px solid #334155;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #1e293b;
            position: sticky;
            top: 0;
            z-index: 2;
        }

		.semaforo {
		    width: 18px;
		    height: 18px;
		    border-radius: 50%;
		    margin: auto;
		    box-shadow: 0 0 8px rgba(0,0,0,0.5);
		}

		/* 🔴 NO INSCRITO */
		.vacio {
		    background: #475569;
		}

		/* 🟡 INSCRITO */
		.medio {
		    background: #facc15;
		    box-shadow: 0 0 10px #facc15;
		}

		/* 🟢 APROBADO */
		.completo {
		    background: #22c55e;
		    box-shadow: 0 0 10px #22c55e;
		}

    </style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">

        <h3 style="margin:0; font-weight:600;">
            <i class="bi bi-grid"></i> Matriz de habilidades
        </h3>

        <div style="display:flex; gap:10px;">

            <a href="/matriz/lista" class="btn btn-primary">
                📊 Ver matrices
            </a>

            <button type="submit" form="formMatriz" class="btn btn-success">
                💾 Guardar
            </button>

        </div>

    </div>

    <div class="card-box">

        <form id="formMatriz" action="/matriz/guardar" method="post">

            <!-- NOMBRE -->
            <input type="text" name="nombre"
                   placeholder="Nombre de la matriz"
                   class="form-control mb-3"
                   required>

            <!-- CURSOS -->
            <h5>Cursos</h5>
            <div class="grid">
                <div class="item-card" th:each="c : ${cursos}">
                    <input type="checkbox" name="cursoIds"
                           th:value="${c.id}"
                           onchange="cargarTodo()">
                    <span th:text="${c.nombreCurso}"></span>
                </div>
            </div>

            <!-- MATRIZ -->
            <div id="matrizContainer"></div>

        </form>

    </div>

</div>

<script>

function cargarTodo(){

    let checks = document.querySelectorAll("input[name='cursoIds']:checked");
    let ids = Array.from(checks).map(c => c.value);

    let container = document.getElementById("matrizContainer");

    if(ids.length === 0){
        container.innerHTML = "";
        return;
    }

    container.innerHTML = `<div style="padding:20px;text-align:center;">
        ⏳ Cargando matriz...
    </div>`;

    fetch("/matriz/matriz-data?cursoIds=" + encodeURIComponent(ids.join(",")))
        .then(res => res.json())
        .then(data => pintarMatriz(data))
        .catch(err => {
            container.innerHTML = `<div style="color:red;">Error al cargar</div>`;
            console.error(err);
        });
}

function pintarMatriz(data){

    let caps = data.capacitaciones || [];
    let trabajadores = data.trabajadores || [];
    let evaluaciones = data.evaluaciones || [];

    let container = document.getElementById("matrizContainer");

    if(caps.length === 0){
        container.innerHTML = `<div style="padding:20px;text-align:center;background:#1e293b;border-radius:10px;">
            ⚠️ Sin capacitaciones
        </div>`;
        return;
    }

    // 🔥 AGRUPAR POR CURSO
    let cursos = {};

    caps.forEach(c => {
        let cursoId = c.curso?.id || 0;
        let nombreCurso = c.curso?.nombreCurso || "Sin curso";

        if(!cursos[cursoId]){
            cursos[cursoId] = {
                nombre: nombreCurso,
                lista: []
            };
        }

        cursos[cursoId].lista.push(c);
    });

    let html = `<table><thead>`;

    // 🔥 HEADER
    html += `<tr>
        <th rowspan="2">ID</th>
        <th rowspan="2">Nombre</th>`;

    Object.entries(cursos).forEach(([cursoId, obj]) => {
        html += `<th colspan="${obj.lista.length}">
                    ${obj.nombre}
                </th>`;
    });

    html += `<th rowspan="2">TOTAL</th>`;
    html += `</tr>`;

    // 🔥 CAPACITACIONES
    html += `<tr>`;
    Object.values(cursos).forEach(obj => {
        obj.lista.forEach(c => {
            html += `<th>${c.nombreCapacitacion}</th>`;
        });
    });
    html += `</tr></thead><tbody>`;

    // 🔥 FILAS
    trabajadores.forEach(t => {

        let totalCaps = caps.length;
        let completadas = 0;

        html += `<tr>
            <td>${t.id}</td>

            <!-- 🔥 INPUT TRABAJADOR -->
            <input type="hidden" name="trabajadoresIds" value="${t.id}">

            <td style="display:flex; align-items:center; gap:10px;">

                <img src="/matriz/foto/${t.numeroPersonal}"
                     style="width:35px;height:35px;border-radius:50%;object-fit:cover;"
                     onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">

                <div>
                    ${t.nombre} ${t.primerApellido || ''} ${t.segundoApellido || ''}
                    <br>
                    <span style="font-size:11px;color:#94a3b8;">
                        ${t.puesto?.nombrePuesto || 'Sin puesto'}
                    </span>
                </div>
            </td>`;

        Object.values(cursos).forEach(obj => {

            obj.lista.forEach(c => {

                let ev = evaluaciones.find(e =>
                    e.trabajador?.id === t.id &&
                    e.capacitacion?.id === c.id
                );

                let estado = ev ? (ev.aprobada ? "completo" : "medio") : "vacio";

                if(estado === "completo"){
                    completadas++;
                }

                html += `<td>
					<div class="semaforo ${estado}" 
					     title="${estado === 'completo' ? 'Aprobado' : estado === 'medio' ? 'Inscrito' : 'No inscrito'}">
					</div>

                    <!-- 🔥 INPUT CAPACITACION -->
                    <input type="hidden" name="capacitacionesIds" value="${c.id}">
                </td>`;
            });

        });

        // 🔥 TOTAL
        let totalPorcentaje = totalCaps > 0 
            ? Math.round((completadas * 100) / totalCaps)
            : 0;

        let color = "#ef4444";
        if(totalPorcentaje >= 80) color = "#22c55e";
        else if(totalPorcentaje >= 50) color = "#f59e0b";

        html += `<td style="font-weight:bold;color:${color};">
                    ${totalPorcentaje}%
                 </td>`;

        html += `</tr>`;
    });

    html += `</tbody></table>`;

    container.innerHTML = html;
}

</script>

</body>
</html>
