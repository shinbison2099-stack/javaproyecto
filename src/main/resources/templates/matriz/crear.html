<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Matriz interactiva</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .container { margin-top: 30px; }

        .card-box {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .item-card {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 8px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #334155;
            padding: 8px;
            text-align: center;
        }

        th { background: #1e293b; }

        .circulo {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin: auto;
            cursor: pointer;
        }

        .completo { background: #0ea5e9; }

        .medio {
            background: linear-gradient(to right, #0ea5e9 50%, transparent 50%);
            border: 2px solid #0ea5e9;
        }

        .vacio { border: 2px solid #94a3b8; }
		
		table {
		    display: block;
		    overflow-x: auto;
		}

		thead th {
		    position: sticky;
		    top: 0;
		    z-index: 2;
		}
		
    </style>
</head>

<body>

	<div class="container">

	    <!-- 🔥 HEADER -->
	    <div style="
	        display:flex;
	        justify-content:space-between;
	        align-items:center;
	        margin-bottom:20px;
	    ">

	        <!-- TÍTULO -->
	        <h3 style="
	            margin:0;
	            font-weight:600;
	            letter-spacing:1px;
	        ">
	            <i class="bi bi-grid"></i> Matriz de habilidades
	        </h3>

	        <!-- BOTONES -->
	        <div style="display:flex; gap:10px;">

	            <a href="/matriz/lista">
	                <button class="btn btn-primary">
	                    📊 Ver matrices
	                </button>
	            </a>

	            <button form="formMatriz"
	                    class="btn btn-success">
	                💾 Guardar
	            </button>

	        </div>

	    </div>

	    <div class="card-box">

	        <!-- 🔥 FORM -->
	        <form id="formMatriz" action="/matriz/guardar" method="post">

            <!-- NOMBRE -->
            <input type="text" name="nombre"
                   placeholder="Nombre de la matriz"
                   class="form-control mb-3"
                   required>

            <!-- CURSOS -->
            <h5>Cursos</h5>
            <div class="grid">
                <div class="item-card" th:each="c : ${cursos}">
                    <input type="checkbox" name="cursoIds"
                           th:value="${c.id}"
                           onchange="cargarTodo()">
                    <span th:text="${c.nombreCurso}"></span>
                </div>
            </div>

            <!-- MATRIZ -->
            <div id="matrizContainer"></div>

            <!-- 🔥 BOTÓN GUARDAR -->
            <button class="btn btn-success mt-3">
                Guardar matriz
            </button>

        </form>

    </div>

</div>

<script>

function cargarTodo(){

    let checks = document.querySelectorAll("input[name='cursoIds']:checked");
    let ids = Array.from(checks).map(c => c.value);

    let container = document.getElementById("matrizContainer");

    if(ids.length === 0){
        container.innerHTML = "";
        return;
    }

    container.innerHTML = `<div style="padding:20px;text-align:center;">
        ⏳ Cargando matriz...
    </div>`;

    fetch("/matriz/matriz-data?cursoIds=" + ids.join(","))
        .then(res => res.json())
        .then(data => pintarMatriz(data))
        .catch(err => {
            container.innerHTML = `<div style="color:red;">Error al cargar</div>`;
            console.error(err);
        });
}

function pintarMatriz(data){

    let caps = data.capacitaciones || [];
    let trabajadores = data.trabajadores || [];
    let evaluaciones = data.evaluaciones || [];

    let container = document.getElementById("matrizContainer");

    if(caps.length === 0){
        container.innerHTML = `
            <div style="
                padding:20px;
                text-align:center;
                background:#1e293b;
                border-radius:10px;
                margin-top:20px;
                color:#facc15;
                font-weight:bold;
            ">
                ⚠️ Los cursos seleccionados no tienen capacitaciones
            </div>
        `;
        return;
    }

    let html = `<table><thead>
    <tr>
        <th rowspan="2">ID</th>
        <th rowspan="2">Nombre</th>`;

    // 🔥 AGRUPAR CURSOS (ORDENADO)
    let cursosMap = new Map();

    caps.forEach(c => {
        let curso = c.curso?.nombreCurso || "Sin curso";

        if(!cursosMap.has(curso)){
            cursosMap.set(curso, 0);
        }

        cursosMap.set(curso, cursosMap.get(curso) + 1);
    });

    cursosMap.forEach((count, curso) => {
        html += `<th colspan="${count}">${curso}</th>`;
    });

    html += `</tr><tr>`;

    caps.forEach(c => {
        html += `<th>
            ${c.nombreCapacitacion}
            <input type="hidden" name="capacitacionesIds" value="${c.id}">
        </th>`;
    });

    html += `</tr></thead><tbody>`;

    if(trabajadores.length === 0){
        html += `<tr>
            <td colspan="${caps.length + 2}" style="color:#94a3b8;">
                No hay trabajadores inscritos
            </td>
        </tr>`;
    }

    trabajadores.forEach(t => {

        html += `<tr>
			<td>${t.id}</td>
            
			<td style="display:flex; align-items:center; gap:10px;">
			    
			    <img src="/foto/${t.numeroPersonal}"
			         style="
			            width:35px;
			            height:35px;
			            border-radius:50%;
			            object-fit:cover;
			            border:2px solid #334155;
			         "
			         onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">

			    <span>
			        ${t.nombre} ${t.primerApellido || ''} ${t.segundoApellido || ''}
			    </span>

			    <input type="hidden" name="trabajadoresIds" value="${t.id}">
			</td>
			
			
			
			`;

        caps.forEach(c => {

            let estado = "vacio";

            // 🔥 BUSCAR EVALUACIÓN (LO IMPORTANTE)
            let ev = evaluaciones.find(e =>
                e.trabajador?.id === t.id &&
                e.capacitacion?.id === c.id
            );

            if(ev){
                estado = ev.aprobada ? "completo" : "medio";
            } else {
                // fallback inscripción
                let rel = c.capacitacionTrabajadores?.find(
                    ct => ct.trabajador?.id === t.id
                );
                if(rel) estado = "medio";
            }

            html += `<td>
                <div class="circulo ${estado}"
                     onclick="cambiarEstado(${t.id}, ${c.id}, this)">
                </div>
            </td>`;
        });

        html += `</tr>`;
    });

    html += `</tbody></table>`;

    container.innerHTML = html;
}

function cambiarEstado(trabajadorId, capacitacionId, el){

    fetch("/matriz/actualizar-estado", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `trabajadorId=${trabajadorId}&capacitacionId=${capacitacionId}`
    });

    if(el.classList.contains("completo")){
        el.className = "circulo vacio";
    } 
    else if(el.classList.contains("medio")){
        el.className = "circulo completo";
    } 
    else {
        el.className = "circulo medio";
    }
}

</script>

</body>
</html>
