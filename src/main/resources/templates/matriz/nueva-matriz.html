<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Nueva Matriz</title>

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
body {
	background: linear-gradient(135deg, #0f172a, #1e293b);
	color: white;
	min-height: 100vh;
	font-family: 'Segoe UI';
}

.card-matriz {
	max-width: 900px;
	margin: 40px auto;
	background: rgba(255, 255, 255, .08);
	backdrop-filter: blur(15px);
	border-radius: 25px;
	padding: 35px;
	box-shadow: 0 15px 40px rgba(0, 0, 0, .35);
}

.step {
	background: rgba(255, 255, 255, .05);
	border-radius: 15px;
	padding: 20px;
	margin-bottom: 20px;
}

.step-title {
	font-size: 18px;
	font-weight: 600;
	margin-bottom: 15px;
}

.form-select, .form-control {
	background: rgba(255, 255, 255, .10);
	color: white;
	border: none;
}

.form-select option {
	color: black;
}

.skills-grid {
	display: flex;
	flex-wrap: wrap;
	gap: 12px;
}

.skill-card {
	background: rgba(255, 255, 255, .08);
	border-radius: 15px;
	padding: 12px;
	min-width: 180px;
}

.btn-next {
	background: linear-gradient(135deg, #3b82f6, #2563eb);
	border: none;
}
</style>

</head>

<body>

	<div class="card-matriz">

		<h2 class="mb-4">

			<i class="bi bi-diagram-3-fill"></i> Crear Nueva Matriz

		</h2>

		<form>

			<!-- AREA -->

			<div class="step">

				<div class="step-title">1. Seleccionar Área</div>

				<select class="form-select">

					<option value="">Seleccione...</option>

					<option th:each="area : ${areas}" th:value="${area.id}"
						th:text="${area.nombreArea}"></option>

				</select>

			</div>

			<!-- SUBAREA -->

			<div class="step">

				<div class="step-title">2. Seleccionar SubÁrea</div>

				<select class="form-select">

					<option value="">Seleccione...</option>

				</select>

			</div>

			<!-- TIPO -->

			<div class="step">

				<div class="step-title">3. Tipo de Trabajador</div>

				<div class="form-check">

					<input class="form-check-input" type="radio" name="tipo"
						value="HOURLY"> <label class="form-check-label">

						Hourly </label>

				</div>

				<div class="form-check">

					<input class="form-check-input" type="radio" name="tipo"
						value="SALARY"> <label class="form-check-label">

						Salary </label>

				</div>

			</div>

			<!-- MATRIZ -->

			<div class="step">

				<div class="step-title">4. Nombre de la Matriz</div>

				<input type="text" class="form-control"
					placeholder="Ej. Matriz Soldadura Nivel 1">

			</div>

			<!-- HABILIDADES -->

			<div class="step">

				<div class="step-title">5. Habilidades</div>

				<div class="skills-grid">

					<div class="skill-card">

						<input type="checkbox"> Soldar MIG

					</div>

					<div class="skill-card">

						<input type="checkbox"> Soldar TIG

					</div>

					<div class="skill-card">

						<input type="checkbox"> Interpretar Planos

					</div>

				</div>

				<div class="mt-3">

					<button type="button" class="btn btn-success">

						<i class="bi bi-plus-circle"></i> Nueva Habilidad

					</button>

				</div>

			</div>

			<div class="text-end">

				<button class="btn btn-primary btn-next">Continuar</button>

			</div>

		</form>

	</div>

</body>

</html>
