<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Seleccionar matriz</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- ICONOS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            font-family: 'Segoe UI';
        }

        .container-box {
            max-width: 800px;
            margin: 100px auto;
            text-align: center;
        }

        .title {
            margin-bottom: 30px;
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card-option {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            padding: 40px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-option:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .hourly {
            background: linear-gradient(135deg, #22c55e, #4ade80);
        }

        .salary {
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
        }

        .label {
            font-size: 18px;
            font-weight: 600;
        }

        .desc {
            font-size: 13px;
            opacity: 0.8;
        }

    </style>

</head>

<body>

<div class="container-box">

    <h2 class="title">Selecciona tipo de matriz</h2>

    <div class="grid">

        <!-- HOURLY -->
       <a href="/matriz/hourly" class="card-option hourly">

            <div class="icon">
                <i class="bi bi-person-gear"></i>
            </div>

            <div class="label">Trabajador por Hora</div>
            <div class="desc">Matriz para personal operativo</div>

        </a>

        <!-- SALARY -->
        <a href="/matriz/crear-salary?tipo=SALARY" class="card-option salary">

            <div class="icon">
                <i class="bi bi-person-badge"></i>
            </div>

            <div class="label">Trabajador Asalariado</div>
            <div class="desc">Matriz para personal administrativo</div>

        </a>

    </div>

</div>

</body>
</html>
