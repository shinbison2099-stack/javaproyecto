<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Skill Matrix HOURLY</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body{
            background:
            linear-gradient(135deg,#0f172a,#1e293b);

            color:white;
            font-family:'Segoe UI';
        }

        .container-fluid{
            margin-top:30px;
        }

        .card-box{

            background:
            rgba(255,255,255,0.08);

            backdrop-filter:blur(10px);

            border-radius:20px;

            padding:25px;

            box-shadow:
            0 10px 30px rgba(0,0,0,0.4);
        }

        table{

            background:white;
            color:black;

            border-radius:15px;
            overflow:hidden;
        }

        th{
            white-space:nowrap;
            vertical-align:middle;
            text-align:center;
        }

        td{
            vertical-align:middle;
            text-align:center;
        }

        .curso-header{

            min-width:180px;
            font-size:14px;
        }

        .trabajador{

            min-width:240px;
            text-align:left;
            font-weight:600;
        }

        /* ===================================== */
        /* 🔥 CIRCULOS */
        /* ===================================== */

        .circle{

            width:22px;
            height:22px;

            border-radius:50%;

            display:inline-block;

            border:2px solid #cbd5e1;
        }

        .vacio{
            background:transparent;
        }

        .programado{
            background:#3b82f6;
            border:none;
        }

        .capacitado{
            background:#facc15;
            border:none;
        }

        .experiencia{
            background:#fb923c;
            border:none;
        }

        .acreditado{
            background:#22c55e;
            border:none;
        }

        /* ===================================== */
        /* 🔥 LEYENDA */
        /* ===================================== */

        .legend{

            display:flex;
            gap:20px;
            flex-wrap:wrap;

            margin-bottom:20px;
        }

        .legend-item{

            display:flex;
            align-items:center;
            gap:8px;

            font-size:14px;
        }

        .title-box{

            display:flex;
            justify-content:space-between;
            align-items:center;

            margin-bottom:25px;
        }

    </style>

</head>

<body>

<div class="container-fluid">

    <div class="card-box">

        <!-- ===================================== -->
        <!-- 🔥 HEADER -->
        <!-- ===================================== -->

        <div class="title-box">

            <h2>

                <i class="bi bi-grid-3x3-gap-fill"></i>

                Skill Matrix HOURLY

            </h2>

            <a href="/matriz"
               class="btn btn-outline-light">

                <i class="bi bi-arrow-left"></i>

                Regresar

            </a>

        </div>

        <!-- ===================================== -->
        <!-- 🔥 LEYENDA -->
        <!-- ===================================== -->

        <div class="legend">

            <div class="legend-item">

                <span class="circle vacio"></span>

                Vacío

            </div>

            <div class="legend-item">

                <span class="circle programado"></span>

                Programado

            </div>

            <div class="legend-item">

                <span class="circle capacitado"></span>

                Capacitado

            </div>

            <div class="legend-item">

                <span class="circle experiencia"></span>

                40H

            </div>

            <div class="legend-item">

                <span class="circle acreditado"></span>

                Acreditado

            </div>

        </div>

        <!-- ===================================== -->
        <!-- 🔥 TABLA -->
        <!-- ===================================== -->

        <div class="table-responsive">

            <table class="table table-bordered table-hover">

                <!-- ===================================== -->
                <!-- 🔥 HEADER CURSOS -->
                <!-- ===================================== -->

                <thead class="table-dark">

                <tr>

                    <th class="trabajador">

                        Trabajador

                    </th>

                    <th class="curso-header"
                        th:each="cap : ${capacitaciones}"

                        th:text="${cap.nombreCapacitacion}">
                    </th>

                </tr>

                </thead>

                <!-- ===================================== -->
                <!-- 🔥 BODY -->
                <!-- ===================================== -->

                <tbody>

                <tr th:each="trab : ${trabajadores}">

                    <!-- ===================================== -->
                    <!-- 🔥 NOMBRE -->
                    <!-- ===================================== -->

                    <td class="trabajador">

                        <div>

                            <strong>

                                <span th:text="
                                ${trab.nombre}
                                +
                                ' '
                                +
                                ${trab.primerApellido}">
                                </span>

                            </strong>

                        </div>

                        <small>

                            <span th:text="
                            ${trab.puesto.nombrePuesto}">
                            </span>

                        </small>

                    </td>

                    <!-- ===================================== -->
                    <!-- 🔥 MATRIX -->
                    <!-- ===================================== -->

                    <td th:each="cap : ${capacitaciones}">

                        <a th:href="@{/evaluaciones/skill/edit/{trabajadorId}/{capId}
                        (
                        trabajadorId=${trab.id},
                        capId=${cap.id}
                        )}">

                            <!-- VACIO -->
                            <span th:if="
                            ${matrix[trab.id + '-' + cap.id] == null
                            ||
                            matrix[trab.id + '-' + cap.id].nivel.name() == 'VACIO'}"

                                  class="circle vacio">
                            </span>

                            <!-- PROGRAMADO -->
                            <span th:if="
                            ${matrix[trab.id + '-' + cap.id] != null
                            &&
                            matrix[trab.id + '-' + cap.id].nivel.name() == 'PROGRAMADO'}"

                                  class="circle programado">
                            </span>

                            <!-- CAPACITADO -->
                            <span th:if="
                            ${matrix[trab.id + '-' + cap.id] != null
                            &&
                            matrix[trab.id + '-' + cap.id].nivel.name() == 'CAPACITADO'}"

                                  class="circle capacitado">
                            </span>

                            <!-- EXPERIENCIA -->
                            <span th:if="
                            ${matrix[trab.id + '-' + cap.id] != null
                            &&
                            matrix[trab.id + '-' + cap.id].nivel.name() == 'EXPERIENCIA_40H'}"

                                  class="circle experiencia">
                            </span>

                            <!-- ACREDITADO -->
                            <span th:if="
                            ${matrix[trab.id + '-' + cap.id] != null
                            &&
                            matrix[trab.id + '-' + cap.id].nivel.name() == 'ACREDITADO'}"

                                  class="circle acreditado">
                            </span>

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
