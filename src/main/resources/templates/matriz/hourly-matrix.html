<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Skill Matrix HOURLY</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body{
            background:
            linear-gradient(135deg,#0f172a,#1e293b);

            color:white;
            font-family:'Segoe UI';
        }

        .container-fluid{
            margin-top:30px;
        }

        .card-box{

            background:
            rgba(255,255,255,0.08);

            backdrop-filter:blur(10px);

            border-radius:20px;

            padding:25px;

            box-shadow:
            0 10px 30px rgba(0,0,0,0.4);
        }

        table{

            background:white;
            color:black;

            border-radius:15px;
            overflow:hidden;
        }

        th{
            white-space:nowrap;
            vertical-align:middle;
            text-align:center;
        }

        td{
            vertical-align:middle;
            text-align:center;
        }

        .curso-header{

            min-width:180px;
            font-size:14px;
        }

        .trabajador{
     min-width:320px;
    text-align:left;
    font-weight:600;
}

/* ===================================== */
/* 🔥 FOTO TRABAJADOR */
/* ===================================== */

.worker-info{

    display:flex;

    align-items:center;

    gap:12px;
}

.worker-photo{

    width:50px;

    height:50px;

    border-radius:50%;

    object-fit:cover;

    border:2px solid #64748b;

    flex-shrink:0;
}

.worker-name{

    color:white;

    font-size:15px;

    font-weight:600;
}

.worker-position{

    color:#cbd5e1;

    font-size:12px;

    margin-top:2px;
}

.trabajador{
    min-width:240px;
}

        /* ===================================== */
        /* 🔥 CIRCULOS */
        /* ===================================== */

        .circle{
    font-size:28px;
    font-weight:bold;
}

.vacio::before{
    content:"○";
    color:#cbd5e1;
}

.programado::before{
    content:"◔";
    color:#3b82f6;
}

.capacitado::before{
    content:"◑";
    color:#facc15;
}

.experiencia::before{
    content:"◕";
    color:#fb923c;
}

.acreditado::before{
    content:"●";
    color:#22c55e;
}

        /* ===================================== */
        /* 🔥 LEYENDA */
        /* ===================================== */

        .legend{

            display:flex;
            gap:20px;
            flex-wrap:wrap;

            margin-bottom:20px;
        }

        .legend-item{

            display:flex;
            align-items:center;
            gap:8px;

            font-size:14px;
        }

        .title-box{

            display:flex;
            justify-content:space-between;
            align-items:center;

            margin-bottom:25px;
        }

    </style>

</head>

<body>

<div class="container-fluid">

    <div class="card-box">

        <!-- ===================================== -->
        <!-- 🔥 HEADER -->
        <!-- ===================================== -->

        <div class="title-box">

            <h2>

                <i class="bi bi-grid-3x3-gap-fill"></i>

                Skill Matrix HOURLY

            </h2>

            <a href="/matriz/hourly"
               class="btn btn-outline-light">

                <i class="bi bi-arrow-left"></i>

                Regresar

            </a>

        </div>

        <!-- ===================================== -->
        <!-- 🔥 LEYENDA -->
        <!-- ===================================== -->

        <div class="legend">

            <div class="legend-item">

                <span class="circle vacio"></span>

                Vacío

            </div>

            <div class="legend-item">

                <span class="circle programado"></span>

                Programado

            </div>

            <div class="legend-item">

                <span class="circle capacitado"></span>

                Capacitado

            </div>

            <div class="legend-item">

                <span class="circle experiencia"></span>

                40H

            </div>

            <div class="legend-item">

                <span class="circle acreditado"></span>

                Acreditado

            </div>

        </div>

        <!-- ===================================== -->
        <!-- 🔥 TABLA -->
        <!-- ===================================== -->

        <div class="table-responsive">

            <table class="table table-bordered table-hover">

                <!-- ===================================== -->
                <!-- 🔥 HEADER CURSOS -->
                <!-- ===================================== -->

                <thead class="table-dark">

                <tr>

                    <th class="trabajador">

                        Trabajador

                    </th>

                    <th class="curso-header"
                        th:each="cap : ${capacitaciones}"

                        th:text="${cap.nombreCapacitacion}">
                    </th>

                </tr>

                </thead>

                <!-- ===================================== -->
                <!-- 🔥 BODY -->
                <!-- ===================================== -->

                <tbody>

                <tr th:each="trab : ${trabajadores}">

                    <!-- ===================================== -->
                    <!-- 🔥 NOMBRE -->
                    <!-- ===================================== -->

                    <td class="trabajador">

    <div class="worker-info">

        <!-- FOTO -->

        <img class="worker-photo"

             th:if="${trab.foto != null}"

             th:src="@{/foto/{foto}(foto=${trab.foto})}"

             alt="Foto">

        <img class="worker-photo"

             th:if="${trab.foto == null}"

             src="https://cdn-icons-png.flaticon.com/512/149/149071.png"

             alt="Sin foto">

        <!-- DATOS -->

        <div>

            <div class="worker-name">

                <span th:text="
                ${trab.nombre}
                +
                ' '
                +
                ${trab.primerApellido}
                +
                ' '
                +
                ${trab.segundoApellido}">
                </span>

            </div>

            <div class="worker-position">

                <span th:text="${trab.puesto != null
                ? trab.puesto.nombrePuesto
                : 'Sin puesto asignado'}">
                </span>

            </div>

        </div>

    </div>

</td>

                    <!-- ===================================== -->
                    <!-- 🔥 MATRIX -->
                    <!-- ===================================== -->

                    <td th:each="cap : ${capacitaciones}">

                        <a th:href="@{/evaluaciones/skill/edit/{trabajadorId}/{capId}
                        (
                        trabajadorId=${trab.id},
                        capId=${cap.id}
                        )}">

                            <div th:with="
skill=${matrix[trab.id + '-' + cap.id]}
">

    <!-- ===================================== -->
    <!-- 🔥 VACIO -->
    <!-- ===================================== -->

    <span th:if="
    ${skill == null
    ||
    skill.fechaProgramada == null}"

          class="circle vacio">
    </span>

    <!-- ===================================== -->
    <!-- 🔥 PROGRAMADO -->
    <!-- ===================================== -->

    <span th:if="
    ${skill != null
    &&
    skill.fechaProgramada != null
    &&
    skill.evidenciaProgramado != null
    &&
    skill.fechaCapacitado == null}"

          class="circle programado">
    </span>

    <!-- ===================================== -->
    <!-- 🔥 CAPACITADO -->
    <!-- ===================================== -->

    <span th:if="
    ${skill != null
    &&
    skill.fechaCapacitado != null
    &&
    skill.evidenciaCapacitado != null
    &&
    skill.fechaExperiencia == null}"

          class="circle capacitado">
    </span>

    <!-- ===================================== -->
    <!-- 🔥 EXPERIENCIA -->
    <!-- ===================================== -->

    <span th:if="
    ${skill != null
    &&
    skill.fechaExperiencia != null
    &&
    skill.evidenciaExperiencia != null
    &&
    skill.horasExperiencia >= 40
    &&
    skill.fechaCertificado == null}"

          class="circle experiencia">
    </span>

    <!-- ===================================== -->
    <!-- 🔥 ACREDITADO -->
    <!-- ===================================== -->

    <span th:if="
    ${skill != null
    &&
    skill.fechaCertificado != null
    &&
    skill.evidenciaAcreditado != null}"

          class="circle acreditado">
    </span>

</div>

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
