<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ver matriz</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI';
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            display: block;
            overflow-x: auto;
        }

        th, td {
            border: 1px solid #334155;
            padding: 8px;
            text-align: center;
            min-width: 80px;
        }

        th {
            background: #1e293b;
        }

        thead th {
            position: sticky;
            top: 0;
        }

        th[colspan] {
            background: #0f172a;
            color: #38bdf8;
            font-weight: bold;
        }

        /* 🔥 SEMÁFORO */
        .semaforo {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            margin: auto;
            box-shadow: 0 0 8px rgba(0,0,0,0.5);
        }

        /* ⚪ NO INSCRITO */
        .vacio {
            background: #475569;
        }

        /* 🟡 INSCRITO */
        .medio {
            background: #facc15;
            box-shadow: 0 0 10px #facc15;
        }

        /* 🟢 APROBADO */
        .completo {
            background: #22c55e;
            box-shadow: 0 0 10px #22c55e;
        }

    </style>
</head>

<body>

<h2 style="color:#38bdf8;">
    📊 <span th:text="${nombreMatriz}"></span>
</h2>

<table>
<thead>

<tr>
    <th rowspan="2">ID</th>
    <th rowspan="2">Nombre</th>

    <th:block th:each="entry : ${capsPorCurso}">
        <th th:colspan="${#lists.size(entry.value)}"
            th:text="${entry.key}">
        </th>
    </th:block>

    <th rowspan="2">TOTAL</th>
</tr>

<tr>
    <th:block th:each="entry : ${capsPorCurso}">
        <th:block th:each="c : ${entry.value}">
            <th th:text="${c.nombreCapacitacion}"></th>
        </th:block>
    </th:block>
</tr>

</thead>

<tbody>

<tr th:each="t : ${trabajadores}">

    <td th:text="${t.id}"></td>

    <!-- 👤 NOMBRE + PUESTO -->
    <td style="display:flex; align-items:center; gap:10px;">

        <img th:src="@{/matriz/foto/{num}(num=${t.numeroPersonal})}"
             style="width:35px;height:35px;border-radius:50%;object-fit:cover;"
             onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">

        <div>
            <span th:text="${t.nombre + ' ' + t.primerApellido + ' ' + t.segundoApellido}"></span>
            <br>
            <span style="font-size:11px;color:#94a3b8;"
                  th:text="${t.puesto != null ? t.puesto.nombrePuesto : 'Sin puesto'}">
            </span>
        </div>

    </td>

    <!-- 🔥 MATRIZ -->
    <th:block th:each="entry : ${capsPorCurso}">
        <th:block th:each="c : ${entry.value}">

            <td th:with="
                estado=${matrizEstados[t.id] != null && matrizEstados[t.id][c.id] != null 
                        ? matrizEstados[t.id][c.id] 
                        : 'vacio'}
            ">

                <!-- 🔥 SEMÁFORO -->
                <div class="semaforo"
                     th:classappend="${estado}"
                     th:title="${estado == 'completo' ? 'Aprobado' : (estado == 'medio' ? 'Inscrito' : 'No inscrito')}">
                </div>

            </td>

        </th:block>
    </th:block>

    <!-- 🔥 TOTAL -->
    <td th:text="${totalPorTrabajador[t.id] + '%'}"
        th:style="${totalPorTrabajador[t.id] >= 80} ? 'color:#22c55e;font-weight:bold;' :
                  (${totalPorTrabajador[t.id] >= 50} ? 'color:#facc15;font-weight:bold;' :
                  'color:#ef4444;font-weight:bold;')">
    </td>

</tr>

</tbody>
</table>

</body>
</html>
