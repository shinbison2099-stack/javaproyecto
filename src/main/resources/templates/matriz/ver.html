<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ver matriz</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI';
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            display: block;
            overflow-x: auto;
        }

        th, td {
            border: 1px solid #334155;
            padding: 8px;
            text-align: center;
            min-width: 70px;
        }

        th {
            background: #1e293b;
        }

        thead th {
            position: sticky;
            top: 0;
        }

        .circulo {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            margin: auto;
        }

        .completo { background: #0ea5e9; }

        .medio {
            background: linear-gradient(to right, #0ea5e9 50%, transparent 50%);
            border: 2px solid #0ea5e9;
        }

        .vacio {
            border: 2px solid #64748b;
        }

        th[colspan] {
            background: #0f172a;
            color: #38bdf8;
            font-weight: bold;
        }
    </style>
</head>

<body>

	<h2 style="
	    text-transform: uppercase;
	    letter-spacing: 2px;
	    font-weight: 600;
	    color: #38bdf8;
	">
	    📊 <span th:text="${nombreMatriz}"></span>
	</h2>

<table>
<thead>

<!-- CURSOS -->
<tr>
    <th rowspan="2">ID</th>
    <th rowspan="2">Nombre</th>

    <th:block th:each="entry : ${capsPorCurso}">
        <th th:colspan="${#lists.size(entry.value)}"
            th:text="${entry.key}">
        </th>
    </th:block>
</tr>

<!-- CAPACITACIONES -->
<tr>
    <th:block th:each="entry : ${capsPorCurso}">
        <th:block th:each="c : ${entry.value}">
            <th th:text="${c.nombreCapacitacion}"></th>
        </th:block>
    </th:block>
</tr>

</thead>

<tbody>

<tr th:each="t : ${trabajadores}">
    <td th:text="${t.id}"></td>
	<td style="display:flex; align-items:center; gap:10px;">

	    <img th:src="@{/foto/{num}(num=${t.numeroPersonal})}"
	         style="
	            width:35px;
	            height:35px;
	            border-radius:50%;
	            object-fit:cover;
	            border:2px solid #334155;
	         "
	         onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">

	    <span th:text="${t.nombre + ' ' + t.primerApellido + ' ' + t.segundoApellido}"></span>

	</td>

    <th:block th:each="entry : ${capsPorCurso}">
        <th:block th:each="c : ${entry.value}">
            <td>
                <div class="circulo"
                     th:classappend="${matrizEstados[t.id] != null && matrizEstados[t.id][c.id] != null 
                                      ? matrizEstados[t.id][c.id] 
                                      : 'vacio'}">
                </div>
            </td>
        </th:block>
    </th:block>

</tr>

</tbody>
</table>

</body>
</html>
