<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Matriz HOURLY</title>

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>
body {
	background: linear-gradient(135deg, #0f172a, #1e293b);
	color: white;
	font-family: 'Segoe UI';
}

.grid {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
	gap: 20px;
}

.card-course {
	background: rgba(255, 255, 255, .08);
	padding: 30px;
	border-radius: 20px;
	text-align: center;
	text-decoration: none;
	color: white;
	transition: .3s;
}

.card-course:hover {
	transform: translateY(-5px);
	color: white;
}
</style>

</head>

<body>

	<div class="container mt-5">

		<h2 class="mb-4">📚 Seleccionar Curso</h2>

		<div class="grid">

			<a th:each="curso : ${cursos}"
				th:href="@{/matriz/hourly/curso/{id}(id=${curso.id})}"
				class="card-course">

				<h4 th:text="${curso.nombreCurso}"></h4>

			</a>

		</div>

	</div>

</body>

</html>
