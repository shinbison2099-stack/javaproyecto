<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8" />
    <title>Instructores PDF</title>

    <style>
        body {
            font-family: Arial;
            font-size: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #000;
            padding: 6px;
            text-align: left;
        }

        th {
            background: #eee;
        }
    </style>
</head>

<body>

<h2>Lista de Instructores</h2>

<table>
    <thead>
        <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Tipo</th>
            <th>Activo</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="instructor, iterStat : ${instructores}">
            <td th:text="${iterStat.count}"></td>
            <td th:text="${instructor.nombre}"></td>
            <td th:text="${instructor.email}"></td>
            <td th:text="${instructor.tipo}"></td>
            <td th:text="${instructor.activo} ? 'Sí' : 'No'"></td>
        </tr>
    </tbody>
</table>

</body>
</html>
