<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Instructores</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Iconos -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap" rel="stylesheet">

    <style>

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', sans-serif;
            color: #e2e8f0;
        }

        /* 🔥 EFECTO WINDOWS */
        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: #3b82f6;
            filter: blur(120px);
            top: 10%;
            left: 10%;
            z-index: -1;
        }

        /* 🔥 CONTENEDOR */
        .container-box {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);

            padding: 25px;
            border-radius: 20px;

            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        h2 {
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* 🔥 BOTONES */
        .btn {
            border-radius: 10px;
            transition: 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        /* 🔥 TABLA */
        table {
            color: white;
        }

		thead th {
		    position: sticky;
		    top: 0;
		    background: #1e293b;
		    z-index: 2;
		}

        tbody tr {
            transition: 0.2s;
        }

        tbody tr:hover {
            background: rgba(255,255,255,0.05);
        }

        /* 🔥 INPUT FILE */
        input[type="file"] {
            background: rgba(255,255,255,0.05);
            color: white;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

    </style>
</head>

<body>

<div class="bg-glow"></div>

<div th:replace="~{fragments/menu :: menu}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="container mt-4">

    <div class="container-box">

        <h2>👨‍🏫 Lista de Instructores</h2>

        <!-- BOTONES -->
        <div class="d-flex align-items-center gap-3 mb-3 flex-wrap">

            <a href="/instructores/nuevo" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Nuevo
            </a>

            <a href="/instructores/pdf" class="btn btn-danger">
                <i class="bi bi-file-earmark-pdf"></i> PDF
            </a>

            <a href="/instructores/eliminados" class="btn btn-dark">
                <i class="bi bi-trash"></i> Eliminados
            </a>

            <form action="/instructores/importar"
                  method="post"
                  enctype="multipart/form-data"
                  class="d-flex align-items-center gap-2">

                <input type="file"
                       name="archivo"
                       class="form-control"
                       style="max-width:250px"
                       required>

                <button type="submit" class="btn btn-success">
                    <i class="bi bi-upload"></i>
                </button>

                <a href="/instructores/plantilla" class="btn btn-info">
                    <i class="bi bi-download"></i>
                </a>

            </form>

        </div>

        <!-- TABLA -->
     <div class="table-responsive" style="height:calc(100vh - 200px); overflow-y:auto;">

            <table class="table table-bordered align-middle text-center">

				<thead>
				<tr>
				    <th>#</th>
				    <th>Nombre</th>
				    <th>Email</th>
				    <th>Tipo</th> <!-- 🔥 NUEVO -->
				    <th>Activo</th>
				    <th>Acciones</th>
				</tr>
				</thead>

				<tbody>
				<tr th:each="instructor, iterStat : ${instructores}">

				    <td th:text="${iterStat.count}"></td>
				    <td th:text="${instructor.nombre}"></td>
				    <td th:text="${instructor.email}"></td>

				    <!-- 🔥 TIPO DE INSTRUCTOR -->
					<td>

					    <!-- INTERNO -->
					    <span th:if="${instructor.tipo != null and instructor.tipo.name() == 'INTERNO'}"
					          class="badge bg-primary">
					        Interno
					    </span>

					    <!-- EXTERNO -->
					    <span th:if="${instructor.tipo != null and instructor.tipo.name() == 'EXTERNO'}"
					          class="badge bg-warning text-dark">
					        Externo
					    </span>

					    <!-- NULL -->
					    <span th:if="${instructor.tipo == null}"
					          class="badge bg-secondary">
					        Sin definir
					    </span>

					</td>

				    <!-- ACTIVO -->
				    <td>
				        <span th:if="${instructor.activo}"
				              class="badge bg-success">Activo</span>

				        <span th:if="${!instructor.activo}"
				              class="badge bg-secondary">Inactivo</span>
				    </td>

				    <!-- ACCIONES -->
				    <td>
				        <a th:href="@{/instructores/editar/{id}(id=${instructor.id})}"
				           class="btn btn-warning btn-sm">
				            <i class="bi bi-pencil"></i>
				        </a>

				        <a th:href="@{/instructores/eliminar/{id}(id=${instructor.id})}"
				           class="btn btn-danger btn-sm"
				           onclick="return confirm('¿Eliminar instructor?')">
				            <i class="bi bi-trash"></i>
				        </a>
				    </td>

				</tr>
				</tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
