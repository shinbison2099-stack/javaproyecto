<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
	    <title>Instructores</title>

	    <!-- Bootstrap -->
	    <link rel="stylesheet"
	          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

	    <!-- 🔥 ICONOS (TE FALTABA O ESTÁ MAL UBICADO) -->
	    <link rel="stylesheet"
	          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

	    <!-- CSS -->
	    <link rel="stylesheet" th:href="@{/css/menu.css}">
	    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
	</head>

<body>

	<div th:replace="~{fragments/menu :: menu}"></div>
	<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="container mt-4">

    <h2>Lista de Instructores</h2>

    <!-- BOTONES -->
	<div class="d-flex align-items-center gap-3 mb-3 flex-wrap">

	    <a href="/instructores/nuevo" class="btn btn-primary">
	        <i class="bi bi-plus-circle"></i> Nuevo Instructor
	    </a>

	    <a href="/instructores/pdf" class="btn btn-danger">
	        <i class="bi bi-file-earmark-pdf"></i> Exportar PDF
	    </a>

	    <a href="/instructores/eliminados" class="btn btn-dark">
	        <i class="bi bi-trash"></i> Instructores Eliminados
	    </a>

	    <form action="/instructores/importar"
	          method="post"
	          enctype="multipart/form-data"
	          class="d-flex align-items-center gap-2">

	        <input type="file"
	               name="archivo"
	               class="form-control"
	               style="max-width:250px"
	               required>

	        <button type="submit" class="btn btn-success">
	            <i class="bi bi-upload"></i> Importar Excel
	        </button>
			
			<a href="/instructores/plantilla" class="btn btn-info">
			    <i class="bi bi-download"></i> Descargar plantilla
			</a>

	    </form>

	</div>

    <!-- TABLA -->
	<div class="table-responsive" style="max-height:500px; overflow-y:auto;">

	    <table class="table table-bordered">

	        <thead>
	        <tr>
	            <th>#</th>
	            <th>Nombre</th>
	            <th>Email</th>
	            <th>Activo</th>
	            <th>Acciones</th>
	        </tr>
	        </thead>

	        <tbody>
	        <tr th:each="instructor, iterStat : ${instructores}">

	            <td th:text="${iterStat.count}"></td>
	            <td th:text="${instructor.nombre}"></td>
	            <td th:text="${instructor.email}"></td>
	            <td th:text="${instructor.activo} ? 'Sí' : 'No'"></td>

	            <td>
	                <a th:href="@{/instructores/editar/{id}(id=${instructor.id})}"
	                   class="btn btn-warning btn-sm">
	                    Editar
	                </a>

	                <a th:href="@{/instructores/eliminar/{id}(id=${instructor.id})}"
	                   class="btn btn-danger btn-sm"
	                   onclick="return confirm('¿Eliminar instructor?')">
	                    Eliminar
	                </a>
	            </td>

	        </tr>
	        </tbody>

	    </table>

	</div>

</div>

</body>
</html>
