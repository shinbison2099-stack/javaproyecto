<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Instructor</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Iconos -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', sans-serif;
            color: #e2e8f0;
        }

        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: #3b82f6;
            filter: blur(120px);
            top: 10%;
            left: 10%;
            z-index: -1;
        }

        .container-box {
            max-width: 600px;
            margin: auto;
            margin-top: 40px;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        h2 {
            font-weight: 600;
            margin-bottom: 20px;
        }

        input, select {
            background: rgba(255,255,255,0.05) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: white !important;
            border-radius: 10px !important;
        }

        input:focus, select:focus {
            outline: none !important;
            border: 1px solid #3b82f6 !important;
            box-shadow: 0 0 10px rgba(59,130,246,0.5);
        }

        .btn {
            border-radius: 10px;
            transition: 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e, #4ade80);
            border: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #64748b, #94a3b8);
            border: none;
        }
		
		select {
		    color: white !important;
		}

		/* cuando se abre el dropdown */
		select:focus option {
		    color: black;
		}
    </style>
</head>

<body>

<div class="bg-glow"></div>

<div th:replace="~{fragments/menu :: menu}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="container mt-4">
    <div class="container-box">

        <h2>👨‍🏫 Instructor</h2>

        <!-- ERROR -->
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <form th:action="${instructor.id == null} ? 
                         @{/instructores/guardar} : 
                         @{/instructores/actualizar}"
              th:object="${instructor}"
              method="post">

            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{activo}" value="true">
            <input type="hidden" th:field="*{rol}" 
                   th:value="${instructor.rol != null ? instructor.rol : 'INSTRUCTOR'}">

            <!-- NOMBRE -->
            <div class="mb-3">
                <label>Nombre</label>
                <input type="text" th:field="*{nombre}" class="form-control" required>
            </div>

            <!-- EMAIL -->
            <div class="mb-3">
                <label>Email</label>
                <input type="email" th:field="*{email}" class="form-control" required>
            </div>

            <!-- PASSWORD -->
            <div class="mb-3">
                <label>Password</label>
                <input type="password" th:field="*{password}" class="form-control">
            </div>

            <!-- 🔥 NUEVO: TIPO DE INSTRUCTOR -->
            <div class="mb-3">
                <label>Tipo de Instructor</label>
                <select th:field="*{tipo}" class="form-control" required>
                    <option value="">-- Selecciona --</option>
                    <option value="INTERNO">Interno</option>
                    <option value="EXTERNO">Externo</option>
                </select>
            </div>

            <!-- BOTONES -->
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">
                    💾 Guardar
                </button>

                <a href="/instructores" class="btn btn-secondary">
                    Cancelar
                </a>
            </div>

        </form>

    </div>
</div>

</body>
</html>
