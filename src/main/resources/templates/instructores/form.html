<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Instructor</title>
	
	<!-- Bootstrap -->
	    <link rel="stylesheet"
	          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

	    <!-- 🔥 ICONOS (TE FALTABA O ESTÁ MAL UBICADO) -->
	    <link rel="stylesheet"
	          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

	    <!-- CSS -->
	    <link rel="stylesheet" th:href="@{/css/menu.css}">
	    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>
	
	<div th:replace="~{fragments/menu :: menu}"></div>
	<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="container mt-4">

    <h2>Instructor</h2>

    <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <form th:action="${instructor.id == null} ?
                     @{/instructores/guardar} :
                     @{/instructores/actualizar}"
          th:object="${instructor}"
          method="post">

        <!-- ID -->
        <input type="hidden" th:field="*{id}">

        <!-- Mantener activo -->
        <input type="hidden" th:field="*{activo}" value="true">

        <!-- Mantener rol -->
        <input type="hidden" th:field="*{rol}" th:value="${instructor.rol != null ? instructor.rol : 'INSTRUCTOR'}">

        <div class="mb-3">

            <label>Nombre</label>

            <input type="text"
                   th:field="*{nombre}"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label>Email</label>

            <input type="email"
                   th:field="*{email}"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label>Password</label>

            <input type="text"
                   th:field="*{password}"
                   class="form-control">

        </div>

        <button type="submit" class="btn btn-success">
            Guardar
        </button>

        <a href="/instructores" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

</body>

</html>
