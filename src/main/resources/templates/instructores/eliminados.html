<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Instructores Eliminados</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Iconos -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <style>
        thead th {
            position: sticky;
            top: 0;
            background: white;
            z-index: 2;
        }
    </style>

</head>

<body>

<div th:replace="~{fragments/menu :: menu}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="container mt-4">

    <h2>🗑 Instructores Eliminados</h2>

    <a href="/instructores" class="btn btn-secondary mb-3">
        <i class="bi bi-arrow-left"></i> Volver
    </a>

    <!-- 🔥 TABLA CON SCROLL -->
    <div class="table-responsive" style="max-height:500px; overflow-y:auto;">

        <table class="table table-bordered">

            <thead>
            <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Restaurar</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="instructor, iterStat : ${instructores}">

                <!-- 🔥 ENUMERACIÓN -->
                <td th:text="${iterStat.count}"></td>

                <td th:text="${instructor.nombre}"></td>

                <td th:text="${instructor.email}"></td>

                <td>

                    <a th:href="@{/instructores/restaurar/{id}(id=${instructor.id})}"
                       class="btn btn-success btn-sm">

                        <i class="bi bi-arrow-clockwise"></i> Restaurar

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>

</html>
