<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Instructores Eliminados</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Iconos -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
            font-family: 'Segoe UI';
        }

        /* 🔥 EFECTO WINDOWS */
        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: #3b82f6;
            filter: blur(120px);
            top: 10%;
            left: 10%;
            z-index: -1;
        }

        .container-box {
            max-width: 1100px;
            margin: auto;
            margin-top: 40px;

            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);

            padding: 25px;
            border-radius: 20px;

            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        table {
            color: white;
        }

        thead th {
            position: sticky;
            top: 0;
            background: #1e293b;
            z-index: 2;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #f87171);
            border: none;
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e, #4ade80);
            border: none;
        }

        .btn:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

    </style>

</head>

<body>

<div class="bg-glow"></div>

<div th:replace="~{fragments/menu :: menu}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="container mt-4">

    <div class="container-box">

        <h2>🗑 Instructores Eliminados</h2>

        <div class="d-flex gap-2 mb-3">

            <a href="/instructores" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Volver
            </a>

            <!-- 🔥 ELIMINAR MASIVO -->
            <button class="btn btn-danger" onclick="confirmarEliminacion()">
                <i class="bi bi-trash"></i> Eliminar seleccionados
            </button>

        </div>

        <!-- 🔥 FORM MASIVO -->
        <form id="formEliminar" method="post" action="/instructores/eliminar-masivo">

            <div class="table-responsive" style="max-height:70vh; overflow-y:auto;">

                <table class="table table-bordered table-dark">

                    <thead>
                    <tr>
                        <th>
                            <input type="checkbox" onclick="toggleAll(this)">
                        </th>
                        <th>#</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Restaurar</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="instructor, iterStat : ${instructores}">

                        <!-- CHECK -->
                        <td>
                            <input type="checkbox" name="ids"
                                   th:value="${instructor.id}">
                        </td>

                        <td th:text="${iterStat.count}"></td>

                        <td th:text="${instructor.nombre}"></td>

                        <td th:text="${instructor.email}"></td>

                        <td>
                            <a th:href="@{/instructores/restaurar/{id}(id=${instructor.id})}"
                               class="btn btn-success btn-sm">
                                <i class="bi bi-arrow-clockwise"></i>
                            </a>
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </form>

    </div>

</div>

<!-- 🔥 MODAL CONFIRMACIÓN -->
<div class="modal fade" id="modalConfirm" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white">

            <div class="modal-header">
                <h5 class="modal-title">⚠️ Confirmación</h5>
            </div>

            <div class="modal-body">
                Esta acción eliminará permanentemente los registros seleccionados.
                <br><br>
                <strong>NO se puede deshacer.</strong>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-danger" onclick="enviarForm()">Eliminar</button>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

function toggleAll(source){
    const checkboxes = document.querySelectorAll('input[name="ids"]');
    checkboxes.forEach(cb => cb.checked = source.checked);
}

function confirmarEliminacion(){

    const seleccionados = document.querySelectorAll('input[name="ids"]:checked');

    if(seleccionados.length === 0){
        alert("Selecciona al menos un registro");
        return;
    }

    let modal = new bootstrap.Modal(document.getElementById('modalConfirm'));
    modal.show();
}

function enviarForm(){
    document.getElementById("formEliminar").submit();
}

</script>

</body>
</html>
