<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Eliminados</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <!-- 🔥 WINDOWS 11 STYLE -->
    <style>

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', sans-serif;
            color: #e2e8f0;
        }

        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: #3b82f6;
            filter: blur(120px);
            top: 10%;
            left: 10%;
            z-index: -1;
        }

        .card {
            background: rgba(30,41,59,0.65);
            backdrop-filter: blur(18px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .card-header {
            background: transparent;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        h4 {
            color: #f8fafc;
            font-weight: 600;
        }

        .table {
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
        }

        thead th {
            background: linear-gradient(135deg, #1e293b, #334155);
            color: white;
            border-bottom: 2px solid #3b82f6;
        }

        .table tbody td {
            color: #e2e8f0;
            border-color: rgba(255,255,255,0.05);
        }

        .table tbody tr:hover {
            background: rgba(59,130,246,0.1);
        }

        .btn {
            border-radius: 10px;
            transition: 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e, #4ade80);
            border: none;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #f87171);
            border: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #64748b, #94a3b8);
            border: none;
        }

        .table-responsive {
            max-height: 450px;
            overflow-y: auto;
        }

    </style>

</head>

<body>

<div class="bg-glow"></div>

<div th:replace="~{fragments/menu :: menu}"></div>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header d-flex justify-content-between align-items-center">

            <h4>
                <i class="bi bi-mortarboard"></i>
                Lista de Eliminados
            </h4>

            <a href="/cursos" class="btn btn-secondary btn-sm">
                <i class="bi bi-arrow-left"></i>
            </a>

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table align-middle text-center">

                    <thead>
                    <tr>
                        <th>Clave</th>
                        <th>Nombre</th>
                        <th>Instructor</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="cap : ${capacitaciones}">

                        <td th:text="${cap.claveCapacitacion}"></td>

                        <td th:text="${cap.nombreCapacitacion}"></td>

                        <!-- 🔥 CORREGIDO -->
                        <td th:text="${cap.instructor != null ? cap.instructor.nombre : 'Sin instructor'}"></td>

                        <td>

                            <div class="d-flex justify-content-center gap-2 flex-wrap">

                                <!-- RESTAURAR -->
                                <a th:href="@{/capacitaciones/restaurar-capacitacion/{id}(id=${cap.id})}"
                                   class="btn btn-success btn-sm">
                                    <i class="bi bi-arrow-clockwise"></i>
                                </a>

                                <!-- ELIMINAR DEFINITIVO -->
                                <a th:href="@{/capacitaciones/eliminar-definitivo/{id}(id=${cap.id})}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirmarEliminacion()">
                                    <i class="bi bi-trash"></i>
                                </a>

                            </div>

                        </td>

                    </tr>

                    <!-- 🔥 MENSAJE SI VACÍO -->
                    <tr th:if="${#lists.isEmpty(capacitaciones)}">
                        <td colspan="4" class="text-muted">
                            No hay capacitaciones disponibles
                        </td>
                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<!-- 🔥 ALERTA -->
<script>
function confirmarEliminacion() {
    return confirm("⚠️ Esta acción eliminará la capacitación PERMANENTEMENTE.\n\nNo se podrá deshacer.\n\n¿Deseas continuar?");
}
</script>

</body>

</html>
