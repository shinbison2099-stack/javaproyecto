<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>Detalle Curso</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

	<link rel="stylesheet" th:href="@{/css/menu.css}">

</head>

<body>

	<div th:replace="~{fragments/menu :: menu}"></div>

	<table class="table table-bordered">

		<thead>
			<tr>
				<th>Clave</th>
				<th>Nombre</th>
				<th>Instructor</th>
				<th>Acciones</th>
			</tr>
		</thead>

		<tbody>

			<tr th:each="cap : ${capacitaciones}">

				<td th:text="${cap.claveCapacitacion}"></td>
				<td th:text="${cap.nombreCapacitacion}"></td>
				<td th:text="${cap.instructor.nombre}"></td>

				<td>

					<a th:href="@{/capacitaciones/restaurar-capacitacion/{id}(id=${cap.id})}"
					   class="btn btn-success">
					   Restaurar
					</a>

						
					</a>

				</td>

			</tr>

		</tbody>

	</table>


</body>
