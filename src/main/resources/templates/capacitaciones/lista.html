<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Capacitaciones</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

</head>

<body class="bg-light">

    <div th:replace="~{fragments/menu :: menu}"></div>

    <div class="container mt-4">

        <div class="card shadow">

            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h3 class="mb-0">
                    <i class="bi bi-mortarboard"></i>
                    Capacitaciones
                </h3>
            </div>

            <div class="card-body">

                <div class="d-flex gap-2 mb-3 flex-wrap">

                    <a href="/capacitaciones/nuevo" class="btn btn-primary">
                        <i class="bi bi-plus-circle"></i>
                        Nueva capacitación
                    </a>

                    <a href="/capacitaciones/eliminadas" class="btn btn-secondary">
                        <i class="bi bi-trash"></i>
                        Ver eliminadas
                    </a>
					
					<a href="/capacitaciones/pdf" class="btn btn-danger">
					       Exportar PDF
					   </a>

					   <form action="/capacitaciones/importar"
					         method="post"
					         enctype="multipart/form-data"
					         class="d-flex gap-2">

					       <input type="file"
					              name="archivo"
					              class="form-control"
					              style="max-width:250px"
					              required>

					       <button type="submit" class="btn btn-success">
					           Importar Excel
					       </button>

					   </form>

                </div>

                <div class="table-responsive">

                    <table class="table table-bordered table-hover align-middle text-center">

                        <thead class="table-dark">

                            <tr>
                                <th style="width: 15%;">Clave</th>
                                <th style="width: 30%;">Nombre</th>
                                <th style="width: 15%;">Duración</th>
                                <th style="width: 20%;">Instructor</th>
                                <th style="width: 20%;">Acciones</th>
                            </tr>

                        </thead>

                        <tbody>

                            <tr th:each="cap : ${capacitaciones}">

                                <td th:text="${cap.claveCapacitacion}"></td>

                                <td class="text-start" th:text="${cap.nombreCapacitacion}"></td>

                                <td th:text="${cap.duracionHoras != null ? cap.duracionHoras + ' hrs' : 'Sin duración'}"></td>

                                <td th:text="${cap.instructor != null ? cap.instructor.nombre : 'Sin instructor'}"></td>

                                <td>
                                    <div class="d-flex justify-content-center gap-2 flex-wrap">

                                        <a th:href="@{/capacitaciones/{id}(id=${cap.id})}" class="btn btn-info btn-sm text-white">
                                            <i class="bi bi-eye"></i>
                                            Ver
                                        </a>

                                        <a th:href="@{/capacitaciones/editar/{id}(id=${cap.id})}" class="btn btn-warning btn-sm">
                                            <i class="bi bi-pencil-square"></i>
                                            Editar
                                        </a>

                                        <a th:href="@{/capacitaciones/eliminar/{id}(id=${cap.id})}"
                                           class="btn btn-danger btn-sm"
                                           onclick="return confirm('¿Eliminar capacitación?')">
                                            <i class="bi bi-trash"></i>
                                            Eliminar
                                        </a>

                                    </div>
                                </td>

                            </tr>

                            <tr th:if="${#lists.isEmpty(capacitaciones)}">
                                <td colspan="5" class="text-center text-muted">
                                    No hay capacitaciones registradas
                                </td>
                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
