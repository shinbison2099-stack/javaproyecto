<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Detalle Capacitación</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet" th:href="@{/css/menu.css}">
</head>

<body>

<div th:replace="~{fragments/menu :: menu}"></div>

<div class="container mt-4">

    <!-- TITULO -->
    <div class="d-flex justify-content-between align-items-center">
        <h2 th:text="${capacitacion.nombreCapacitacion}"></h2>

        <!-- 🔥 BOTÓN VER ELIMINADOS -->
        <a th:href="@{/capacitaciones/{id}/eliminados(id=${capacitacion.id})}"
           class="btn btn-secondary">
            Ver eliminados
        </a>
    </div>

    <hr>

    <!-- INSCRIBIR -->
    <h4>Inscribir trabajador</h4>

    <form th:action="@{/capacitaciones/{id}/inscribir(id=${capacitacion.id})}"
          method="post"
          class="row g-2">

        <div class="col-md-6">
            <select name="trabajadorId" class="form-control" required>
                <option value="">Seleccione trabajador</option>

                <option th:each="t : ${trabajadores}"
                        th:value="${t.id}"
                        th:text="${t.nombre + ' ' + t.primerApellido + ' ' + t.segundoApellido}">
                </option>
            </select>
        </div>

        <div class="col-md-2">
            <button type="submit" class="btn btn-success w-100">
                Inscribir
            </button>
        </div>

        <div th:if="${param.error}" class="alert alert-danger mt-2">
            El trabajador ya está inscrito en esta capacitación
        </div>

    </form>

    <hr>

    <!-- TABLA -->
    <h4>Trabajadores inscritos</h4>

    <table class="table table-bordered table-striped mt-3">

        <thead class="table-dark">
        <tr>
            <th>Trabajador</th>
            <th>Fecha</th>
            <th>Calificar</th>
            <th>Calificación</th>
            <th>Estatus</th>
            <th>Acción</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="ins : ${inscripciones}">

            <!-- NOMBRE -->
            <td th:text="${ins.trabajador.nombre + ' ' + ins.trabajador.primerApellido + ' ' + ins.trabajador.segundoApellido}"></td>

            <!-- FECHA -->
            <td th:text="${ins.fechaInscripcion}"></td>

            <!-- FORM CALIFICAR -->
			<td>

			    <!-- 🟢 SI NO TIENE CALIFICACIÓN -->
			    <form th:if="${evaluaciones[ins.trabajador.id] == null}"
			          action="/evaluaciones/calificar"
			          method="post"
			          class="d-flex gap-2">

			        <input type="hidden"
			               name="trabajadorId"
			               th:value="${ins.trabajador.id}">

			        <input type="hidden"
			               name="capacitacionId"
			               th:value="${capacitacion.id}">

			        <input type="number"
			               name="calificacion"
			               min="0"
			               max="10"
			               class="form-control form-control-sm"
			               placeholder="0-10"
			               required>

			        <button class="btn btn-success btn-sm">
			            Guardar
			        </button>

			    </form>

			    <!-- 🟡 SI YA TIENE CALIFICACIÓN -->
			    <div th:if="${evaluaciones[ins.trabajador.id] != null}"
			         class="d-flex gap-2 align-items-center">

			        <span class="fw-bold"
			              th:text="${evaluaciones[ins.trabajador.id].calificacion}">
			        </span>

			        <a th:href="@{/evaluaciones/editar(
			                trabajadorId=${ins.trabajador.id},
			                capacitacionId=${capacitacion.id})}"
			           class="btn btn-warning btn-sm">
			            Editar
			        </a>

			    </div>

			</td>

            <!-- CALIFICACION -->
            <td>
                <span th:text="${evaluaciones[ins.trabajador.id] != null ? evaluaciones[ins.trabajador.id].calificacion : 'Sin calificar'}"></span>
            </td>

            <!-- ESTATUS -->
            <td>
                <span th:if="${evaluaciones[ins.trabajador.id] != null and evaluaciones[ins.trabajador.id].aprobada}"
                      class="badge bg-success">
                    Aprobado
                </span>

                <span th:if="${evaluaciones[ins.trabajador.id] != null and !evaluaciones[ins.trabajador.id].aprobada}"
                      class="badge bg-danger">
                    Reprobado
                </span>

                <span th:if="${evaluaciones[ins.trabajador.id] == null}"
                      class="badge bg-secondary">
                    Pendiente
                </span>
            </td>

            <!-- 🔥 ACCIONES -->
            <td>

                <!-- BOTÓN QUITAR (BORRADO LÓGICO) -->
                <a th:href="@{/capacitaciones/{capId}/desinscribir/{trabajadorId}
                (capId=${capacitacion.id}, trabajadorId=${ins.trabajador.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Seguro que deseas quitar al trabajador?')">
                   Quitar
                </a>

            </td>

        </tr>

        <tr th:if="${#lists.isEmpty(inscripciones)}">
            <td colspan="6" class="text-center text-muted">
                No hay trabajadores inscritos
            </td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
