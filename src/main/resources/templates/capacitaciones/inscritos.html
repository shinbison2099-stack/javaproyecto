<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Trabajadores Inscritos</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{
    background:#0f172a;
    color:white;
}

.card-box{
    background:#1e293b;
    border-radius:15px;
    padding:25px;
    margin-top:30px;
}

.table{
    color:white;
}

.table th{
    background:#334155;
}

.badge-estado{
    font-size:12px;
}

.foto{
    width:45px;
    height:45px;
    border-radius:50%;
    object-fit:cover;
}

</style>

</head>

<body>

<div class="container">

    <div class="card-box">

        <h2>

            <i class="bi bi-people-fill"></i>

            Trabajadores Inscritos

        </h2>

        <hr>

        <table class="table table-bordered table-hover">

            <thead>

            <tr>

                <th>#</th>

                <th>Foto</th>

                <th>No. Personal</th>

                <th>Nombre</th>

                <th>Estado</th>

                <th>Acciones</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="i,stat : ${inscritos}">

                <td th:text="${stat.count}"></td>

                <td>

                    <img
                        th:if="${i.trabajador.foto != null}"
                        th:src="${i.trabajador.foto}"
                        class="foto">

                    <img
                        th:if="${i.trabajador.foto == null}"
                        src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                        class="foto">

                </td>

                <td
                    th:text="${i.trabajador.numeroPersonal}">
                </td>

                <td
                    th:text="${i.trabajador.nombre}">
                </td>

                <td>

                    <span
                        class="badge bg-primary badge-estado"
                        th:text="${i.nivel}">
                    </span>

                </td>

                <td>

                    <a
                       th:href="@{/capacitacion-trabajador/eliminar/{id}(id=${i.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Desinscribir trabajador?')">

                        <i class="bi bi-person-x-fill"></i>

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

        <a
           th:href="@{/cursos/asignados}"
           class="btn btn-secondary">

            <i class="bi bi-arrow-left"></i>

            Regresar

        </a>

    </div>

</div>

</body>

</html>
