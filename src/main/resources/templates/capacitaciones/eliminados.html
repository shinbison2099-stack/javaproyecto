<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Trabajadores eliminados</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet" th:href="@{/css/menu.css}">

</head>

<body>

<div th:replace="~{fragments/menu :: menu}"></div>

<div class="container mt-4">

    <!-- 🔥 TITULO -->
    <div class="d-flex justify-content-between align-items-center">
        <h2>
            Trabajadores eliminados -
            <span th:text="${capacitacion.nombreCapacitacion}"></span>
        </h2>

        <!-- 🔙 REGRESAR -->
        <a th:href="@{/capacitaciones/{id}(id=${capacitacion.id})}"
           class="btn btn-primary">
            Regresar
        </a>
    </div>

    <hr>

    <!-- 🔥 TABLA -->
    <table class="table table-bordered table-striped mt-3">

        <thead class="table-dark">
        <tr>
            <th>Trabajador</th>
            <th>Fecha inscripción</th>
            <th>Calificación</th>
            <th>Estatus</th>
            <th>Acción</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="ins : ${inscripciones}">

            <!-- NOMBRE -->
            <td th:text="${ins.trabajador.nombre + ' ' + ins.trabajador.primerApellido + ' ' + ins.trabajador.segundoApellido}">
            </td>

            <!-- FECHA -->
            <td th:text="${ins.fechaInscripcion}"></td>

            <!-- CALIFICACION -->
            <td>
                <span th:text="${ins.calificacion != null ? ins.calificacion : 'Sin calificar'}"></span>
            </td>

            <!-- ESTATUS -->
            <td>
                <span th:if="${ins.aprobado != null and ins.aprobado}"
                      class="badge bg-success">
                    Aprobado
                </span>

                <span th:if="${ins.aprobado != null and !ins.aprobado}"
                      class="badge bg-danger">
                    Reprobado
                </span>

                <span th:if="${ins.aprobado == null}"
                      class="badge bg-secondary">
                    Pendiente
                </span>
            </td>

            <!-- 🔥 RESTAURAR -->
            <td>

				<a th:href="@{/capacitaciones/{capId}/restaurar-inscripcion/{trabajadorId}
				(capId=${capacitacion.id}, trabajadorId=${ins.trabajador.id})}"
				   class="btn btn-success btn-sm">
				   Restaurar
				</a>

            </td>

        </tr>

        <!-- SIN DATOS -->
        <tr th:if="${#lists.isEmpty(inscripciones)}">
            <td colspan="5" class="text-center text-muted">
                No hay trabajadores eliminados
            </td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
