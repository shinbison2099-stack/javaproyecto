<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Capacitación</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <!-- 🔥 WINDOWS 11 STYLE -->
    <style>

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', sans-serif;
            color: #e2e8f0;
        }

        /* GLOW */
        .bg-glow {
            position: fixed;
            width: 350px;
            height: 350px;
            background: #3b82f6;
            filter: blur(140px);
            top: 10%;
            left: 10%;
            z-index: -1;
        }

        /* CARD */
        .card {
            background: rgba(30, 41, 59, 0.65) !important;
            backdrop-filter: blur(18px);
            border-radius: 20px !important;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        /* HEADER */
        .card-header {
            background: transparent !important;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        h4 {
            color: #f8fafc;
            font-weight: 600;
        }

        /* INPUTS */
        .form-control, select, textarea {
            background: rgb(255, 255, 255) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: rgb(0, 0, 0) !important;
            border-radius: 10px !important;
        }

        .form-control:focus {
            border: 1px solid #3b82f6 !important;
            box-shadow: 0 0 10px rgba(59,130,246,0.5);
        }

        label {
            color: #cbd5f5;
            font-weight: 500;
        }

        textarea {
            min-height: 100px;
        }

        /* CHECKBOX */
        .form-check-input {
            background-color: #1e293b;
            border: 1px solid #3b82f6;
        }

        .form-check-input:checked {
            background-color: #3b82f6;
            border-color: #3b82f6;
        }

        .form-check-label {
            color: #e2e8f0;
        }

        /* BOTONES */
        .btn {
            border-radius: 10px;
            transition: 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e, #4ade80);
            border: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #64748b, #94a3b8);
            border: none;
        }

    </style>

</head>

<body>

<div class="bg-glow"></div>

<div th:replace="~{fragments/menu :: menu}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header">
            <h4>
                <i class="bi bi-mortarboard"></i>
                Registro de Capacitación
            </h4>
        </div>

        <div class="card-body">

            <form th:action="${capacitacion.id == null} ? @{/capacitaciones/guardar} : @{/capacitaciones/actualizar}"
                  th:object="${capacitacion}"
                  method="post">

                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{activo}" value="true">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Clave Capacitación</label>
                        <input type="text" th:field="*{claveCapacitacion}" class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Nombre Capacitación</label>
                        <input type="text" th:field="*{nombreCapacitacion}" class="form-control">
                    </div>

                </div>

                <div class="mb-3">
                    <label>Descripción</label>
                    <textarea th:field="*{descripcion}" class="form-control"></textarea>
                </div>

                <div class="row">

					<div class="col-md-6 mb-3">

					    <label>Tipo de Trabajador</label>

					    <select th:field="*{tipoTrabajador}"
					            class="form-control">

					        <option value="">
					            Seleccione tipo
					        </option>

					        <option value="SALARY">
					            🔵 SALARY
					        </option>

					        <option value="HOURLY">
					            🟢 HOURLY
					        </option>

					        <option value="AMBOS">
					            🟣 AMBOS
					        </option>

					    </select>

					</div>

                    <div class="col-md-6 mb-3">
                        <label>Modalidad</label>
                        <select th:field="*{modalidad}" class="form-control">
                            <option value="">Seleccione</option>
                            <option value="Presencial">Presencial</option>
                            <option value="Online">Online</option>
                            <option value="Mixta">Mixta</option>
                        </select>
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label>Duración (Horas)</label>
                        <input type="number" th:field="*{duracionHoras}" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Fecha Inicio</label>
                        <input type="date" th:field="*{fechaInicio}" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Fecha Fin</label>
                        <input type="date" th:field="*{fechaFin}" class="form-control">
                    </div>

                </div>

				<div class="col-md-6 mb-3"
				     th:if="${capacitacion.id != null}">

				    <label>Instructor</label>

				    <select th:field="*{instructor.id}"
				            class="form-control">

				        <option value="">
				            Sin instructor
				        </option>

				        <option th:each="inst : ${instructores}"
				                th:value="${inst.id}"
				                th:text="${inst.nombre}">
				        </option>

				    </select>

				</div>
                <div class="form-check mb-2">
                    <input type="checkbox" th:field="*{requiereEvaluacion}" class="form-check-input">
                    <label class="form-check-label">Requiere Evaluación</label>
                </div>

                <div class="form-check mb-3">
                    <input type="checkbox" th:field="*{requiereConstancia}" class="form-check-input">
                    <label class="form-check-label">Genera Constancia</label>
                </div>

                <div class="d-flex justify-content-between">

                    <a href="/capacitaciones" class="btn btn-secondary">
                        Cancelar
                    </a>

                    <button type="submit" class="btn btn-success">
                        Guardar Capacitación
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

</body>

</html>
