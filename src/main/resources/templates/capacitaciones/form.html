<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>Capacitación</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

	<div class="container mt-5">

		<div class="card shadow">

			<div class="card-header bg-primary text-white">

				<h4>Registro de Capacitación</h4>

			</div>
			
			

			<div class="card-body">

				<form th:action="${capacitacion.id == null} ?
@{/capacitaciones/guardar} :
@{/capacitaciones/actualizar}" th:object="${capacitacion}" method="post">

					<input type="hidden" th:field="*{id}">
					<input type="hidden" th:field="*{activo}" value="true">

					<div class="row">

						<div class="col-md-6 mb-3">

							<label>Clave Capacitación</label>

							<input type="text" th:field="*{claveCapacitacion}" class="form-control">

						</div>

						<div class="col-md-6 mb-3">

							<label>Nombre Capacitación</label>

							<input type="text" th:field="*{nombreCapacitacion}" class="form-control">

						</div>

					</div>

					<div class="mb-3">

						<label>Descripción</label>

						<textarea th:field="*{descripcion}" class="form-control">
</textarea>

					</div>

					<div class="row">

						<div class="col-md-6 mb-3">

							<label>Tipo de Capacitación</label>

							<input type="text" th:field="*{tipoCapacitacion}" class="form-control">

						</div>

						<div class="col-md-6 mb-3">

							<label>Modalidad</label>

							<select th:field="*{modalidad}" class="form-control">

								<option value="">Seleccione</option>
								<option value="Presencial">Presencial</option>
								<option value="Online">Online</option>
								<option value="Mixta">Mixta</option>

							</select>

						</div>

					</div>

					<div class="row">

						<div class="col-md-4 mb-3">

							<label>Duración (Horas)</label>

							<input type="number" th:field="*{duracionHoras}" class="form-control">

						</div>

						<div class="col-md-4 mb-3">

							<label>Fecha Inicio</label>

							<input type="date" th:field="*{fechaInicio}" th:value="${#temporals.format(capacitacion.fechaInicio,'yyyy-MM-dd')}" class="form-control">

						</div>

						<div class="col-md-4 mb-3">

							<label>Fecha Fin</label>

							<input type="date" th:field="*{fechaFin}" th:value="${#temporals.format(capacitacion.fechaFin,'yyyy-MM-dd')}" class="form-control">

						</div>

					</div>

					<div class="row">

						<div class="col-md-6 mb-3">

							<label>Vigencia (Meses)</label>

							<input type="number" th:field="*{vigenciaMeses}" class="form-control">

						</div>

						<div class="col-md-6 mb-3">

							<label>Instructor</label>

							<select name="instructor" class="form-control">

							<option value="">Seleccione instructor</option>

							<option th:each="inst : ${instructores}"
							        th:value="${inst.id}"
							        th:text="${inst.nombre}"
							        th:selected="${capacitacion.instructor != null and inst.id == capacitacion.instructor.id}">
							</option>

							</select>

						</div>

					</div>

					<div class="form-check mb-2">

						<input type="checkbox" th:field="*{requiereEvaluacion}" class="form-check-input">

						<label class="form-check-label">

							Requiere Evaluación

						</label>

					</div>

					<div class="form-check mb-3">

						<input type="checkbox" th:field="*{requiereConstancia}" class="form-check-input">

						<label class="form-check-label">

							Genera Constancia

						</label>

					</div>

					<div class="d-flex justify-content-between">

						<a href="/capacitaciones" class="btn btn-secondary">

							Cancelar

						</a>

						<button type="submit" class="btn btn-success">

							Guardar Capacitación

						</button>

					</div>

				</form>

			</div>

		</div>

	</div>

</body>

</html>
