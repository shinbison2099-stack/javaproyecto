<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Asignar Trabajadores</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            font-family: Arial;
        }

        .container {
            margin-top: 40px;
        }

        .card-box {
            background: rgba(255,255,255,0.08);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        h3{
            margin-bottom:20px;
            font-weight:bold;
        }

        .tipo-badge{
            display:inline-block;
            padding:5px 12px;
            border-radius:10px;
            font-size:12px;
            font-weight:bold;
            margin-left:10px;
        }

        .salary{
            background:#2563eb;
            color:white;
        }

        .hourly{
            background:#16a34a;
            color:white;
        }

        .ambos{
            background:#9333ea;
            color:white;
        }

        table {
            background: white;
            color: black;
            border-radius: 15px;
            overflow: hidden;
        }

        thead{
            font-size:14px;
        }

        tbody tr:hover{
            background:#f1f5f9;
            transition:0.2s;
        }

        .nombre-completo{
            font-weight:600;
            color:#0f172a;
        }

        .tipo-worker{
            font-size:12px;
            font-weight:bold;
            border-radius:8px;
            padding:4px 10px;
            display:inline-block;
            color:white;
        }

        .btn-success{
            border-radius:12px;
            padding:10px 18px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card-box">

        <h3>

            <i class="bi bi-people"></i>

            Inscribir trabajadores a:

            <span th:text="${capacitacion.nombreCapacitacion}"></span>

            <!-- 🔥 TIPO CAPACITACIÓN -->

            <span th:if="${capacitacion.tipoTrabajador.name() == 'SALARY'}"
                  class="tipo-badge salary">

                SALARY

            </span>

            <span th:if="${capacitacion.tipoTrabajador.name() == 'HOURLY'}"
                  class="tipo-badge hourly">

                HOURLY

            </span>

            <span th:if="${capacitacion.tipoTrabajador.name() == 'AMBOS'}"
                  class="tipo-badge ambos">

                AMBOS

            </span>

        </h3>

        <form th:action="@{/capacitaciones/asignar}"
              method="post">

            <input type="hidden"
                   name="capId"
                   th:value="${capacitacion.id}">

            <table class="table table-bordered table-hover text-center mt-3">

                <thead class="table-dark">

                <tr>

                    <th></th>

                    <th>#</th>

                    <th>Nombre Completo</th>

                    <th>Tipo Trabajador</th>

                    <th>Email</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="trab, iterStat : ${trabajadores}">

                    <!-- CHECK -->

                    <td>

                        <input type="checkbox"
                               name="trabajadoresIds"
                               th:value="${trab.id}">

                    </td>

                    <!-- NUMERO -->

                    <td th:text="${iterStat.count}"></td>

                    <!-- NOMBRE COMPLETO -->

                    <td class="nombre-completo">

                        <span th:text="
                            ${trab.nombre}
                            + ' ' +
                            ${trab.primerApellido}
                            + ' ' +
                            ${trab.segundoApellido}">
                        </span>

                    </td>

                    <!-- TIPO -->

                    <td>

                        <span th:if="${trab.tipoTrabajador.name() == 'SALARY'}"
                              class="tipo-worker salary">

                            SALARY

                        </span>

                        <span th:if="${trab.tipoTrabajador.name() == 'HOURLY'}"
                              class="tipo-worker hourly">

                            HOURLY

                        </span>

                        <span th:if="${trab.tipoTrabajador.name() == 'AMBOS'}"
                              class="tipo-worker ambos">

                            AMBOS

                        </span>

                    </td>

                    <!-- EMAIL -->

                    <td th:text="${trab.email}"></td>

                </tr>

                </tbody>

            </table>

            <button class="btn btn-success mt-3">

                <i class="bi bi-check-circle"></i>

                Inscribir seleccionados

            </button>

        </form>

    </div>

</div>

</body>
</html>
