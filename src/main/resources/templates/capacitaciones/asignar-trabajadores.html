<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Asignar Trabajadores</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            font-family: Arial;
        }

        .container {
            margin-top: 40px;
        }

        .card-box {
            background: rgba(255,255,255,0.08);
            padding: 25px;
            border-radius: 20px;
        }

        table {
            background: white;
            color: black;
            border-radius: 10px;
            overflow: hidden;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="card-box">

        <h3>
            <i class="bi bi-people"></i>
            Inscribir trabajadores a:
            <span th:text="${capacitacion.nombreCapacitacion}"></span>
        </h3>

        <form th:action="@{/capacitaciones/asignar}" method="post">

            <input type="hidden" name="capId"
                   th:value="${capacitacion.id}">

            <table class="table table-bordered text-center mt-3">

                <thead class="table-dark">
                <tr>
                    <th></th>
                    <th>#</th>
                    <th>Nombre</th>
                    <th>Email</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="trab, iterStat : ${trabajadores}">

                    <td>
                        <input type="checkbox"
                               name="trabajadoresIds"
                               th:value="${trab.id}">
                    </td>

                    <td th:text="${iterStat.count}"></td>

                    <td th:text="${trab.nombre}"></td>

                    <td th:text="${trab.email}"></td>

                </tr>

                </tbody>

            </table>

            <button class="btn btn-success mt-3">
                <i class="bi bi-check-circle"></i>
                Inscribir seleccionados
            </button>

        </form>

    </div>

</div>

</body>
</html>
