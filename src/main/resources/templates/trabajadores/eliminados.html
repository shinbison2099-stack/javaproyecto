<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>CV Trabajador</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

	<link rel="stylesheet" th:href="@{/css/menu.css}">

</head>

<body>

	<div th:replace="~{fragments/menu :: menu}"></div>

	<div class="container mt-4">


<div class="container mt-4">

	<div class="card shadow">

		<div class="card-header bg-dark text-white">

			<h5 class="mb-0">
				<i class="bi bi-trash"></i>
				Trabajadores Eliminados
			</h5>

		</div>

		<div class="card-body">

			<table class="table table-hover table-striped align-middle">

				<thead class="table-dark">

					<tr>
						<th>Nombre</th>
						<th>Email</th>
						<th>Puesto</th>
						<th class="text-center">Acciones</th>
					</tr>

				</thead>

				<tbody>

					<tr th:each="trabajador : ${trabajadores}">

						<td>

							<i class="bi bi-person"></i>
							<span th:text="${trabajador.nombre}"></span>

						</td>

						<td>

							<i class="bi bi-envelope"></i>
							<span th:text="${trabajador.email}"></span>

						</td>

						<td>

							<span class="badge bg-secondary" th:text="${trabajador.puesto}">
							</span>

						</td>

						<td class="text-center">

							<a th:href="@{/trabajadores/restaurar/{id}(id=${trabajador.id})}"
								class="btn btn-success btn-sm">

								<i class="bi bi-arrow-counterclockwise"></i>
								Restaurar

							</a>

						</td>

					</tr>

					<tr th:if="${#lists.isEmpty(trabajadores)}">

						<td colspan="4" class="text-center text-muted">

							<i class="bi bi-info-circle"></i>
							No hay trabajadores eliminados

						</td>

					</tr>

				</tbody>

			</table>

		</div>

	</div>

</div>

</body>

</html>
