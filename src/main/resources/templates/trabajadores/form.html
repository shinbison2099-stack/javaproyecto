<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>Trabajador</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
	
	<link rel="stylesheet"
	      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

	<link rel="stylesheet" th:href="@{/css/menu.css}">
	
	<style>

	    body {
	        background: linear-gradient(135deg, #0f172a, #1e293b);
	        font-family: 'Segoe UI', sans-serif;
	        color: #e2e8f0;
	    }

	    /* 🔥 EFECTO WINDOWS */
	    body::before {
	        content: "";
	        position: fixed;
	        width: 400px;
	        height: 400px;
	        background: #3b82f6;
	        filter: blur(150px);
	        top: 10%;
	        left: 10%;
	        z-index: -1;
	    }

	    /* 🔥 CARD GLASS */
	    .card {
	        background: rgba(30, 41, 59, 0.6) !important;
	        backdrop-filter: blur(20px);
	        border-radius: 20px !important;
	        border: 1px solid rgba(255,255,255,0.05);
	        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
	    }

	    /* HEADER */
	    .card-header {
	        background: transparent !important;
	        border-bottom: 1px solid rgba(255,255,255,0.1);
	        color: #f8fafc !important;
	    }

	    /* INPUTS */
	    .form-control, select {
	        background: rgba(255,255,255,0.05) !important;
	        border: 1px solid rgba(255,255,255,0.1) !important;
	        color: #ffffff !important;
	        border-radius: 10px !important;
	    }

	    .form-control:focus {
	        border: 1px solid #3b82f6 !important;
	        box-shadow: 0 0 10px rgba(59,130,246,0.5);
	    }

	    label {
	        color: #cbd5f5;
	        font-weight: 500;
	    }

	    /* 🔥 VIDEO Y FOTO */
	    video {
	        border-radius: 15px !important;
	        border: 2px solid rgba(59,130,246,0.6);
	    }

	    .img-thumbnail {
	        border-radius: 15px !important;
	        border: 2px solid rgba(255,255,255,0.1);
	        background: rgba(255,255,255,0.05);
	    }

	    /* BOTONES */
	    .btn {
	        border-radius: 10px;
	        transition: 0.2s;
	    }

	    .btn:hover {
	        transform: scale(1.05);
	        filter: brightness(1.2);
	    }

	    .btn-primary {
	        background: linear-gradient(135deg, #2563eb, #3b82f6);
	        border: none;
	    }

	    .btn-success {
	        background: linear-gradient(135deg, #22c55e, #4ade80);
	        border: none;
	    }

	    .btn-secondary {
	        background: linear-gradient(135deg, #64748b, #94a3b8);
	        border: none;
	    }

	    /* SEPARADORES */
	    hr {
	        border-color: rgba(255,255,255,0.1);
	    }

	</style>

</head>

<body class="bg-light">

<div th:replace="~{fragments/menu :: menu}"></div>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">
                <i class="bi bi-person-badge"></i>
                Registro de Trabajador
            </h4>
        </div>

        <div class="card-body">

            <form th:action="${trabajador.id == null} ? 
                 @{/trabajadores/guardar} : 
                 @{/trabajadores/actualizar}" 
                  th:object="${trabajador}" 
                  method="post" 
                  enctype="multipart/form-data">

                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{activo}" value="true">

                <!-- 🔥 RADIO DATOS PERSONALES -->
                <div class="mb-4">
                    <label class="form-label fw-bold">¿Llenar datos personales?</label><br>

                    <input type="radio" name="datosPersonales" value="si"
                           onclick="toggleDatos(true)"> Sí

                    <input type="radio" name="datosPersonales" value="no"
                           onclick="toggleDatos(false)" checked> No
                </div>

                <!-- 🔥 CONTENEDOR PRINCIPAL -->
                <div class="row">

                    <!-- FOTO -->
                    <div class="col-md-4 text-center">

                        <h5 class="mb-3">
                            <i class="bi bi-camera"></i> Foto
                        </h5>

                        <video id="video" width="100%" autoplay
                               class="border rounded shadow mb-2"></video>

                        <button type="button"
                                class="btn btn-primary w-100 mb-3"
                                onclick="tomarFoto()">
                            <i class="bi bi-camera"></i> Capturar
                        </button>

                        <img id="preview"
                             class="img-thumbnail mb-3"
                             style="display:none; width:100%;">

                        <input type="file"
                               name="fotoArchivo"
                               id="fotoArchivo"
                               class="form-control mb-3"
                               accept="image/*">

                        <img id="previewArchivo"
                             class="img-thumbnail"
                             style="display:none; width:100%;">

                        <div th:if="${trabajador.foto != null}" class="mt-3">
                            <img th:src="@{/trabajadores/foto/{num}(num=${trabajador.numeroPersonal})}"
                                 class="img-thumbnail shadow"
                                 style="width:100%">
                        </div>

                        <canvas id="canvas" style="display:none"></canvas>

                    </div>

                    <!-- FORMULARIO -->
                    <div class="col-md-8">

                        <h5 class="mb-3">
                            <i class="bi bi-person"></i> Datos del trabajador
                        </h5>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Número Personal</label>
                                <input type="text" th:field="*{numeroPersonal}" class="form-control">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>CURP</label>
                                <input type="text" th:field="*{curp}" class="form-control">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label>Nombre</label>
                                <input type="text" th:field="*{nombre}" class="form-control">
                            </div>

                            <div class="col-md-4 mb-3">
                                <label>Primer Apellido</label>
                                <input type="text" th:field="*{primerApellido}" class="form-control">
                            </div>

                            <div class="col-md-4 mb-3">
                                <label>Segundo Apellido</label>
                                <input type="text" th:field="*{segundoApellido}" class="form-control">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Área</label>
                                <input type="text" th:field="*{areaEmpleado}" class="form-control">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Puesto</label>
                                <select th:field="*{puesto.id}" class="form-control">
                                    <option value="">Seleccione puesto</option>
                                    <option th:each="p : ${puestos}"
                                            th:value="${p.id}"
                                            th:text="${p.nombrePuesto}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" th:field="*{email}" class="form-control">
                        </div>

                        <!-- 🔥 DATOS PERSONALES OCULTOS -->
                        <div id="datosPersonalesBlock" style="display:none;">

                            <hr>

                            <h5 class="mb-3">
                                <i class="bi bi-person-lines-fill"></i> Datos personales
                            </h5>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label>Estado</label>
                                    <input type="text" th:field="*{claveEstado}" class="form-control">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label>Municipio</label>
                                    <input type="text" th:field="*{claveMunicipio}" class="form-control">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label>Ocupación</label>
                                    <input type="text" th:field="*{claveOcupacion}" class="form-control">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label>Nivel Estudios</label>
                                    <input type="text" th:field="*{claveNivelEstudios}" class="form-control">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label>Documento Probatorio</label>
                                <input type="text" th:field="*{claveDocumentoProbatorio}" class="form-control">
                            </div>

                        </div>

                    </div>

                </div>

                <hr>

                <div class="d-flex justify-content-between">
                    <a href="/trabajadores" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Cancelar
                    </a>

                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-save"></i> Guardar Trabajador
                    </button>
                </div>

            </form>

        </div>

    </div>

</div>

<!-- 🔥 SCRIPT TOGGLE -->
<script>
function toggleDatos(mostrar) {
    const bloque = document.getElementById("datosPersonalesBlock");
    bloque.style.display = mostrar ? "block" : "none";
}
</script>

	<!-- ================= SCRIPT CAMARA ================= -->

	<script>

		const video = document.getElementById("video");

		navigator.mediaDevices.getUserMedia({video: true})
			.then(stream => {
				video.srcObject = stream;
			});

		function tomarFoto() {

			const canvas = document.getElementById("canvas");
			const context = canvas.getContext("2d");

			canvas.width = 300;
			canvas.height = 300;

			context.drawImage(video, 0, 0, 300, 300);

			const preview = document.getElementById("preview");

			preview.src = canvas.toDataURL("image/jpeg");
			preview.style.display = "block";

			canvas.toBlob(function (blob) {

				const file = new File([blob], "foto.jpg", {type: "image/jpeg"});

				const container = new DataTransfer();
				container.items.add(file);

				document.getElementById("fotoArchivo").files =
					container.files;

			}, "image/jpeg", 0.8);

		}

		/* preview archivo */

		document.getElementById("fotoArchivo")
			.addEventListener("change", function () {

				const file = this.files[0];

				if (!file) return;

				const reader = new FileReader();

				reader.onload = function (e) {

					const preview =
						document.getElementById("previewArchivo");

					preview.src = e.target.result;
					preview.style.display = "block";

				}

				reader.readAsDataURL(file);

			});

	</script>

</body>

</html>
