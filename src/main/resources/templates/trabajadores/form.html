<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>Trabajador</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
	
	<link rel="stylesheet"
	      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

	<link rel="stylesheet" th:href="@{/css/menu.css}">

</head>

<body class="bg-light">
	<div th:replace="~{fragments/menu :: menu}"></div>

	<div class="container mt-5">

		<div class="card shadow">

			<div class="card-header bg-primary text-white">

				<h4 class="mb-0">
					<i class="bi bi-person-badge"></i>
					Registro de Trabajador
				</h4>

			</div>

			<div class="card-body">

				<form th:action="${trabajador.id == null} ?
                 @{/trabajadores/guardar} :
                 @{/trabajadores/actualizar}" th:object="${trabajador}" method="post" enctype="multipart/form-data">

					<input type="hidden" th:field="*{id}">
					<input type="hidden" th:field="*{activo}" value="true">

					<!-- ================= DATOS ================= -->

					<div class="row">

						<div class="col-md-6 mb-3">
							<label class="form-label">Número Personal</label>
							<input type="text" th:field="*{numeroPersonal}" class="form-control">
						</div>

						<div class="col-md-6 mb-3">
							<label class="form-label">CURP</label>
							<input type="text" th:field="*{curp}" class="form-control">
						</div>

					</div>

					<div class="row">

						<div class="col-md-4 mb-3">
							<label class="form-label">Nombre</label>
							<input type="text" th:field="*{nombre}" class="form-control">
						</div>

						<div class="col-md-4 mb-3">
							<label class="form-label">Primer Apellido</label>
							<input type="text" th:field="*{primerApellido}" class="form-control">
						</div>

						<div class="col-md-4 mb-3">
							<label class="form-label">Segundo Apellido</label>
							<input type="text" th:field="*{segundoApellido}" class="form-control">
						</div>

					</div>

					<div class="row">

						<div class="col-md-6 mb-3">
							<label class="form-label">Área</label>
							<input type="text" th:field="*{areaEmpleado}" class="form-control">
						</div>

						<div class="col-md-6 mb-3">

						    <label class="form-label">Puesto</label>

						    <select th:field="*{puesto}" class="form-control">

						        <option value="">Seleccione puesto</option>

								<option th:each="p : ${puestos}"
								        th:value="${p.id}"
								        th:text="${p.nombrePuesto}"
								        th:selected="${trabajador.puesto != null and p.id == trabajador.puesto.id}">
								</option>

						    </select>

						</div>

					</div>

					<div class="mb-3">
						<label class="form-label">Email</label>
						<input type="email" th:field="*{email}" class="form-control">
					</div>

					<hr>

					<!-- ================= FOTO ================= -->

					<h5 class="mb-3">
						<i class="bi bi-camera"></i>
						Foto del Trabajador
					</h5>

					<div class="row">

						<!-- CAMARA -->

						<div class="col-md-6">

							<label class="form-label">Tomar foto</label>

							<br>

							<video id="video" width="320" height="240" autoplay class="border rounded shadow">
							</video>

							<br>

							<button type="button" class="btn btn-primary mt-2" onclick="tomarFoto()">

								<i class="bi bi-camera"></i>
								Capturar foto

							</button>

							<canvas id="canvas" style="display:none"></canvas>

							<div class="mt-3">

								<label>Vista previa</label>

								<br>

								<img id="preview" class="img-thumbnail" style="max-width:320px; display:none;">

							</div>

						</div>

						<!-- SUBIR ARCHIVO -->

						<div class="col-md-6">

							<label class="form-label">O subir imagen</label>

							<input type="file" name="fotoArchivo" id="fotoArchivo" class="form-control"
								accept="image/*">

							<small class="text-muted">
								Puedes usar la cámara o subir una imagen
							</small>

							<br><br>

							<img id="previewArchivo" class="img-thumbnail" style="max-width:320px; display:none;">

							<!-- FOTO ACTUAL -->

							<div th:if="${trabajador.foto != null}" class="mt-3">

								<label>Foto actual</label>

								<br>

								<img th:src="@{/trabajadores/foto/{num}(num=${trabajador.numeroPersonal})}"
									class="img-thumbnail shadow" style="max-height:200px">

							</div>

						</div>

					</div>

					<hr>

					<div class="d-flex justify-content-between">

						<a href="/trabajadores" class="btn btn-secondary">
							<i class="bi bi-arrow-left"></i>
							Cancelar
						</a>

						<button type="submit" class="btn btn-success">
							<i class="bi bi-save"></i>
							Guardar Trabajador
						</button>

					</div>

				</form>

			</div>

		</div>

	</div>

	<!-- ================= SCRIPT CAMARA ================= -->

	<script>

		const video = document.getElementById("video");

		navigator.mediaDevices.getUserMedia({video: true})
			.then(stream => {
				video.srcObject = stream;
			});

		function tomarFoto() {

			const canvas = document.getElementById("canvas");
			const context = canvas.getContext("2d");

			canvas.width = 300;
			canvas.height = 300;

			context.drawImage(video, 0, 0, 300, 300);

			const preview = document.getElementById("preview");

			preview.src = canvas.toDataURL("image/jpeg");
			preview.style.display = "block";

			canvas.toBlob(function (blob) {

				const file = new File([blob], "foto.jpg", {type: "image/jpeg"});

				const container = new DataTransfer();
				container.items.add(file);

				document.getElementById("fotoArchivo").files =
					container.files;

			}, "image/jpeg", 0.8);

		}

		/* preview archivo */

		document.getElementById("fotoArchivo")
			.addEventListener("change", function () {

				const file = this.files[0];

				if (!file) return;

				const reader = new FileReader();

				reader.onload = function (e) {

					const preview =
						document.getElementById("previewArchivo");

					preview.src = e.target.result;
					preview.style.display = "block";

				}

				reader.readAsDataURL(file);

			});

	</script>

</body>

</html>
