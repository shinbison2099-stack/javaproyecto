<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>Importar Trabajadores</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

	<link rel="stylesheet" th:href="@{/css/menu.css}">

</head>

<body>

	<div th:replace="~{fragments/menu :: menu}"></div>

	<div class="container mt-4">

		<h2>Importar Trabajadores desde Excel</h2>

		<div class="alert alert-info">

			<strong>Formato esperado del Excel:</strong>

			<ul class="mb-0">

				<li>No Personal</li>
				<li>CURP</li>
				<li>Nombre</li>
				<li>Primer Apellido</li>
				<li>Segundo Apellido</li>
				<li>Área</li>
				<li>Puesto</li>
				<li>Email</li>

			</ul>

		</div>

		<form th:action="@{/trabajadores/importar}" method="post" enctype="multipart/form-data">

			<div class="mb-3">

				<label class="form-label">Seleccione archivo Excel (.xlsx)</label>

				<input type="file" name="archivo" accept=".xlsx" class="form-control" required>

			</div>

			<button type="submit" class="btn btn-success">
				Importar
			</button>

			<a href="/trabajadores" class="btn btn-secondary">
				Volver
			</a>

		</form>

	</div>

</body>

</html>
