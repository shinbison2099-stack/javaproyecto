<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>Trabajadores</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

	<link rel="stylesheet" th:href="@{/css/menu.css}">

</head>

<body>

	<div th:replace="~{fragments/menu :: menu}"></div>

	<div class="container mt-4">

		<h2>Lista de Trabajadores</h2>

		<div class="mb-3">

			<a href="/trabajadores/nuevo" class="btn btn-primary">
				Nuevo trabajador
			</a>

			<form th:action="@{/trabajadores/importar}" method="post" enctype="multipart/form-data"
				style="display:inline-block">

				<input type="file" name="archivo" required>

				<button type="submit" class="btn btn-success">
					Importar Excel
				</button>

			</form>

			<a href="/trabajadores/pdf" class="btn btn-danger">
				Exportar PDF
			</a>
			
			<a href="/trabajadores/eliminados" class="btn btn-dark">
			Trabajadores Eliminados
			</a>
			


		</div>

		<table class="table table-bordered table-striped">

			<thead class="table-dark">

				<tr>

					<th>ID</th>
					<th>No. Personal</th>
					<th>CURP</th>
					<th>Nombre</th>
					<th>Área</th>
					<th>Puesto</th>
					<th>Email</th>
					<th>Acciones</th>
					<th>Opciones</th>

				</tr>

			</thead>

			<tbody>

			<tr th:each="trabajador : ${trabajadores}">

			    <td th:text="${trabajador.id}"></td>

			    <td th:text="${trabajador.numeroPersonal}"></td>

			    <td th:text="${trabajador.curp}"></td>

			    <td
			        th:text="${trabajador.nombre + ' ' + trabajador.primerApellido + ' ' + trabajador.segundoApellido}">
			    </td>

			    <td th:text="${trabajador.areaEmpleado}"></td>

			    <td th:text="${trabajador.puesto != null ? trabajador.puesto.nombrePuesto : 'Sin puesto'}"></td>

			    <td th:text="${trabajador.email}"></td>

			    <td>

			        <a th:href="@{/trabajadores/{id}(id=${trabajador.id})}"
			           class="btn btn-info btn-sm">
			            Ver CV
			        </a>

			    </td>

			    <td>

			        <a th:href="@{/trabajadores/editar/{id}(id=${trabajador.id})}"
			           class="btn btn-warning btn-sm">
			            Editar
			        </a>

			        <a th:href="@{/trabajadores/eliminar/{id}(id=${trabajador.id})}"
			           class="btn btn-danger btn-sm"
			           onclick="return confirm('¿Eliminar trabajador?')">
			            Eliminar
			        </a>

			        <!-- 🔥 AQUÍ VA EL BOTÓN -->
			        <a th:href="@{/matriz/plan-carrera/{id}(id=${trabajador.id})}"
			           class="btn btn-primary btn-sm">
			           Plan carrera
			        </a>

			    </td>

			</tr>

			</tbody>

		</table>

	</div>

</body>

</html>
