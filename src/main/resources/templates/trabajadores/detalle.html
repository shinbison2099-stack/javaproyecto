<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>CV Trabajador</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/menu.css}">

    <style>

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .container-box {
            max-width: 1000px;
            margin: 40px auto;
        }

        .card-glass {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(14px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        .foto {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #38bdf8;
        }

        .titulo {
            font-weight: 600;
            margin-bottom: 20px;
        }

        .table thead {
            background: #1e293b;
            color: white;
        }

        .table tbody tr:hover {
            background: rgba(255,255,255,0.05);
        }

    </style>

</head>

<body>

<div th:replace="~{fragments/menu :: menu}"></div>

<div class="container-box">

    <div class="card-glass">

        <h2 class="titulo">👤 Ficha del Trabajador</h2>

        <!-- DATOS -->
        <div class="row align-items-center">

            <div class="col-md-3 text-center">
                <img class="foto"
                     th:src="@{/foto/{num}(num=${trabajador.numeroPersonal})}"
                     onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
            </div>

            <div class="col-md-9">

                <h3 th:text="${trabajador.nombre + ' ' + trabajador.primerApellido + ' ' + trabajador.segundoApellido}"></h3>

                <p><strong>No. Personal:</strong> <span th:text="${trabajador.numeroPersonal}"></span></p>
                <p><strong>Área:</strong> <span th:text="${trabajador.areaEmpleado}"></span></p>

                <p><strong>Puesto:</strong>
                    <span th:text="${trabajador.puesto != null ? trabajador.puesto.nombrePuesto : 'Sin puesto'}"></span>
                </p>

            </div>

        </div>

        <hr>

        <!-- BADGES -->
        <h4>📚 Capacitaciones</h4>

        <div class="mb-3">

            <div th:if="${inscripciones != null and !inscripciones.isEmpty()}">

                <span th:each="ins : ${inscripciones}"
                      class="badge bg-primary me-1 mb-1"
                      th:text="${ins.capacitacion.nombreCapacitacion}">
                </span>

            </div>

            <span th:if="${inscripciones == null or inscripciones.isEmpty()}">
                No tiene capacitaciones
            </span>

        </div>

        <hr>

        <!-- TABLA -->
        <h4>📊 Detalle</h4>

        <div class="table-responsive">

            <table class="table table-bordered text-center align-middle">

                <thead>
                <tr>
                    <th>Curso</th>
                    <th>Capacitación</th>
                    <th>Fecha</th>
                    <th>Calificación</th>
                    <th>Estatus</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="ins : ${inscripciones}">

                    <!-- CURSO -->
                    <td th:text="${ins.capacitacion.curso != null 
                                  ? ins.capacitacion.curso.nombreCurso 
                                  : 'Sin curso'}"></td>

                    <!-- CAPACITACIÓN -->
                    <td th:text="${ins.capacitacion.nombreCapacitacion}"></td>

                    <!-- FECHA -->
                    <td th:text="${ins.fechaInscripcion}"></td>

                    <!-- 🔥 CALIFICACIÓN DESDE EVALUACION -->
                    <td th:with="
                        capId=${ins.capacitacion.id},
                        eval=${evaluaciones[trabajador.id + '-' + capId]}
                    ">
                        <span th:text="${eval != null ? eval.calificacion : 'Sin calificar'}"></span>
                    </td>

                    <!-- 🔥 ESTATUS DESDE EVALUACION -->
                    <td th:with="
                        capId=${ins.capacitacion.id},
                        eval=${evaluaciones[trabajador.id + '-' + capId]}
                    ">

                        <span th:if="${eval != null and eval.aprobada}" class="badge bg-success">
                            ✔ Aprobado
                        </span>

                        <span th:if="${eval != null and !eval.aprobada}" class="badge bg-danger">
                            ✖ Reprobado
                        </span>

                        <span th:if="${eval == null}" class="badge bg-secondary">
                            ⏳ Pendiente
                        </span>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

        <div class="mt-3">
            <a href="/trabajadores" class="btn btn-secondary">← Volver</a>
        </div>

    </div>

</div>

</body>
</html>
