<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<meta charset="UTF-8" />
	<title>Lista de Trabajadores</title>

	<style>
		body {
			font-family: Arial, sans-serif;
			font-size: 12px;
		}

		h2 {
			text-align: center;
			margin-bottom: 20px;
		}

		table {
			width: 100%;
			border-collapse: collapse;
		}

		th,
		td {
			border: 1px solid black;
			padding: 6px;
		}

		th {
			background-color: #f2f2f2;
		}
	</style>

</head>

<body>

	<h2>Lista de Trabajadores</h2>

	<table>

		<thead>

			<tr>

				<th>ID</th>
				<th>No Personal</th>
				<th>CURP</th>
				<th>Nombre</th>
				<th>Área</th>
				<th>Puesto</th>
				<th>Email</th>

			</tr>

		</thead>

		<tbody>

			<tr th:each="trabajador : ${trabajadores}">

				<td th:text="${trabajador.id}"></td>

				<td th:text="${trabajador.numeroPersonal}"></td>

				<td th:text="${trabajador.curp}"></td>

				<td th:text="${trabajador.nombre + ' ' + trabajador.primerApellido + ' ' + trabajador.segundoApellido}">
				</td>

				<td th:text="${trabajador.areaEmpleado}"></td>

				<td th:text="${trabajador.puesto}"></td>

				<td th:text="${trabajador.email}"></td>

			</tr>

		</tbody>

	</table>

</body>

</html>
