<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8"/>
    <title>Lista de Trabajadores</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            font-size: 11px;
            color: #333;
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #444;
            padding: 6px;
            text-align: left;
        }

        th {
            background-color: #e5e7eb;
            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: #f9fafb;
        }

    </style>

</head>

<body>

<h2>Lista de Trabajadores</h2>

<table>

    <thead>
    <tr>
        <th>No. Personal</th>
        <th>CURP</th>
        <th>Nombre</th>
        <th>Área</th>
        <th>Puesto</th>
        <th>Email</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="trabajador : ${trabajadores}">

        <td th:text="${trabajador.numeroPersonal}"></td>

        <td th:text="${trabajador.curp}"></td>

        <td th:text="${trabajador.nombre + ' ' + trabajador.primerApellido + ' ' + trabajador.segundoApellido}"></td>

        <td th:text="${trabajador.areaEmpleado}"></td>

        <!-- 🔥 CORRECCIÓN IMPORTANTE -->
        <td th:text="${trabajador.puesto != null ? trabajador.puesto.nombrePuesto : 'Sin puesto'}"></td>

        <td th:text="${trabajador.email}"></td>

    </tr>

    </tbody>

</table>

</body>

</html>
