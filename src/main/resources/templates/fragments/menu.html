<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <title>Menú</title>
</head>
<body>
    <div th:fragment="menu">
        <nav>
            <div class="logo">MiApp</div>

            <ul>
                <li>
                    <a th:href="@{/}">Home</a>
                </li>
                <li>
                    <a th:href="@{/instructores}">Instructores</a>
                </li>
                <li>
                    <a th:href="@{/cursos}">Cursos</a>
                </li>
                <li>
                    <a th:href="@{/trabajadores}">Trabajadores</a>
                </li>
				<li class="nav-item">
				<a th:href="@{/capacitaciones}">Capacitaciones</a>
				</li>
				<li class="nav-item">
				<a th:href="@{/puestos}">Puestos</a>
				</li>
				<li class="nav-item">
				<a th:href="@{/area}">Areas</a>
				</li>				
				<li class="nav-item">
				<a th:href="@{/matriz-habilidad/lista}">Matrices</a>
				</li>
				<li class="nav-item">
				<a th:href="@{/cursos/asignados}">Asignar Cursos a Cap</a>
				</li>
				<li class="nav-item">
				<a th:href="@{/evaluaciones/cursos}">Calificar Capacitaciones</a>
				</li>
				<li class="nav-item">
				<a th:href="@{/plan-carrera/crear}">Plan de Carrera</a>
				</li>
            </ul>
			
            <!-- Botón hamburguesa -->
            <div class="hamburger" onclick="toggleMenu(this)">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </div>

    <script>
        function toggleMenu(menu) {
            menu.classList.toggle("active");
            document.querySelector("nav ul").classList.toggle("show");
        }
    </script>
</body>
</html>
