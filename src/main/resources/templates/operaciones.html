<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Operaciones</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Iconos -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Sidebar -->
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <style>

        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            overflow: hidden;
        }

        .content {
            margin-left: 120px;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🔥 GRID PRO */
        .tiles {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 30px;
            max-width: 700px;
            width: 100%;
        }

        /* 🔥 TILE */
        .tile {
            height: 180px;

            border-radius: 20px;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            color: white;
            text-decoration: none;

            transition: 0.3s ease;
            transform: scale(0.8);
            opacity: 0;

            animation: aparecer 0.6s ease forwards;
        }

        /* ANIMACIÓN */
        .tile:nth-child(1) { animation-delay: 0.1s; }
        .tile:nth-child(2) { animation-delay: 0.2s; }
        .tile:nth-child(3) { animation-delay: 0.3s; }

        @keyframes aparecer {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ICONOS */
        .tile i {
            font-size: 60px;
            margin-bottom: 10px;
        }

        /* TEXTO */
        .tile span {
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            padding: 0 10px;
        }

        /* HOVER */
        .tile:hover {
            transform: scale(1.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            filter: brightness(1.2);
        }

        /* COLORES */
        .matriz {
            background: linear-gradient(135deg, #0984e3, #74b9ff);
        }

        .habilidades {
            background: linear-gradient(135deg, #00b894, #55efc4);
        }

        /* 🔥 NUEVO BOTÓN PRO */
        .inscripcion {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
        }

    </style>

</head>

<body>

<!-- SIDEBAR -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<!-- CONTENIDO -->
<div class="content">

    <div class="tiles">

        <!-- MATRIZ -->
		<a href="/matriz/crear" class="tile matriz">
		    <i class="bi bi-grid-3x3-gap"></i>
		    <span>Matriz</span>
		</a>

        <!-- HABILIDADES -->
        <a href="/matriz/habilidades" class="tile habilidades">
            <i class="bi bi-lightbulb-fill"></i>
            <span>Habilidades</span>
        </a>

        <!-- 🔥 INSCRIPCIÓN -->
        <a href="/inscripcion" class="tile inscripcion">
            <i class="bi bi-person-plus-fill"></i>
            <span>Inscribir Capacitación a Curso</span>
        </a>

		<a href="/cursos/asignados" class="tile" style="background:#e17055;">
		    <i class="bi bi-check2-square"></i>
		    <span>Cursos con Capacitaciones</span>
		</a>
		
		<a href="/evaluaciones/cursos" class="tile" style="background:#00cec9;">
		    <i class="bi bi-clipboard-check"></i>
		    <span>Calificar Capacitaciones</span>
		</a>
		
    </div>

</div>

</body>
</html>
