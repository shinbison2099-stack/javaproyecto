<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Operaciones</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Iconos -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Sidebar -->
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <style>

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            overflow: hidden;
        }

        .content {
            margin-left: 120px;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* GRID */
        .tiles {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 30px;
            max-width: 750px;
            width: 100%;
        }

        /* TARJETAS */
        .tile {
            height: 180px;
            border-radius: 20px;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            color: white;
            text-decoration: none;

            transition: 0.3s ease;
            transform: scale(0.8);
            opacity: 0;

            animation: aparecer 0.6s ease forwards;
        }

        /* ANIMACIÓN */
        .tile:nth-child(1) { animation-delay: 0.1s; }
        .tile:nth-child(2) { animation-delay: 0.2s; }
        .tile:nth-child(3) { animation-delay: 0.3s; }
        .tile:nth-child(4) { animation-delay: 0.4s; }
        .tile:nth-child(5) { animation-delay: 0.5s; }
        .tile:nth-child(6) { animation-delay: 0.6s; }
		.tile:nth-child(7) { animation-delay: 0.7s; }

        @keyframes aparecer {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ICONOS */
        .tile i {
            font-size: 55px;
            margin-bottom: 10px;
        }

        /* TEXTO */
        .tile span {
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            padding: 0 10px;
        }

        /* HOVER */
        .tile:hover {
            transform: scale(1.08);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            filter: brightness(1.2);
        }

        /* COLORES */
        .matriz {
            background: linear-gradient(135deg, #0984e3, #74b9ff);
        }

        .habilidades {
            background: linear-gradient(135deg, #00b894, #55efc4);
        }

        .inscripcion {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
        }

        .cursos {
            background: linear-gradient(135deg, #e17055, #fab1a0);
        }

        .evaluaciones {
            background: linear-gradient(135deg, #00cec9, #81ecec);
        }

        /* 🔥 NUEVO CALENDARIO PRO */
        .calendario {
            background: linear-gradient(135deg, #fdcb6e, #ffeaa7);
            color: #2d3436;
        }

        .calendario i {
            color: #2d3436;
        }

		.plan {
		    background: linear-gradient(135deg, #8e44ad, #c39bd3);
		}
    </style>

</head>

<body>

<!-- SIDEBAR -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<!-- CONTENIDO -->
<div class="content">

    <div class="tiles">

        <!-- MATRIZ -->
        <a href="/matriz/nueva" class="tile matriz">
            <i class="bi bi-grid-3x3-gap"></i>
            <span>Matriz</span>
        </a>

        <!-- HABILIDADES -->
        <a href="/matriz/habilidades" class="tile habilidades">
            <i class="bi bi-lightbulb-fill"></i>
            <span>Habilidades</span>
        </a>

        <!-- INSCRIPCIÓN -->
        <a href="/inscripcion" class="tile inscripcion">
            <i class="bi bi-person-plus-fill"></i>
            <span>Inscribir Capacitación</span>
        </a>

        <!-- CURSOS -->
        <a href="/cursos/asignados" class="tile cursos">
            <i class="bi bi-check2-square"></i>
            <span>Cursos con Capacitaciones</span>
        </a>

        <!-- EVALUACIONES -->
        <a href="/evaluaciones/cursos" class="tile evaluaciones">
            <i class="bi bi-clipboard-check"></i>
            <span>Calificar Capacitaciones</span>
        </a>

        <!-- 🔥 CALENDARIO PRO -->
        <a href="/calendario" class="tile calendario">
            <i class="bi bi-calendar-event-fill"></i>
            <span>Calendario de Capacitaciones</span>
        </a>
		
		<!-- 🔥 PLAN DE CARRERA -->
		<a href="/plan-carrera/crear" class="tile plan">
		    <i class="bi bi-diagram-3-fill"></i>
		    <span>Plan de Carrera</span>
		</a>

    </div>

</div>

</body>
</html>
