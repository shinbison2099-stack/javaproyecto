<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Capacitaciones</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .container {
            margin-top: 40px;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h2 {
            font-weight: bold;
        }

        /* GRID */
        .tiles {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        /* TILE */
        .tile {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);

            transform: scale(0.9);
            opacity: 0;
            animation: aparecer 0.5s ease forwards;
        }

        .tile:nth-child(1) { animation-delay: 0.1s; }
        .tile:nth-child(2) { animation-delay: 0.2s; }
        .tile:nth-child(3) { animation-delay: 0.3s; }
        .tile:nth-child(4) { animation-delay: 0.4s; }

        @keyframes aparecer {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* HOVER */
        .tile:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* ICON */
        .tile i {
            font-size: 45px;
            margin-bottom: 10px;
            color: #74b9ff;
        }

        /* TITULO */
        .tile-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        /* BOTÓN */
        .btn-tile {
            border-radius: 10px;
        }

        /* BADGE */
        .badge-custom {
            background: #00cec9;
            border-radius: 10px;
            padding: 5px 10px;
            font-size: 12px;
            margin-bottom: 10px;
            display: inline-block;
        }

    </style>

</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">

        <h2>
            <i class="bi bi-journal-bookmark-fill"></i>
            <span th:text="'Curso: ' + ${curso.nombreCurso}"></span>
        </h2>

        <!-- BOTÓN REGRESAR -->
        <a href="/evaluaciones/cursos" class="btn btn-outline-light btn-sm">
            <i class="bi bi-arrow-left"></i> Regresar
        </a>

    </div>

    <!-- GRID -->
    <div class="tiles">

        <div class="tile" th:each="cap : ${capacitaciones}">

            <i class="bi bi-bookmark-check"></i>

            <!-- CONTADOR HORAS -->
            <span class="badge-custom"
                  th:text="${cap.duracionHoras} + ' hrs'">
            </span>

            <div class="tile-title"
                 th:text="${cap.nombreCapacitacion}">
            </div>

            <a th:href="@{/evaluaciones/capacitacion/{id}(id=${cap.id})}"
               class="btn btn-success btn-sm btn-tile">
                <i class="bi bi-people"></i>
                Ver Trabajadores
            </a>

        </div>

    </div>

</div>

</body>
</html>
