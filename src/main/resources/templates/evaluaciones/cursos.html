<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Seleccionar Curso</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: Arial;
            color: white;
        }

        .container {
            margin-top: 40px;
        }

        h2 {
            font-weight: bold;
            margin-bottom: 25px;
        }

        /* 🔥 GRID WINDOWS */
        .tiles {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        /* 🔥 TILE */
        .tile {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);

            transform: scale(0.9);
            opacity: 0;
            animation: aparecer 0.5s ease forwards;
        }

        /* Animación escalonada */
        .tile:nth-child(1) { animation-delay: 0.1s; }
        .tile:nth-child(2) { animation-delay: 0.2s; }
        .tile:nth-child(3) { animation-delay: 0.3s; }
        .tile:nth-child(4) { animation-delay: 0.4s; }

        @keyframes aparecer {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Hover */
        .tile:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* Icono */
        .tile i {
            font-size: 50px;
            margin-bottom: 10px;
        }

        /* Nombre */
        .tile-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        /* Botón */
        .btn-tile {
            border-radius: 10px;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>
        <i class="bi bi-clipboard-check"></i>
        Selecciona un Curso
    </h2>

    <div class="tiles">

        <div class="tile" th:each="curso : ${cursos}">

            <i class="bi bi-book"></i>

            <div class="tile-title"
                 th:text="${curso.nombreCurso}">
            </div>

            <a th:href="@{/evaluaciones/curso/{id}(id=${curso.id})}"
               class="btn btn-primary btn-sm btn-tile">
                <i class="bi bi-arrow-right-circle"></i>
                Ver Capacitaciones
            </a>

        </div>

    </div>

</div>

</body>
</html>
