	<!DOCTYPE html>

	<html xmlns:th="http://www.thymeleaf.org">

	<head>

	<meta charset="UTF-8">

	<title>Matriz Hourly</title>

	<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

	<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

	<style>

	body{

	    background:#0b1220;
	    color:white;
	    min-height:100vh;
	}

	.header-card{

	    background:#111c34;

	    border-radius:20px;

	    padding:25px;

	    margin-bottom:25px;

	    box-shadow:
	    0 10px 30px rgba(0,0,0,.3);
	}

	.curso-card{

	    background:#16233f;

	    border-radius:18px;

	    padding:20px;

	    height:100%;

	    transition:.3s;
	}

	.curso-card:hover{

	    transform:translateY(-3px);

	    box-shadow:
	    0 12px 30px rgba(0,0,0,.35);
	}

	.curso-title{

	    font-size:20px;

	    font-weight:bold;

	    color:#ffffff;
	}

	.cap-item{

	    background:#243659;

	    padding:10px;

	    border-radius:10px;

	    margin-bottom:8px;
	}

	.badge-custom{

	    margin-right:5px;
	}

	.info-box{

	    background:#243659;

	    border-radius:12px;

	    padding:10px;

	    text-align:center;
	}

	.info-number{

	    font-size:22px;

	    font-weight:bold;
	}

	.section-title{

	    margin-bottom:20px;

	    font-weight:bold;
	}
	
	.table-dark{

	    background:#16233f;
	}

	.table-dark th{

	    background:#1d2d4d;
	    color:white;
	    text-align:center;
	}
	
	.table-responsive{
	    overflow-x:auto;
	}

	table{
	    min-width:1200px;
	}

	.avatar{

	    width:45px;
	    height:45px;

	    border-radius:50%;

	    object-fit:cover;

	    border:2px solid #334155;
	}

	.estado{

	    font-size:32px;
	}

	.estado-inscrito{

	    color:#d1d5db;
	}

	.estado-programado{

	    color:#3b82f6;
	}

	.estado-capacitado{

	    color:#facc15;
	}

	.estado-40h{

	    color:#fb923c;
	}

	.estado-acreditado{

	    color:#22c55e;
	}
	
	.no-inscrito-badge{
	    background:#475569;
	    color:#fff;
	    font-size:11px;
	    padding:5px 8px;
	    border-radius:10px;
	    display:inline-block;
	    white-space:nowrap;
	}

	</style>

	</head>

	<body>

	<div class="container-fluid p-4">

	```
	<!-- HEADER -->

	<div class="header-card">

	    <div class="row">

	        <div class="col-md-8">

	            <h2>

	                <i class="bi bi-grid-3x3-gap-fill"></i>

	                <span th:text="${matriz.nombre}">
	                    Matriz Hourly
	                </span>

	            </h2>

	            <p class="mb-1">

	                <strong>Área:</strong>

	                <span th:text="${matriz.area}">
	                </span>

	            </p>

	            <p>

	                <strong>SubÁrea:</strong>

	                <span th:text="${matriz.subArea}">
	                </span>

	            </p>

	        </div>

	        <div class="col-md-4 text-end">

	            <span
	                class="badge bg-success fs-6">

	                HOURLY
	            </span>

	        </div>

	    </div>

	</div>

	<!-- CURSOS -->

	<h3 class="section-title">

	    <i class="bi bi-book"></i>

	    Cursos y Capacitaciones

	</h3>

	<div class="row">

	    <div
	        class="col-lg-4 mb-4"
	        th:each="curso : ${matriz.cursos}">

	        <div class="curso-card">

	            <div class="curso-title"
	                 th:text="${curso.nombreCurso}">
	            </div>

	            <hr>

	            <div class="mb-3">

	                <span
	                    class="badge bg-primary badge-custom">

	                    Curso
	                </span>

	                <span
	                    class="badge bg-info badge-custom">

	                    <span
	                        th:text="${curso.totalCapacitaciones}">
	                    </span>

	                    Capacitaciones
	                </span>

	            </div>

	            <div>

	                <div
	                    th:each="cap : ${curso.capacitaciones}"

	                    class="cap-item">

	                    <i class="bi bi-journal-check"></i>

	                    <span
	                        th:text="${cap.nombreCapacitacion}">
	                    </span>

	                </div>

	            </div>

	        </div>

	    </div>

	</div>

	<!-- PRÓXIMA SECCIÓN -->

	<!-- ========================================= -->
	<!-- MATRIZ DE TRABAJADORES -->
	<!-- ========================================= -->

	<div class="header-card mt-4">

	    <h3>

	        <i class="bi bi-people-fill"></i>

	        Matriz de Trabajadores

	    </h3>

	    <div class="mt-2">

	        <span class="me-3">
	            ○ Inscrito
	        </span>

	        <span class="me-3">
	            ◔ Programado
	        </span>

	        <span class="me-3">
	            ◑ Capacitado
	        </span>

	        <span class="me-3">
	            ◕ 40H
	        </span>

	        <span>
	            ● Acreditado
	        </span>

	    </div>

	</div>

	<div class="table-responsive">
	    <table class="table table-dark table-bordered align-middle">

	        <thead>
	            <!-- FILA 1: CURSOS -->
	            <tr>
	                <th>ID</th>
	                <th>Trabajador</th>

	                <th th:each="curso : ${matriz.cursos}"
	                    th:colspan="${curso.capacitaciones.size()}"
	                    class="text-center">
	                    <span th:text="${curso.nombreCurso}"></span>
	                </th>

	                <th>TOTAL</th>
	            </tr>

	            <!-- FILA 2: CAPACITACIONES -->
	            <tr>
	                <th></th>
	                <th></th>

	                <th th:each="cap : ${matriz.capacitaciones}"
	                    th:text="${cap.nombreCapacitacion}">
	                </th>

	                <th></th>
	            </tr>
	        </thead>

	        <tbody>
	            <tr th:each="trabajador : ${matriz.trabajadores}">

	                <td th:text="${trabajador.numeroPersonal}"></td>

					<td>
					    <div class="d-flex align-items-center">

					        <img
					            th:src="@{/matriz/foto/{numero}(numero=${trabajador.numeroPersonal})}"
					            class="avatar"
					            onerror="this.src='/img/user.png'">

					        <div class="ms-2">
					            <div>
					                <span th:text="${trabajador.nombre}"></span>
					                <span th:text="${trabajador.primerApellido}"></span>
					                <span th:text="${trabajador.segundoApellido}"></span>
					            </div>

					            <small th:text="${trabajador.puesto}"></small>
					        </div>
					    </div>
					</td>

	                <!-- CELDAS -->
					<td th:each="celda : ${trabajador.celdas}" class="text-center">

					    <span th:switch="${celda.nivel != null ? celda.nivel.name() : 'VACIO'}">

					        <span th:case="'VACIO'" class="no-inscrito-badge">
					            No inscrito
					        </span>

					        <span th:case="'PROGRAMADO'" class="estado estado-programado" title="Programado">
					            ◔
					        </span>

					        <span th:case="'CAPACITADO'" class="estado estado-capacitado" title="Capacitado">
					            ◑
					        </span>

					        <span th:case="'EXPERIENCIA_40H'" class="estado estado-40h" title="40 Horas">
					            ◕
					        </span>

					        <span th:case="'ACREDITADO'" class="estado estado-acreditado" title="Acreditado">
					            ●
					        </span>

					    </span>

					</td>

	                <td class="fw-bold text-warning"
	                    th:text="${trabajador.porcentaje + '%'}">
	                </td>
	            </tr>
	        </tbody>

	    </table>
	</div>
	

	</div>

	</body>

	



</html>
