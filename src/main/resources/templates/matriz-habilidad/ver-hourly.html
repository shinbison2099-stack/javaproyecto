	<!DOCTYPE html>

	<html xmlns:th="http://www.thymeleaf.org">

	<head>

	<meta charset="UTF-8">

	<title>Matriz Hourly</title>

	<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

	<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

	<style>

	body{

	    background:#0b1220;
	    color:white;
	    min-height:100vh;
	}

	.header-card{

	    background:#111c34;

	    border-radius:20px;

	    padding:25px;

	    margin-bottom:25px;

	    box-shadow:
	    0 10px 30px rgba(0,0,0,.3);
	}

	.curso-card{

	    background:#16233f;

	    border-radius:18px;

	    padding:20px;

	    height:100%;

	    transition:.3s;
	}

	.curso-card:hover{

	    transform:translateY(-3px);

	    box-shadow:
	    0 12px 30px rgba(0,0,0,.35);
	}

	.curso-title{

	    font-size:20px;

	    font-weight:bold;

	    color:#ffffff;
	}

	.cap-item{

	    background:#243659;

	    padding:10px;

	    border-radius:10px;

	    margin-bottom:8px;
	}

	.badge-custom{

	    margin-right:5px;
	}

	.info-box{

	    background:#243659;

	    border-radius:12px;

	    padding:10px;

	    text-align:center;
	}

	.info-number{

	    font-size:22px;

	    font-weight:bold;
	}

	.section-title{

	    margin-bottom:20px;

	    font-weight:bold;
	}

	</style>

	</head>

	<body>

	<div class="container-fluid p-4">

	```
	<!-- HEADER -->

	<div class="header-card">

	    <div class="row">

	        <div class="col-md-8">

	            <h2>

	                <i class="bi bi-grid-3x3-gap-fill"></i>

	                <span th:text="${matriz.nombre}">
	                    Matriz Hourly
	                </span>

	            </h2>

	            <p class="mb-1">

	                <strong>Área:</strong>

	                <span th:text="${matriz.area}">
	                </span>

	            </p>

	            <p>

	                <strong>SubÁrea:</strong>

	                <span th:text="${matriz.subArea}">
	                </span>

	            </p>

	        </div>

	        <div class="col-md-4 text-end">

	            <span
	                class="badge bg-success fs-6">

	                HOURLY
	            </span>

	        </div>

	    </div>

	</div>

	<!-- CURSOS -->

	<h3 class="section-title">

	    <i class="bi bi-book"></i>

	    Cursos y Capacitaciones

	</h3>

	<div class="row">

	    <div
	        class="col-lg-4 mb-4"
	        th:each="curso : ${matriz.cursos}">

	        <div class="curso-card">

	            <div class="curso-title"
	                 th:text="${curso.nombreCurso}">
	            </div>

	            <hr>

	            <div class="mb-3">

	                <span
	                    class="badge bg-primary badge-custom">

	                    Curso
	                </span>

	                <span
	                    class="badge bg-info badge-custom">

	                    <span
	                        th:text="${curso.totalCapacitaciones}">
	                    </span>

	                    Capacitaciones
	                </span>

	            </div>

	            <div>

	                <div
	                    th:each="cap : ${curso.capacitaciones}"

	                    class="cap-item">

	                    <i class="bi bi-journal-check"></i>

	                    <span
	                        th:text="${cap.nombreCapacitacion}">
	                    </span>

	                </div>

	            </div>

	        </div>

	    </div>

	</div>

	<!-- PRÓXIMA SECCIÓN -->

	<div class="header-card mt-4">

	    <h4>

	        <i class="bi bi-people-fill"></i>

	        Matriz de Trabajadores

	    </h4>

	    <p class="text-secondary">

	        Aquí mostraremos posteriormente:

	        ○ Inscrito

	        ◔ Programado

	        ◑ Capacitado

	        ◕ 40 Horas

	        ● Acreditado

	    </p>

	</div>
	

	</div>

	</body>

	



</html>
