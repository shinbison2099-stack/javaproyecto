<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skill Matrix Salary</title>

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{
    background: linear-gradient(135deg, #081229, #0f172a);
    color:white;
    min-height:100vh;
    font-family:'Segoe UI', sans-serif;
}

.card-box{
    background:#0f1b33;
    border-radius:18px;
    padding:20px;
    margin-top:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.35);
}

.header-box{
    background:#0f1b33;
    border-radius:18px;
    padding:20px;
    margin-top:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.35);
}

.table{
    color:white;
    margin-bottom:0;
}

.table th{
    background:#132544;
    color:white;
    text-align:center;
    vertical-align:middle;
    border-color:#304563;
    white-space:nowrap;
    font-weight:700;
}

.table td{
    text-align:center;
    vertical-align:middle;
    border-color:#304563;
    background:rgba(10,20,40,.45);
}

.table-responsive{
    overflow-x:auto;
}

.foto-trabajador{
    width:42px;
    height:42px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #ffffff;
    flex-shrink:0;
}

.nombre-trabajador{
    font-weight:600;
    color:white;
    line-height:1.1;
}

.puesto-trabajador{
    color:#94a3b8;
    font-size:11px;
    margin-top:2px;
}

.estado-verde{
    width:18px;
    height:18px;
    border-radius:50%;
    background:#22c55e;
    margin:auto;
    box-shadow:
        0 0 8px #22c55e,
        0 0 16px rgba(34,197,94,.65);
}

.estado-amarillo{
    width:18px;
    height:18px;
    border-radius:50%;
    background:#facc15;
    margin:auto;
    box-shadow:
        0 0 8px #facc15,
        0 0 16px rgba(250,204,21,.65);
}

.estado-gris{
    width:18px;
    height:18px;
    border-radius:50%;
    background:#475569;
    margin:auto;
    box-shadow:
        0 0 6px rgba(71,85,105,.8);
}

.total-rojo{
    color:#ef4444;
    font-weight:bold;
    font-size:18px;
}

.total-amarillo{
    color:#facc15;
    font-weight:bold;
    font-size:18px;
}

.total-verde{
    color:#22c55e;
    font-weight:bold;
    font-size:18px;
}

.subtitulo{
    color:#cbd5e1;
    font-size:13px;
}

.badge-salary{
    background:#2563eb;
    color:white;
    font-size:12px;
    padding:8px 12px;
    border-radius:20px;
}

.col-nombre{
    min-width:215px;
}

.col-id{
    min-width:70px;
}

.col-total{
    min-width:90px;
}

.col-habilidad{
    min-width:150px;
}

.no-inscrito-badge{
    background:#475569;
    color:#fff;
    font-size:11px;
    padding:5px 8px;
    border-radius:10px;
    display:inline-block;
    white-space:nowrap;
}

</style>
</head>
<body>

<div class="container-fluid p-3">

    <!-- HEADER -->
    <div class="header-box">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
            <div>
                <h2 class="mb-2 fw-bold">
                    <i class="bi bi-grid-3x3-gap-fill"></i>
                    <span th:text="${matriz.nombre}">Matriz Salary</span>
                </h2>

                <div class="subtitulo">
                    <div>
                        <strong>Área:</strong>
                        <span th:text="${matriz.area}">Área</span>
                    </div>
                    <div>
                        <strong>SubÁrea:</strong>
                        <span th:text="${matriz.subArea}">Subárea</span>
                    </div>
                </div>
            </div>

            <div>
                <span class="badge-salary">SALARY</span>
            </div>
        </div>
    </div>

    <!-- MATRIZ -->
    <div class="card-box">

        <h3 class="mb-4 fw-bold">
            <i class="bi bi-bar-chart-fill"></i>
            Skill Matrix Salary
        </h3>

        <div class="table-responsive">
            <table class="table table-bordered align-middle">

                <thead>
                    <tr>
                        <th rowspan="2" class="col-id">ID</th>
                        <th rowspan="2" class="col-nombre">Nombre</th>

                        <th:block th:each="curso : ${matriz.cursos}">
                            <th th:colspan="${curso.capacitaciones.size()}"
                                th:text="${curso.nombreCurso}">
                                Curso
                            </th>
                        </th:block>

                        <th rowspan="2" class="col-total">TOTAL</th>
                    </tr>

                    <tr>
                        <th:block th:each="curso : ${matriz.cursos}">
                            <th th:each="cap : ${curso.capacitaciones}"
                                class="col-habilidad"
                                th:text="${cap.nombreCapacitacion}">
                                Capacitacion
                            </th>
                        </th:block>
                    </tr>
                </thead>

				<tbody>

				<tr th:each="trabajador : ${matriz.trabajadores}">

				    <!-- ID -->
				    <td th:text="${trabajador.numeroPersonal}">1001</td>

				    <!-- FOTO + NOMBRE -->
				    <td class="text-start">
				        <div class="d-flex align-items-center gap-2">

				            <img
				                th:src="@{/matriz-habilidad/foto/{numero}(numero=${trabajador.numeroPersonal})}"
				                class="foto-trabajador"
				                onerror="this.src='/img/user.png'">

				            <div>
				                <div class="nombre-trabajador">
				                    <span th:text="${trabajador.nombre}">Nombre</span>
				                    <span th:text="${trabajador.primerApellido}">Apellido</span>
				                    <span th:text="${trabajador.segundoApellido}">Apellido2</span>
				                </div>

				                <div class="puesto-trabajador"
				                     th:text="${trabajador.puesto}">
				                    Sin puesto
				                </div>
				            </div>
				        </div>
				    </td>

				    <!-- CELDAS -->
					<td th:each="celda : ${trabajador.celdas}" class="text-center">

					    <div class="estado-verde"
					         th:if="${celda.nivel != null and celda.nivel.name() == 'ACREDITADO'}"
					         title="Acreditado">
					    </div>

					    <div class="estado-amarillo"
					         th:if="${celda.nivel != null and celda.nivel.name() == 'INSCRITO'}"
					         title="Inscrito">
					    </div>

					    <span class="no-inscrito-badge"
					          th:if="${celda.nivel == null or celda.nivel.name() == 'VACIO'}">
					        No inscrito
					    </span>

					</td>
				    <!-- TOTAL -->
				    <td>
				        <span th:text="${trabajador.porcentaje + '%'}"
				              th:classappend="${trabajador.porcentaje >= 80} ? ' total-verde' : (${trabajador.porcentaje >= 50} ? ' total-amarillo' : ' total-rojo')">
				            0%
				        </span>
				    </td>

				</tr>

				</tbody>

            </table>
        </div>
    </div>

</div>

</body>
</html>
