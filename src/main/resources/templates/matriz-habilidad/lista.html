<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Matrices de Habilidades</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{
    background:#0f172a;
    color:white;
}

.card{
    background:#1e293b;
    border:none;
    color:white;
}

.table{
    color:white;
}

.table th{
    background:#334155;
}

.table td{
    vertical-align:middle;
}

</style>

</head>

<body>

<div class="container mt-5">

    <div class="card p-4">

        <div class="d-flex justify-content-between mb-4">

            <h2>
                <i class="bi bi-diagram-3-fill"></i>
                Matrices de Habilidades
            </h2>

            <a th:href="@{/matriz-habilidad/nuevo}"
               class="btn btn-success">

                <i class="bi bi-plus-circle"></i>
                Nueva Matriz

            </a>

        </div>

        <table class="table table-bordered table-hover">

            <thead>

            <tr>

                <th>ID</th>

                <th>Nombre</th>

                <th>Área</th>

                <th>SubÁrea</th>

                <th>Tipo Trabajador</th>

                <th>Acciones</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="m : ${matrices}">

                <td th:text="${m.id}"></td>

                <td th:text="${m.nombre}"></td>

                <td th:text="${m.area != null ? m.area.nombreArea : ''}"></td>

                <td th:text="${m.subArea != null ? m.subArea.nombreSubArea : ''}"></td>

                <td>

                    <span class="badge bg-primary"
                          th:text="${m.tipoTrabajador}">
                    </span>

                </td>

				<td>

				    <a th:href="@{/matriz-habilidad/ver/{id}(id=${m.id})}"
				       class="btn btn-info btn-sm">

				        <i class="bi bi-grid-3x3-gap-fill"></i>
				        Ver

				    </a>

				    <a th:href="@{/matriz-habilidad/editar/{id}(id=${m.id})}"
				       class="btn btn-warning btn-sm">

				        <i class="bi bi-pencil-fill"></i>
				        Editar

				    </a>

					<button
					    type="button"
					    class="btn btn-danger btn-sm"
					    th:attr="data-id=${m.id}"
					    onclick="confirmarEliminacion(this)">

					    <i class="bi bi-trash-fill"></i>
					    Eliminar

					</button>

				</td>

            </tr>

            <tr th:if="${#lists.isEmpty(matrices)}">

                <td colspan="6" class="text-center">

                    No existen matrices registradas

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

<!-- MODAL ELIMINAR -->

<div class="modal fade"
     id="modalEliminar"
     tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content bg-dark text-white">

            <div class="modal-header">

                <h5 class="modal-title">

                    <i class="bi bi-exclamation-triangle-fill text-warning"></i>

                    Confirmar eliminación

                </h5>

            </div>

            <div class="modal-body">

                ¿Deseas eliminar esta matriz?

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Cancelar

                </button>

                <a id="btnEliminar"
                   href="#"
                   class="btn btn-danger">

                    Eliminar

                </a>

            </div>

        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

<script>

	function confirmarEliminacion(btn){

	    let id =
	        btn.getAttribute("data-id");

	    fetch(
	        "/matriz-habilidad/validar-eliminar/" + id
	    )
	    .then(r => r.json())
	    .then(data => {

	        if(!data.puedeEliminar){

	            alert(
	                "No se puede eliminar la matriz.\n\n" +
	                "Tiene " +
	                data.totalTrabajadores +
	                " trabajadores asignados."
	            );

	            return;
	        }

	        document
	            .getElementById("btnEliminar")
	            .href =
	            "/matriz-habilidad/eliminar/" + id;

	        let modal =
	            new bootstrap.Modal(
	                document.getElementById(
	                    "modalEliminar"
	                )
	            );

	        modal.show();

	    });
	}

</script>

</html>
