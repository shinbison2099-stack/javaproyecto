<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>Cursos</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
	<!-- 🔥 ICONOS (TE FALTABA O ESTÁ MAL UBICADO) -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

	<!-- CSS -->
	<link rel="stylesheet" th:href="@{/css/menu.css}">
	<link rel="stylesheet" th:href="@{/css/sidebar.css}">

</head>

<body>

	<div th:replace="~{fragments/menu :: menu}"></div>
	<div th:replace="~{fragments/sidebar :: sidebar}"></div>

	<div class="container mt-4">

		<h2>Lista de Cursos</h2>



		<div class="mb-3">

			<a href="/cursos/nuevo" class="btn btn-primary">
				<i class="bi bi-plus-circle"></i>Nuevo Curso
			</a>

			<a href="/cursos/pdf" class="btn btn-danger">
				<i class="bi bi-file-earmark-pdf"></i> Exportar PDF
			</a>

			<a href="/cursos/eliminados" class="btn btn-dark">
				<i class="bi bi-trash"></i> Cursos Eliminados
			</a>

			<form th:action="@{/cursos/importar}" method="post" enctype="multipart/form-data"
				style="display:inline-block;">

				<input type="file" name="archivo" required>

				<button type="submit" class="btn btn-success">
					<i class="bi bi-upload"></i>Importar Excel
				</button>

			</form>

			<a href="/cursos/plantilla" class="btn btn-info">
				<i class="bi bi-download"></i> Descargar plantilla
			</a>



		</div>


		<table class="table table-bordered table-striped">

			<thead class="table-dark">
			    <tr>
			        <th>#</th>
			        <th>Clave Curso</th>
			        <th>Nombre Curso</th>
			        <th>Área Temática</th>
			        <th>Duración</th>
			        <th>Instructor</th>
			        <th>Inicio</th>
			        <th>Fin</th>
			        <th>Activo</th>
			        <th>Materiales</th>
			        <th>Opciones</th>
			    </tr>
			</thead>

			<tbody>

			<tr th:each="curso, iterStat : ${cursos}">

			    <!-- 🔥 ENUMERACIÓN -->
			    <td th:text="${iterStat.count}"></td>

			    <td th:text="${curso.claveCurso}"></td>
			    <td th:text="${curso.nombreCurso}"></td>
			    <td th:text="${curso.claveAreaTematica}"></td>
			    <td th:text="${curso.duracion + ' hrs'}"></td>

			    <td th:text="${curso.instructor != null ? curso.instructor.nombre : 'Sin instructor'}"></td>

			   


					<!-- FECHA INICIO -->
					<td th:classappend="${curso.fechaInicio != null and curso.fechaInicio.isAfter(T(java.time.LocalDate).now())} ?
'text-warning fw-bold' :
(${curso.fechaFin != null and curso.fechaFin.isBefore(T(java.time.LocalDate).now())} ?
'text-danger fw-bold' :
'text-success fw-bold')">

						<span th:text="${curso.fechaInicio != null ?
#temporals.format(curso.fechaInicio,'dd MMM yyyy',T(java.util.Locale).forLanguageTag('es'))
: 'Sin fecha'}"></span>

					</td>


					<!-- FECHA FIN -->
					<td th:classappend="${curso.fechaInicio != null and curso.fechaInicio.isAfter(T(java.time.LocalDate).now())} ?
'text-warning fw-bold' :
(${curso.fechaFin != null and curso.fechaFin.isBefore(T(java.time.LocalDate).now())} ?
'text-danger fw-bold' :
'text-success fw-bold')">

						<span th:text="${curso.fechaFin != null ?
#temporals.format(curso.fechaFin,'dd MMM yyyy',T(java.util.Locale).forLanguageTag('es'))
: 'Sin fecha'}"></span>

					</td>


					<td th:text="${curso.activo} ? 'Sí' : 'No'"></td>


					<td>

						<a th:href="@{/materiales/curso/{id}(id=${curso.id})}" class="btn btn-primary btn-sm">
							Ver Materiales
						</a>

						<a th:href="@{/materiales/nuevo/{id}(id=${curso.id})}" class="btn btn-secondary btn-sm">
							Subir Material
						</a>

					</td>

					<td>

					    <a th:href="@{/cursos/editar/{id}(id=${curso.id})}"
					       class="btn btn-warning btn-sm">
					        <i class="bi bi-pencil"></i>
					    </a>

					    <a th:href="@{/cursos/eliminar/{id}(id=${curso.id})}"
					       class="btn btn-danger btn-sm"
					       onclick="return confirm('¿Eliminar curso?')">
					        <i class="bi bi-trash"></i>
					    </a>

					    <!-- 🔥 NUEVO BOTÓN -->
					    <a th:href="@{/temas/curso/{id}(id=${curso.id})}"
					       class="btn btn-info btn-sm">
					        <i class="bi bi-calendar3"></i>
					    </a>

					</td>

				</tr>

			</tbody>

		</table>

	</div>

</body>

</html>
