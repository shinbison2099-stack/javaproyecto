<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Cursos</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Iconos -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', sans-serif;
            color: #e2e8f0;
        }

        .bg-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: #3b82f6;
            filter: blur(150px);
            top: 10%;
            left: 20%;
            z-index: -1;
        }

        .container-box {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        h2 {
            color: #38bdf8;
            font-weight: 600;
        }

        table {
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
        }

        th {
            background: rgba(255,255,255,0.05);
        }

        .badge-interno { background: #3b82f6; }
        .badge-externo { background: #f59e0b; color: black; }
        .badge-hourly { background: #10b981; }
        .badge-salary { background: #8b5cf6; }
        .badge-ambos { background: #64748b; }

        .btn { border-radius: 10px; }
    </style>
</head>

<body>

<div class="bg-glow"></div>

<div th:replace="~{fragments/menu :: menu}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="container mt-4">

    <div class="container-box">

        <h2>📚 Lista de Cursos</h2>

        <div class="mb-3 d-flex flex-wrap gap-2">

            <a href="/cursos/nuevo" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Nuevo Curso
            </a>

            <a href="/cursos/pdf" class="btn btn-danger">
                <i class="bi bi-file-earmark-pdf"></i> PDF
            </a>

            <a href="/cursos/eliminados" class="btn btn-dark">
                <i class="bi bi-trash"></i> Eliminados
            </a>

            <form th:action="@{/cursos/importar}" method="post"
                  enctype="multipart/form-data"
                  class="d-flex gap-2">

                <input type="file" name="archivo" required class="form-control">

                <button type="submit" class="btn btn-success">
                    <i class="bi bi-upload"></i>
                </button>
            </form>

			<a href="/cursos/plantilla" class="btn btn-outline-info">
			    <i class="bi bi-file-earmark-arrow-down"></i>
			    Plantilla Excel
			</a>

        </div>

        <div style="max-height:500px; overflow:auto;">

            <table class="table table-bordered table-hover">

				<thead>
					<tr>
					    <th>#</th>
					    <th>Clave</th>
					    <th>Nombre</th>
					    <th>Área Temática</th>
					    <th>Área Responsable</th>
					    <th>Duración</th>
					    <th>Tipo Curso</th>
					    <th>Tipo Trabajador</th>
					    <th>Vigencia</th>
					    <th>Capacitaciones</th>
					    <th>Activo</th>
					    <th>Acciones</th>
					</tr>
				</thead>
				<tbody>

				<tr th:each="curso, iterStat : ${cursos}">

				    <td th:text="${iterStat.count}"></td>

				    <td th:text="${curso.claveCurso}"></td>

				    <td th:text="${curso.nombreCurso}"></td>

				    <td th:text="${curso.claveAreaTematica}"></td>

				    <td th:text="${curso.areaResponsable}"></td>

				    <!-- HORAS -->
				    <td>

				        <span class="badge bg-secondary">

				            ⏱️

				            <span th:text="${curso.horas}"></span>

				            hrs

				        </span>

				    </td>

				    <!-- TIPO CURSO -->
				    <td>

				        <span class="badge"

				              th:classappend="
				              ${curso.tipoCurso != null and curso.tipoCurso.name() == 'INTERNO'}
				              ? ' badge-interno'
				              : ' badge-externo'"

				              th:text="${curso.tipoCurso != null ? curso.tipoCurso : 'SIN TIPO'}">

				        </span>

				    </td>

				    <!-- TIPO TRABAJADOR -->
				    <td>

				        <span class="badge"

				              th:classappend="
				              ${curso.tipoTrabajador != null and curso.tipoTrabajador.name() == 'HOURLY'} ? ' badge-hourly' :
				              (${curso.tipoTrabajador != null and curso.tipoTrabajador.name() == 'SALARY'} ? ' badge-salary' : ' badge-ambos')"

				              th:text="${curso.tipoTrabajador != null ? curso.tipoTrabajador : 'SIN TIPO'}">

				        </span>

				    </td>

				    <!-- VIGENCIA -->
				    <td>

				        <span class="badge bg-info">

				            <span th:text="${curso.vigenciaMeses}"></span>

				            meses

				        </span>

				    </td>

				    <!-- CAPACITACIONES -->
				    <td>

				        <span class="badge bg-primary"

				              th:text="${curso.capacitaciones != null ? #lists.size(curso.capacitaciones) : 0}">

				        </span>

				    </td>

				    <!-- ACTIVO -->
				    <td>

				        <span class="badge bg-success"
				              th:if="${curso.activo}">

				            Activo

				        </span>

				        <span class="badge bg-danger"
				              th:if="${!curso.activo}">

				            Inactivo

				        </span>

				    </td>

				    <!-- ACCIONES -->
				    <td>

				        <a th:href="@{/cursos/editar/{id}(id=${curso.id})}"
				           class="btn btn-warning btn-sm">

				            <i class="bi bi-pencil"></i>

				        </a>

				        <a th:href="@{/cursos/eliminar/{id}(id=${curso.id})}"
				           class="btn btn-danger btn-sm"
				           onclick="return confirm('¿Eliminar curso?')">

				            <i class="bi bi-trash"></i>

				        </a>

				    </td>

				</tr>

				</tbody>

        </div>

    </div>

</div>

</body>
</html>
