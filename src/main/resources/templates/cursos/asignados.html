<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Cursos con Capacitaciones</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Iconos -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/menu.css}">
	<link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <style>

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            font-family: Arial;
        }

        .content {
            padding: 40px;
        }

        /* 🔥 GRID WINDOWS */
		.tiles {
		    display: grid;
		    grid-template-columns: repeat(4, 1fr);
		    gap: 25px;
		}

		@media (max-width: 1200px) {
		    .tiles {
		        grid-template-columns: repeat(3, 1fr);
		    }
		}

		@media (max-width: 768px) {
		    .tiles {
		        grid-template-columns: repeat(2, 1fr);
		    }
		}

        /* 🔥 TILE */
        .tile {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .tile:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* HEADER */
        .tile-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .tile-header i {
            margin-right: 8px;
        }

        /* CONTADOR */
        .contador {
            font-size: 12px;
            background: #00b894;
            padding: 5px 10px;
            border-radius: 10px;
            margin-left: 10px;
        }

        /* CAPACITACIONES */
        .cap-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 8px 10px;
            margin-bottom: 8px;
        }

        /* BOTÓN ELIMINAR */
        .btn-delete {
            border: none;
            background: #e74c3c;
            color: white;
            border-radius: 8px;
            padding: 3px 8px;
            transition: 0.2s;
        }

        .btn-delete:hover {
            background: #c0392b;
            transform: scale(1.1);
        }

        /* BOTÓN ASIGNAR */
        .btn-assign {
            margin-top: 10px;
            width: 100%;
            border-radius: 10px;
        }

    </style>

</head>

<body>

<div th:replace="~{fragments/menu :: menu}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="content">

    <h2 class="mb-4">
        <i class="bi bi-windows"></i> Cursos con Capacitaciones
    </h2>

    <div class="tiles">

        <div class="tile" th:each="curso : ${cursos}">

            <!-- HEADER -->
			<div class="tile-header d-flex flex-wrap align-items-center gap-2">

			    <div class="d-flex align-items-center gap-2">
			        <i class="bi bi-book"></i>
			        <span th:text="${curso.nombreCurso}"></span>
			    </div>

			    <!-- CAPACITACIONES -->
				<span class="contador"
				      th:text="${#lists.size(curso.capacitaciones)} + ' cap.'">
				</span>

				<span class="contador bg-primary"
				      th:text="${curso.totalInscritos} + ' alumnos'">
				</span>

				<span class="contador bg-info"
				      th:text="${horasUsadas[curso.id]} + ' hrs usadas'">
				</span>

				<span class="contador bg-warning text-dark"
				      th:text="${horasRestantes[curso.id]} + ' hrs restantes'">
				</span>

			</div>

            <!-- LISTA -->
            <div>

                <!-- SI TIENE -->
                <div th:if="${!#lists.isEmpty(curso.capacitaciones)}">

					<div class="cap-item"
					     th:each="cap : ${curso.capacitaciones}">

					    <!-- NOMBRE -->
					    <span th:text="${cap.nombreCapacitacion}"></span>
						
						

					    <!-- BOTONES -->
					    <div class="d-flex gap-2">

					        <!-- ➕ INSCRIBIR TRABAJADOR -->
					        <a th:href="@{/capacitaciones/{id}/trabajadores(id=${cap.id})}"
					           class="btn btn-success btn-sm"
					           title="Inscribir trabajadores">

					            <i class="bi bi-person-plus-fill"></i>

					        </a>

					        <!-- ❌ ELIMINAR -->
					        <a th:href="@{/inscripcion/eliminar/{id}(id=${cap.id})}"
					           class="btn-delete"
					           onclick="return confirm('¿Eliminar capacitación?')">

					            <i class="bi bi-x"></i>

					        </a>

					    </div>

					</div>

                </div>

                <!-- SI NO TIENE -->
                <div th:if="${#lists.isEmpty(curso.capacitaciones)}"
                     class="text-muted">
                    Sin capacitaciones
                </div>

            </div>

            <!-- BOTÓN -->
            <a th:href="@{/inscripcion}"
               class="btn btn-light btn-sm btn-assign">
                <i class="bi bi-plus-circle"></i> Asignar
            </a>

        </div>

    </div>

</div>

</body>
</html>
