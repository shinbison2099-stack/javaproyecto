<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Cursos Eliminados</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            font-family: 'Segoe UI';
        }

        .container-box {
            background: rgba(30,41,59,0.6);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 15px;
        }

        table {
            background: rgba(255,255,255,0.05);
        }

        th {
            background: rgba(255,255,255,0.1);
        }

        .btn {
            border-radius: 10px;
        }
    </style>
	
	<!-- CSS -->
	   <link rel="stylesheet" th:href="@{/css/menu.css}">
	   <link rel="stylesheet" th:href="@{/css/sidebar.css}">

</head>

<body>
	<div class="bg-glow"></div>
	<div th:replace="~{fragments/menu :: menu}"></div>
	<div th:replace="~{fragments/sidebar :: sidebar}"></div>

	
<div class="container mt-4">

    <div class="container-box">

        <h2>🗑 Cursos Eliminados</h2>

        <div class="mb-3 d-flex gap-2">

            <a href="/cursos" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Volver
            </a>

            <!-- 🔥 ELIMINAR MASIVO -->
            <button class="btn btn-danger"
                    onclick="confirmarEliminacionMasiva()">
                <i class="bi bi-trash"></i> Eliminar Seleccionados
            </button>

        </div>

        <form id="formEliminarMasivo"
              method="post"
              action="/cursos/eliminar-masivo">

            <div style="max-height:400px; overflow:auto;">

                <table class="table table-bordered">

                    <thead>
                    <tr>
                        <th>
                            <input type="checkbox" onclick="toggleAll(this)">
                        </th>
                        <th>Clave</th>
                        <th>Nombre</th>
                        <th>Instructor</th>
                        <th>Restaurar</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="curso : ${cursos}">

                        <td>
                            <input type="checkbox"
                                   name="ids"
                                   th:value="${curso.id}">
                        </td>

                        <td th:text="${curso.claveCurso}"></td>

                        <td th:text="${curso.nombreCurso}"></td>

                        <td th:text="${curso.instructor != null ? curso.instructor.nombre : 'Sin instructor'}"></td>

                        <td>
                            <a th:href="@{/cursos/restaurar/{id}(id=${curso.id})}"
                               class="btn btn-success btn-sm">
                                <i class="bi bi-arrow-clockwise"></i>
                            </a>
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </form>

    </div>

</div>

<!-- 🔥 MODAL CONFIRMACIÓN -->
<div class="modal fade" id="modalConfirmar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white">

            <div class="modal-header">
                <h5 class="modal-title">⚠ Confirmación</h5>
            </div>

            <div class="modal-body">
                ¿Seguro que deseas eliminar los cursos seleccionados?<br><br>
                <b style="color:red;">Esta acción NO se puede deshacer.</b>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">
                    Cancelar
                </button>

                <button class="btn btn-danger" onclick="enviarFormulario()">
                    Eliminar definitivamente
                </button>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

function toggleAll(source) {
    document.querySelectorAll('input[name="ids"]').forEach(cb => {
        cb.checked = source.checked;
    });
}

function confirmarEliminacionMasiva(){

    let seleccionados = document.querySelectorAll('input[name="ids"]:checked');

    if(seleccionados.length === 0){
        alert("Selecciona al menos un curso");
        return;
    }

    let modal = new bootstrap.Modal(document.getElementById('modalConfirmar'));
    modal.show();
}

function enviarFormulario(){
    document.getElementById("formEliminarMasivo").submit();
}

</script>

</body>
</html>
