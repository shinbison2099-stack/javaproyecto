<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>Cursos Eliminados</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

	<div class="container mt-4">

		<h2>Cursos Eliminados</h2>

		<a href="/cursos" class="btn btn-secondary mb-3">
			Volver
		</a>

		<table class="table table-bordered">

			<thead>

				<tr>

					<th>Clave</th>
					<th>Nombre</th>
					<th>Instructor</th>
					<th>Restaurar</th>

				</tr>

			</thead>

			<tbody>

				<tr th:each="curso : ${cursos}">

					<td th:text="${curso.claveCurso}"></td>

					<td th:text="${curso.nombreCurso}"></td>

					<td th:text="${curso.instructor != null ? curso.instructor.nombre : 'Sin instructor'}"></td>

					<td>

						<a th:href="@{/cursos/restaurar/{id}(id=${curso.id})}" class="btn btn-success btn-sm">

							Restaurar

						</a>

					</td>

				</tr>

			</tbody>

		</table>

	</div>

</body>

</html>
