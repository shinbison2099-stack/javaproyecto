<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Lista de Cursos</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 11px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 5px;
            text-align: center;
        }

        th {
            background: #f2f2f2;
        }

        .interno { background: #dbeafe; }
        .externo { background: #fef3c7; }

        .hourly { background: #d1fae5; }
        .salary { background: #ede9fe; }
        .ambos { background: #e5e7eb; }

        .activo { color: green; font-weight: bold; }
        .inactivo { color: red; font-weight: bold; }
    </style>
</head>

<body>

<h2>📚 Lista de Cursos</h2>

<table>

    <thead>
    <tr>
        <th>#</th>
        <th>Clave</th>
        <th>Nombre</th>
        <th>Área</th>
        <th>Duración</th>
        <th>Tipo Curso</th>
        <th>Tipo Trabajador</th>
        <th>Instructor</th>
        <th>Inicio</th>
        <th>Fin</th>
        <th>Activo</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="curso, iterStat : ${cursos}">

        <td th:text="${iterStat.count}"></td>

        <td th:text="${curso.claveCurso}"></td>

        <td th:text="${curso.nombreCurso}"></td>

        <td th:text="${curso.claveAreaTematica}"></td>

        <td th:text="${curso.duracion != null ? curso.duracion + ' hrs' : '0 hrs'}"></td>

        <!-- ✅ TIPO CURSO -->
        <td th:classappend="${curso.tipoCurso == 'INTERNO'} ? 'interno' : 'externo'"
            th:text="${curso.tipoCurso != null ? curso.tipoCurso : 'SIN TIPO'}">
        </td>

        <!-- ✅ TIPO TRABAJADOR -->
        <td th:classappend="
            ${curso.tipoTrabajador == 'HOURLY'} ? 'hourly' :
            (${curso.tipoTrabajador == 'SALARY'} ? 'salary' : 'ambos')"
            th:text="${curso.tipoTrabajador != null ? curso.tipoTrabajador : 'SIN TIPO'}">
        </td>

        <td th:text="${curso.instructor != null ? curso.instructor.nombre : 'Sin instructor'}"></td>

        <td th:text="${curso.fechaInicio != null ? #temporals.format(curso.fechaInicio,'dd/MM/yyyy') : '-'}"></td>

        <td th:text="${curso.fechaFin != null ? #temporals.format(curso.fechaFin,'dd/MM/yyyy') : '-'}"></td>

        <!-- ✅ ACTIVO -->
        <td th:classappend="${curso.activo} ? 'activo' : 'inactivo'"
            th:text="${curso.activo ? 'Sí' : 'No'}">
        </td>

    </tr>

    </tbody>

</table>

</body>
</html>
