<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Curso</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
        }

        .container-box {
            max-width: 900px;
            margin: auto;
            margin-top: 30px;

            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);

            padding: 25px;
            border-radius: 20px;
        }

        /* 🔥 SCROLL CORREGIDO */
        .form-scroll {
            max-height: 80vh;
            overflow-y: auto;
            padding-right: 10px;
        }

        input, select, textarea {
            background: rgba(255,255,255,0.05) !important;
            color: white !important;
            border-radius: 10px !important;
        }

        select option {
            color: black;
        }

        textarea {
            resize: none;
        }

    </style>
</head>

<body>

<div th:replace="~{fragments/menu :: menu}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="container mt-4">
<div class="container-box">

    <h2 th:text="${curso.id == null} ? 'Nuevo Curso' : 'Editar Curso'"></h2>

    <!-- 🔥 SCROLL -->
    <div class="form-scroll">

    <form th:action="${curso.id == null} ? @{/cursos/guardar} : @{/cursos/actualizar}"
          th:object="${curso}"
          method="post">

        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{activo}">

        <!-- CLAVE -->
        <div class="mb-3">
            <label>Clave Curso</label>
            <input type="text" th:field="*{claveCurso}" class="form-control" required>
        </div>

        <!-- NOMBRE -->
        <div class="mb-3">
            <label>Nombre Curso</label>
            <input type="text" th:field="*{nombreCurso}" class="form-control" required>
        </div>

        <!-- AREA TEMATICA -->
        <div class="mb-3">
            <label>Área Temática</label>
            <input type="text" th:field="*{claveAreaTematica}" class="form-control">
        </div>

        <!-- AREA RESPONSABLE -->
        <div class="mb-3">
            <label>Área Responsable</label>
            <input type="text" th:field="*{areaResponsable}" class="form-control">
        </div>

        <!-- DURACION -->
        <div class="mb-3">
            <label>Duración (horas)</label>
            <input type="number" th:field="*{duracion}" class="form-control">
        </div>

        <!-- 🔥 TIPOS EN 2 COLUMNAS -->
        <div class="row">

            <!-- TIPO CURSO -->
            <div class="col-md-6 mb-3">
                <label>Tipo de Curso</label>
                <select th:field="*{tipoCurso}" class="form-control">
                    <option value="">-- Selecciona --</option>
                    <option value="INTERNO">Interno</option>
                    <option value="EXTERNO">Externo</option>
                </select>
            </div>

            <!-- TIPO TRABAJADOR -->
            <div class="col-md-6 mb-3">
                <label>Tipo de Trabajador</label>
                <select th:field="*{tipoTrabajador}" class="form-control">
                    <option value="">-- Selecciona --</option>
                    <option value="HOURLY">Hourly</option>
                    <option value="SALARY">Salary</option>
                    <option value="AMBOS">Ambos</option>
                </select>
            </div>

        </div>

        <!-- INSTRUCTOR -->
        <div class="mb-3">
            <label>Instructor</label>

            <select th:field="*{instructor.id}" class="form-control">
                <option value="">Seleccione instructor</option>

                <option th:each="inst : ${instructores}"
                        th:value="${inst.id}"
                        th:text="${inst.nombre}">
                </option>
            </select>
        </div>

        <!-- FECHAS -->
        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Fecha Inicio</label>
                <input type="date" th:field="*{fechaInicio}" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Fecha Fin</label>
                <input type="date" th:field="*{fechaFin}" class="form-control">
            </div>
        </div>

        <!-- 🔥 NUEVO: COMENTARIOS -->
        <div class="mb-3">
            <label>Comentarios</label>
            <textarea th:field="*{comentarios}"
                      class="form-control"
                      rows="4"
                      placeholder="Notas, observaciones, requisitos...">
            </textarea>
        </div>

        <!-- BOTONES -->
        <div class="mt-3">
            <button type="submit" class="btn btn-success">
                Guardar
            </button>

            <a href="/cursos" class="btn btn-secondary">
                Cancelar
            </a>
        </div>

    </form>

    </div>

</div>
</div>

</body>
</html>
