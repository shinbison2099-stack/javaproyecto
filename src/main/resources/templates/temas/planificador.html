<h2 th:text="'Planificador: ' + ${curso.nombreCurso}"></h2>

<p>Total horas: <b th:text="${curso.duracion}"></b></p>
<p>Usadas: <b th:text="${usadas}"></b></p>
<p>Restantes: <b th:text="${restantes}"></b></p>

<hr>

<form action="/temas/guardar" method="post">

    <input type="hidden" name="cursoId" th:value="${curso.id}">

    <input type="text" name="nombre" placeholder="Nombre del tema">

    <input type="number" name="numeroClases" placeholder="Clases">

    <input type="number" step="0.1" name="horasPorClase" placeholder="Horas por clase">

    <button>Agregar</button>

</form>

<hr>

<table class="table">

<tr>
    <th>#</th>
    <th>Tema</th>
    <th>Horas</th>
</tr>

<tr th:each="t, stat : ${temas}">
    <td th:text="${stat.count}"></td>
    <td th:text="${t.nombre}"></td>
    <td th:text="${t.horas}"></td>
</tr>

</table>
