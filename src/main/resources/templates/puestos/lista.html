<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Puestos existentes</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Iconos -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <style>

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            font-family: Arial;
        }

        .content {
            margin-left: 120px;
            padding: 30px;
        }

        /* 🔥 CARD PRINCIPAL */
        .card-box {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        /* 🔥 HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        /* BOTONES */
        .btn {
            border-radius: 10px;
        }

        /* TABLA */
        table {
            background: white;
            color: black;
            border-radius: 15px;
            overflow: hidden;
        }

        /* FILAS */
        tbody tr:hover {
            background: #f1f1f1;
            transition: 0.2s;
        }

        /* INPUT FILE */
        .form-control {
            border-radius: 10px;
        }

        /* GRUPO BOTONES */
        .acciones {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

    </style>

</head>

<body>

<div th:replace="~{fragments/menu :: menu}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

    <div class="card-box">

        <!-- 🔥 HEADER -->
        <div class="header">

            <h2>
                <i class="bi bi-diagram-3"></i>
                Puestos existentes
            </h2>

            <span class="badge bg-success"
                  th:text="${#lists.size(puestos)} + ' puestos'"></span>

        </div>

        <!-- 🔥 BOTONES -->
        <div class="acciones mb-3">

            <a href="/puestos/nuevo" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Nuevo
            </a>

            <a href="/puestos/eliminados" class="btn btn-secondary">
                <i class="bi bi-trash"></i> Eliminados
            </a>

            <a href="/puestos/pdf" class="btn btn-danger">
                <i class="bi bi-file-earmark-pdf"></i> PDF
            </a>

        </div>

        <!-- 🔥 IMPORTAR -->
        <form action="/puestos/importar"
              method="post"
              enctype="multipart/form-data"
              class="d-flex gap-2 mb-3">

            <input type="file"
                   name="archivo"
                   class="form-control"
                   accept=".xlsx,.xls"
                   required>

            <button class="btn btn-success">
                <i class="bi bi-file-earmark-excel"></i> Importar
            </button>

        </form>

        <!-- 🔥 TABLA -->
        <div class="table-responsive">

            <table class="table table-hover text-center align-middle">

                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Nombre</th>
                    <th>Nivel</th>
                    <th>Acciones</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="p, iterStat : ${puestos}">

                    <td th:text="${iterStat.count}"></td>

                    <td class="fw-semibold text-primary"
                        th:text="${p.nombrePuesto}">
                    </td>

                    <td>
                        <span class="badge bg-info"
                              th:text="${p.nivel}"></span>
                    </td>

                    <td>

                        <a th:href="@{/puestos/editar/{id}(id=${p.id})}"
                           class="btn btn-warning btn-sm">
                            <i class="bi bi-pencil"></i>
                        </a>

                        <a th:href="@{/puestos/eliminar/{id}(id=${p.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Eliminar puesto?')">
                            <i class="bi bi-trash"></i>
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
