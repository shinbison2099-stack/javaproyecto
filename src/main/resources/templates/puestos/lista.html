<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Puestos existentes</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Iconos -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <style>

        body{
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .content{
            margin-left: 120px;
            padding: 30px;
        }

        .card-box{
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(14px);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.35);
        }

        .header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header h2{
            font-weight: 700;
            margin: 0;
        }

        .acciones{
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .btn{
            border-radius: 12px;
            font-weight: 600;
        }

        /* =========================================
           🔥 WINDOWS 11 BUTTON
        ========================================= */

        .btn-win11{

            background: rgba(255,255,255,0.12);

            border: 1px solid rgba(255,255,255,0.18);

            backdrop-filter: blur(14px);

            color: white;

            border-radius: 14px;

            padding: 10px 18px;

            font-weight: 600;

            transition: all 0.25s ease;

            box-shadow:
                0 4px 20px rgba(0,0,0,0.25),
                inset 0 1px 1px rgba(255,255,255,0.08);

            text-decoration: none;

            display: inline-flex;

            align-items: center;

            gap: 8px;
        }

        .btn-win11:hover{

            transform: translateY(-2px);

            background: rgba(255,255,255,0.18);

            color: white;

            box-shadow:
                0 10px 30px rgba(59,130,246,0.35);
        }

        .btn-win11 i{

            font-size: 18px;
        }

        /* ========================================= */

        .form-control{
            border-radius: 12px;
        }

        table{
            background: white;
            color: black;
            border-radius: 18px;
            overflow: hidden;
        }

        tbody tr:hover{
            background: #f3f4f6;
            transition: 0.2s;
        }

        .badge{
            padding: 8px 12px;
            border-radius: 10px;
        }
		
		/* =========================================
		   🔥 SCROLL TABLA WINDOWS 11
		========================================= */

		.tabla-scroll{

		    max-height: 620px;

		    overflow-y: auto;

		    border-radius: 18px;

		    box-shadow:
		        inset 0 0 15px rgba(0,0,0,0.15);
		}

		/* 🔥 HEADER FIJO */
		.tabla-scroll thead th{

		    position: sticky;

		    top: 0;

		    z-index: 10;

		    background: #1f2937 !important;

		    color: white;
		}

		/* =========================================
		   🔥 SCROLL PERSONALIZADO
		========================================= */

		.tabla-scroll::-webkit-scrollbar{

		    width: 10px;
		}

		.tabla-scroll::-webkit-scrollbar-track{

		    background: rgba(255,255,255,0.08);

		    border-radius: 20px;
		}

		.tabla-scroll::-webkit-scrollbar-thumb{

		    background: linear-gradient(
		        180deg,
		        #3b82f6,
		        #2563eb
		    );

		    border-radius: 20px;
		}

		.tabla-scroll::-webkit-scrollbar-thumb:hover{

		    background: linear-gradient(
		        180deg,
		        #60a5fa,
		        #3b82f6
		    );
		}

    </style>

</head>

<body>

<div th:replace="~{fragments/menu :: menu}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

    <div class="card-box">

        <!-- HEADER -->
        <div class="header">

            <h2>
                <i class="bi bi-diagram-3"></i>
                Puestos existentes
            </h2>

            <span class="badge bg-success"
                  th:text="${#lists.size(puestos)} + ' puestos'">
            </span>

        </div>

        <!-- BOTONES -->
        <div class="acciones">

            <a href="/puestos/nuevo"
               class="btn btn-primary">

                <i class="bi bi-plus-circle"></i>
                Nuevo

            </a>

            <a href="/puestos/eliminados"
               class="btn btn-secondary">

                <i class="bi bi-trash"></i>
                Eliminados

            </a>

            <!-- 🔥 BOTÓN WINDOWS 11 -->
            <a href="/puestos/plantilla"
               class="btn-win11">

                <i class="bi bi-cloud-arrow-down-fill"></i>

                Descargar plantilla

            </a>

            <a href="/puestos/pdf"
               class="btn btn-danger">

                <i class="bi bi-file-earmark-pdf"></i>
                PDF

            </a>

        </div>

        <!-- IMPORTAR -->
        <form action="/puestos/importar"
              method="post"
              enctype="multipart/form-data"
              class="d-flex gap-2 mb-4">

            <input type="file"
                   name="archivo"
                   class="form-control"
                   accept=".xlsx,.xls"
                   required>

            <button class="btn btn-success">

                <i class="bi bi-file-earmark-excel"></i>
                Importar

            </button>

        </form>

		<!-- TABLA -->
		<div class="table-responsive tabla-scroll">

		    <table class="table table-hover text-center align-middle">

		        <thead class="table-dark">

		        <tr>

		            <th>#</th>

		            <th>Nombre</th>

		            <th>Tipo</th>

		            <th>Nivel</th>

		            <th>Cursos</th>

		            <th>Acciones</th>

		        </tr>

		        </thead>

		        <tbody>

		        <tr th:each="p, iterStat : ${puestos}">

		            <td th:text="${iterStat.count}"></td>

		            <td class="fw-semibold text-primary"
		                th:text="${p.nombrePuesto}">
		            </td>

		            <td>

		                <span class="badge bg-secondary"
		                      th:text="${p.tipoTrabajador != null
		                      ? #strings.capitalize(p.tipoTrabajador.name().toLowerCase())
		                      : 'Sin tipo'}">
		                </span>

		            </td>

		            <td>

		                <span class="badge bg-info"
		                      th:text="${p.nivel}">
		                </span>

		            </td>

		            <!-- CURSOS -->
		            <td>

		                <div th:if="${p.cursos != null and !p.cursos.isEmpty()}">

		                    <span th:each="c : ${p.cursos}"
		                          class="badge rounded-pill bg-primary me-1 mb-1"
		                          th:text="${c.nombreCurso}">
		                    </span>

		                </div>

		                <span th:if="${p.cursos == null or p.cursos.isEmpty()}"
		                      class="text-muted">

		                    Sin cursos

		                </span>

		            </td>

		            <!-- ACCIONES -->
		            <td>

		                <a th:href="@{/puestos/editar/{id}(id=${p.id})}"
		                   class="btn btn-warning btn-sm">

		                    <i class="bi bi-pencil"></i>

		                </a>

		                <a th:href="@{/puestos/eliminar/{id}(id=${p.id})}"
		                   class="btn btn-danger btn-sm"
		                   onclick="return confirm('Eliminar puesto?')">

		                    <i class="bi bi-trash"></i>

		                </a>

		            </td>

		        </tr>

		        </tbody>

		    </table>

		</div>
    </div>

</div>

</body>
</html>
