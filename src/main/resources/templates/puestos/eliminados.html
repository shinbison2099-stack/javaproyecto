<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>Matriz de habilidades</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

	<link rel="stylesheet" th:href="@{/css/matriz.css}">
	<link rel="stylesheet" th:href="@{/css/menu.css}">

</head>

<body>

	<div th:replace="~{fragments/menu :: menu}"></div>

	<h2>Puestos eliminados</h2>

	<a href="/puestos" class="btn btn-secondary mb-3">
		Volver
	</a>

	<table class="table table-bordered">

		<thead>

			<tr>
				<th>Nombre</th>
				<th>Nivel</th>
				<th>Acciones</th>
			</tr>

		</thead>

		<tbody>

			<tr th:each="p : ${puestos}">

				<td th:text="${p.nombrePuesto}"></td>

				<td th:text="${p.nivel}"></td>

				<td>

					<a th:href="@{/puestos/restaurar/{id}(id=${p.id})}" class="btn btn-success btn-sm">

						Restaurar

					</a>

				</td>

			</tr>

		</tbody>

	</table>

</body>
</html>
