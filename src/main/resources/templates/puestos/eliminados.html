<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Matriz de habilidades</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Iconos -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <!-- 🔥 WINDOWS 11 STYLE -->
    <style>

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', sans-serif;
            color: #e2e8f0;
        }

        .bg-glow {
            position: fixed;
            width: 350px;
            height: 350px;
            background: #3b82f6;
            filter: blur(140px);
            top: 10%;
            left: 10%;
            z-index: -1;
        }

        .container-box {
            background: rgba(30, 41, 59, 0.65);
            backdrop-filter: blur(18px);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        h2 {
            font-weight: 600;
            margin-bottom: 20px;
            color: #f8fafc;
        }

        .btn {
            border-radius: 10px;
            transition: 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #64748b, #94a3b8);
            border: none;
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e, #4ade80);
            border: none;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #f87171);
            border: none;
        }

        .table {
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
        }

        thead th {
            position: sticky;
            top: 0;
            background: linear-gradient(135deg, #1e293b, #334155);
            color: white;
            border-bottom: 2px solid #3b82f6;
        }

        .table tbody td {
            color: #e2e8f0;
            border-color: rgba(255,255,255,0.05);
        }

        .table tbody tr:hover {
            background: rgba(59,130,246,0.1);
        }

        .table-responsive {
            max-height: 500px;
            overflow-y: auto;
            border-radius: 12px;
        }

        .table-responsive::-webkit-scrollbar {
            width: 8px;
        }

        .table-responsive::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }

        .text-muted {
            color: #94a3b8 !important;
        }

    </style>

</head>

<body>

<div class="bg-glow"></div>

<div th:replace="~{fragments/menu :: menu}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="container mt-4">

    <div class="container-box">

        <h2>
            <i class="bi bi-diagram-3"></i>
            Puestos eliminados
        </h2>

        <div class="d-flex gap-2 mb-3 flex-wrap">

            <a href="/puestos" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Volver
            </a>

            <!-- 🔥 BOTÓN BORRADO MASIVO -->
            <button class="btn btn-danger"
                    onclick="return confirmarEliminacionMasiva()">
                <i class="bi bi-trash"></i>
                Eliminar seleccionados
            </button>

        </div>

        <!-- 🔥 FORM MASIVO -->
        <form id="formEliminarMasivo"
              method="post"
              th:action="@{/puestos/eliminar-masivo}">

            <div class="table-responsive">

                <table class="table align-middle text-center">

                    <thead>
                    <tr>
                        <th>
                            <input type="checkbox" onclick="toggleAll(this)">
                        </th>
                        <th>Nombre</th>
                        <th>Nivel</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="p : ${puestos}">

                        <td>
                            <input type="checkbox" name="ids" th:value="${p.id}">
                        </td>

                        <td th:text="${p.nombrePuesto}"></td>

                        <td>
                            <span class="badge bg-primary"
                                  th:text="${p.nivel}">
                            </span>
                        </td>

                        <td>
                            <a th:href="@{/puestos/restaurar/{id}(id=${p.id})}"
                               class="btn btn-success btn-sm">
                                <i class="bi bi-arrow-clockwise"></i>
                            </a>
                        </td>

                    </tr>

                    <!-- VACÍO -->
                    <tr th:if="${#lists.isEmpty(puestos)}">
                        <td colspan="4" class="text-muted">
                            No hay puestos eliminados
                        </td>
                    </tr>

                    </tbody>

                </table>

            </div>

        </form>

    </div>

</div>

<!-- 🔥 JS -->
<script>
function toggleAll(source) {
    document.querySelectorAll('input[name="ids"]').forEach(cb => {
        cb.checked = source.checked;
    });
}

function confirmarEliminacionMasiva() {

    let seleccionados = document.querySelectorAll('input[name="ids"]:checked');

    if (seleccionados.length === 0) {
        alert("Selecciona al menos un registro");
        return false;
    }

    return confirm("⚠️ Esta acción eliminará los registros PERMANENTEMENTE.\n\nNo se podrá deshacer.\n\n¿Deseas continuar?");
}
</script>

</body>

</html>
