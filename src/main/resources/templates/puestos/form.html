<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Puesto</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .container-box {
            max-width: 700px;
            margin: 40px auto;
        }

        .card-glass {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(14px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .form-control, .form-select {
            border-radius: 12px;
            border: none;
            padding: 10px;
        }

        .titulo {
            font-weight: 600;
            margin-bottom: 20px;
        }

        .cursos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
        }

        .curso-item {
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            border-radius: 12px;
        }
    </style>

</head>

<body>

<div th:replace="~{fragments/menu :: menu}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="container-box">

    <div class="card-glass">

        <h3 class="titulo">💼 Crear / Editar Puesto</h3>

        <form th:object="${puesto}" th:action="@{/puestos/guardar}" method="post">

            <input type="hidden" th:field="*{id}">

            <!-- NOMBRE -->
            <div class="mb-3">
                <label>Nombre del puesto</label>
                <input type="text" th:field="*{nombrePuesto}" class="form-control" required>
            </div>

            <!-- NIVEL -->
            <div class="mb-3">
                <label>Nivel</label>
                <input type="number" th:field="*{nivel}" class="form-control" required>
            </div>

            <!-- TIPO -->
            <div class="mb-3">
                <label>Tipo de trabajador</label>
                <select th:field="*{tipoTrabajador}" class="form-select" required>
                    <option value="">-- Selecciona tipo --</option>
                    <option th:each="t : ${tiposTrabajador}"
                            th:value="${t}"
                            th:text="${#strings.capitalize(t.name().toLowerCase())}">
                    </option>
                </select>
            </div>

            <!-- CURSOS -->
            <div class="mb-3">
                <label class="fw-semibold">Cursos</label>

                <div class="cursos-grid">

                    <div th:each="c : ${cursos}" class="curso-item">

                        <input class="form-check-input"
                               type="checkbox"
                               name="cursosIds"
                               th:value="${c.id}"
                               th:checked="${puesto.cursos != null and puesto.cursos.contains(c)}">

                        <label th:text="${c.nombreCurso}"></label>

                    </div>

                </div>

            </div>

            <!-- BOTONES -->
            <div class="d-flex justify-content-between mt-4">

                <a href="/puestos" class="btn btn-secondary">
                    ← Cancelar
                </a>

                <button class="btn btn-success">
                    💾 Guardar
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
