<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>Matriz de habilidades</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

	<link rel="stylesheet" th:href="@{/css/matriz.css}">
	<link rel="stylesheet" th:href="@{/css/menu.css}">

</head>

<body>

	<div th:replace="~{fragments/menu :: menu}"></div>

	<form th:object="${puesto}" th:action="@{/puestos/guardar}" method="post">

		<input type="hidden" th:field="*{id}">

		<div class="mb-3">

			<label>Nombre Puesto</label>

			<input type="text" th:field="*{nombrePuesto}" class="form-control">

		</div>

		<div class="mb-3">

			<label>Nivel</label>

			<input type="number" th:field="*{nivel}" class="form-control">

		</div>

		<button class="btn btn-success">
			Guardar
		</button>

		<a href="/puestos" class="btn btn-secondary">
			Cancelar
		</a>

	</form>


</body>
